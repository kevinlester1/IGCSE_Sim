<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Simulator & Learning Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(5px); }
        }
        .animate-bounce-subtle {
            animation: bounce-subtle 1s infinite;
        }
        .register-active {
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(250, 204, 21, 0.3);
            border-color: #facc15 !important;
            background-color: #fefce8 !important;
        }
        .tab-active {
            border-bottom: 3px solid #3b82f6;
            color: #1d4ed8;
            font-weight: 700;
        }
        /* Flowchart Styling */
        .flow-node {
            transition: all 0.3s ease;
            border-width: 2px;
            opacity: 0.4;
            filter: grayscale(1);
        }
        .flow-node.active {
            opacity: 1;
            filter: grayscale(0);
            transform: scale(1.02);
            border-color: #3b82f6;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
            background-color: #eff6ff;
        }
        .flow-arrow {
            transition: all 0.3s ease;
            color: #e2e8f0;
        }
        .flow-arrow.active {
            color: #3b82f6;
            stroke-width: 3px;
        }
        /* Bus Styling */
        .bus-line-horizontal {
            height: 4px;
            background: #cbd5e1;
            position: relative;
            margin: 10px 0;
        }
        .bus-label {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: bold;
            color: #64748b;
            background: #f8fafc;
            padding: 0 6px;
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }
        .bus-arrow-right::after {
            content: '';
            position: absolute;
            right: -8px;
            top: -4px;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 10px solid #cbd5e1;
        }
        .bus-arrow-both::after {
            content: '';
            position: absolute;
            right: -8px;
            top: -4px;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 10px solid #cbd5e1;
        }
        .bus-arrow-both::before {
            content: '';
            position: absolute;
            left: -8px;
            top: -4px;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-right: 10px solid #cbd5e1;
        }
        /* Drag and Drop Styles */
        .drop-zone {
            min-height: 40px;
            border: 2px dashed #94a3b8;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.5);
            padding: 4px;
        }
        .drop-zone.drag-over {
            border-color: #3b82f6;
            background: rgba(239, 246, 255, 0.8);
        }
        .draggable-item {
            cursor: grab;
            width: 100%;
        }
        .draggable-item:active {
            cursor: grabbing;
        }
        .correct-drop {
            border-color: #22c55e !important;
            background-color: #f0fdf4 !important;
            border-style: solid !important;
        }
        .wrong-drop {
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
            border-style: solid !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen p-4 md:p-6">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-4">
            <h1 class="text-2xl font-bold flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>
                CPU Learning Lab
            </h1>
        </header>

        <!-- Navigation Tabs -->
        <div class="flex border-b border-slate-200 mb-6 overflow-x-auto bg-white/50 sticky top-0 z-10">
            <button id="tabSimBtn" class="px-6 py-3 text-slate-500 hover:text-blue-600 transition-all tab-active whitespace-nowrap text-sm font-medium">
                Simulation & Process Flow
            </button>
            <button id="tabBuildBtn" class="px-6 py-3 text-slate-500 hover:text-blue-600 transition-all whitespace-nowrap text-sm font-medium">
                Build Your CPU (Drag & Drop)
            </button>
            <button id="tabTheoryBtn" class="px-6 py-3 text-slate-500 hover:text-blue-600 transition-all whitespace-nowrap text-sm font-medium">
                Architecture Theory Guide
            </button>
            <button id="tabChallengeBtn" class="px-6 py-3 text-slate-500 hover:text-blue-600 transition-all whitespace-nowrap text-sm font-medium">
                Mastery Challenges
            </button>
        </div>

    <script>
        // Data & State
        const INITIAL_RAM = [
            { type: 'instr', value: 'LOAD 6', label: '0' },
            { type: 'instr', value: 'ADD 7', label: '1' },
            { type: 'instr', value: 'STORE 5', label: '2' },
            { type: 'instr', value: 'HALT', label: '3' },
            { type: 'data', value: 0, label: '4' },
            { type: 'data', value: 10, label: '5' },
            { type: 'data', value: 5, label: '6' },
            { type: 'data', value: 7, label: '7' },
        ];
        let ram = JSON.parse(JSON.stringify(INITIAL_RAM));
        let pc = 0, accumulator = 0, cir = null, mar = null, mdr = null, aluLeft = 0, aluRight = null;
        let cycleStep = 'FETCH_PC', isRunning = false, isHalted = false, autoRunInterval = null, logData = [];

        // Comprehensive Build Data matching strict IGCSE specifications
        const BUILD_COMPONENTS = [
            { id: 'ALU', label: 'ALU', type: 'component', color: 'bg-orange-700 text-white' },
            { id: 'CU', label: 'Control Unit', type: 'component', color: 'bg-blue-800 text-white' },
            { id: 'RAM', label: 'Main Memory', type: 'component', color: 'bg-emerald-700 text-white' },
            { id: 'PC', label: 'PC', type: 'component', color: 'bg-slate-800 text-white' },
            { id: 'CIR', label: 'CIR', type: 'component', color: 'bg-slate-800 text-white' },
            { id: 'MAR', label: 'MAR', type: 'component', color: 'bg-slate-800 text-white' },
            { id: 'MDR', label: 'MDR', type: 'component', color: 'bg-slate-800 text-white' },
            { id: 'ACC', label: 'Accumulator', type: 'component', color: 'bg-slate-800 text-white' },
            { id: 'BUS_DATA', label: 'Data Bus', type: 'component', color: 'bg-blue-600 text-white' },
            { id: 'BUS_ADDR', label: 'Address Bus', type: 'component', color: 'bg-slate-600 text-white' },
            { id: 'BUS_CTRL', label: 'Control Bus', type: 'component', color: 'bg-emerald-600 text-white' },
            { id: 'DESC_ALU', label: 'Executes math & logic operations', type: 'desc', color: 'bg-white border-2 border-orange-500 text-orange-950', correctId: 'ALU' },
            { id: 'DESC_CU', label: 'Sends control signals to manage execution', type: 'desc', color: 'bg-white border-2 border-blue-500 text-blue-950', correctId: 'CU' },
            { id: 'DESC_PC', label: 'Holds address of the NEXT instruction', type: 'desc', color: 'bg-white border-2 border-slate-400 text-slate-900', correctId: 'PC' },
            { id: 'DESC_MAR', label: 'Holds address CURRENTLY being accessed', type: 'desc', color: 'bg-white border-2 border-slate-400 text-slate-900', correctId: 'MAR' },
            { id: 'DESC_MDR', label: 'Holds data/instr just fetched or to be written', type: 'desc', color: 'bg-white border-2 border-slate-400 text-slate-900', correctId: 'MDR' },
            { id: 'DESC_CIR', label: 'Holds the instruction CURRENTLY being decoded', type: 'desc', color: 'bg-white border-2 border-slate-400 text-slate-900', correctId: 'CIR' },
            { id: 'DESC_ACC', label: 'Temporarily holds ALU calculation results', type: 'desc', color: 'bg-white border-2 border-slate-400 text-slate-900', correctId: 'ACC' },
            { id: 'DESC_RAM', label: 'Stores currently running data & instructions', type: 'desc', color: 'bg-white border-2 border-emerald-500 text-emerald-950', correctId: 'RAM' }
        ];

        // UI Selectors
        const elSimView = document.getElementById('simulationView'), elBuildView = document.getElementById('buildView'), elTheoryView = document.getElementById('theoryView'), elChallengeView = document.getElementById('challengeView');
        const elTabSimBtn = document.getElementById('tabSimBtn'), elTabBuildBtn = document.getElementById('tabBuildBtn'), elTabTheoryBtn = document.getElementById('tabTheoryBtn'), elTabChallengeBtn = document.getElementById('tabChallengeBtn');
        const elRamList = document.getElementById('ramList'), elLogs = document.getElementById('logs'), elStatusMsg = document.getElementById('statusMsg'), elStatusContainer = document.getElementById('statusContainer');
        const elAutoRunBtn = document.getElementById('autoRunBtn'), elStepBtn = document.getElementById('stepBtn'), elResetBtn = document.getElementById('resetBtn');

        function showTab(v) {
            [elSimView, elBuildView, elTheoryView, elChallengeView].forEach(e => e.classList.add('hidden'));
            [elTabSimBtn, elTabBuildBtn, elTabTheoryBtn, elTabChallengeBtn].forEach(b => b.classList.remove('tab-active'));
            
            if (v==='sim'){ elSimView.classList.remove('hidden'); elTabSimBtn.classList.add('tab-active'); }
            else if (v==='build'){ elBuildView.classList.remove('hidden'); elTabBuildBtn.classList.add('tab-active'); }
            else if (v==='theory'){ elTheoryView.classList.remove('hidden'); elTabTheoryBtn.classList.add('tab-active'); }
            else { elChallengeView.classList.remove('hidden'); elTabChallengeBtn.classList.add('tab-active'); }
        }
        elTabSimBtn.addEventListener('click',()=>showTab('sim'));
        elTabBuildBtn.addEventListener('click',()=>showTab('build'));
        elTabTheoryBtn.addEventListener('click',()=>showTab('theory'));
        elTabChallengeBtn.addEventListener('click',()=>showTab('challenge'));

        // Challenge Logic
        function checkChallenge(num, correct) {
            const fb = document.getElementById(`feedback-${num}`);
            fb.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-emerald-100', 'text-emerald-700');
            
            let isCorrect = false;
            if (num === 1) isCorrect = (correct === 5);
            if (num === 2) isCorrect = (parseInt(document.getElementById('input-2').value) === correct);
            if (num === 3) {
                const checked = document.querySelector('input[name="q3"]:checked');
                isCorrect = checked && checked.value === 'b';
            }

            if (isCorrect) {
                fb.textContent = "Correct! Great job understanding the concepts.";
                fb.classList.add('bg-emerald-100', 'text-emerald-700');
                fb.classList.remove('hidden');
            } else {
                fb.textContent = "Not quite. Try again or review the Theory tab for a hint!";
                fb.classList.add('bg-red-100', 'text-red-700');
                fb.classList.remove('hidden');
            }
        }

        // Build Logic
        function initBuildActivity() {
            const tb = document.getElementById('toolbox'); tb.innerHTML = '';
            [...BUILD_COMPONENTS].sort(()=>Math.random()-0.5).forEach(item => {
                const el = document.createElement('div'); el.draggable = true;
                el.id = `item-${item.id}`; 
                el.className = `draggable-item p-1.5 rounded border border-slate-300 font-bold text-[10px] shadow-sm text-center ${item.color} mb-2`;
                el.textContent = item.label; el.dataset.id = item.id; el.dataset.type = item.type; el.dataset.correctId = item.correctId || '';
                el.addEventListener('dragstart', (e)=> { e.dataTransfer.setData('text', item.id); el.style.opacity='0.5'; });
                el.addEventListener('dragend', ()=> el.style.opacity='1');
                tb.appendChild(el);
            });
            document.querySelectorAll('.drop-zone').forEach(z => {
                z.addEventListener('dragover', (e)=>{
                    e.preventDefault();
                    z.classList.add('drag-over');
                });
                z.addEventListener('dragleave', (e) => {
                    z.classList.remove('drag-over');
                });
                z.addEventListener('drop', (e)=>{
                    e.preventDefault(); 
                    z.classList.remove('drag-over');
                    const id = e.dataTransfer.getData('text'); const d = document.getElementById(`item-${id}`);
                    if (!d) return; // Prevent errors if dropping something else
                    if (z.children.length > 1 || (z.children.length === 1 && z.children[0].tagName === 'DIV')) {
                        const existing = z.querySelector('.draggable-item'); if (existing) tb.appendChild(existing);
                    }
                    const s = z.querySelector('span'); if (s) s.style.display='none';
                    z.appendChild(d);
                });
            });
        }

        document.getElementById('checkBuildBtn').addEventListener('click',()=>{
            let s = 0, t = 0;
            let firstError = null;

            document.querySelectorAll('.drop-zone').forEach(z => {
                t++; const i = z.querySelector('.draggable-item'); z.classList.remove('correct-drop', 'wrong-drop');
                if (!i) { 
                    z.classList.add('wrong-drop'); 
                    if(!firstError) firstError = "Incomplete: Make sure all slots are filled.";
                    return; 
                }
                const isC = z.dataset.type === 'component' ? i.dataset.id === z.dataset.correct : i.dataset.correctId === z.dataset.correct;
                if (isC) { 
                    z.classList.add('correct-drop'); s++; 
                } else { 
                    z.classList.add('wrong-drop'); 
                    if(!firstError) {
                        if(z.dataset.type === 'desc') firstError = `Hint: Check the definition for the ${z.dataset.correct} slot.`;
                        else {
                            // Targetted IGCSE Hints for common student misconceptions
                            if(z.dataset.correct === 'PC' && i.dataset.id === 'MAR') firstError = "IGCSE Hint: PC holds the NEXT address, MAR holds the CURRENT address.";
                            else if(z.dataset.correct === 'MAR' && i.dataset.id === 'PC') firstError = "IGCSE Hint: MAR sends addresses to the Address Bus, not the PC.";
                            else if(z.dataset.correct === 'MDR' && i.dataset.id === 'CIR') firstError = "IGCSE Hint: Data/Instructions arrive in MDR first, then instructions move to CIR.";
                            else if(z.dataset.correct === 'BUS_ADDR') firstError = "IGCSE Hint: The Address Bus must be Unidirectional (CPU -> Memory).";
                            else if(z.dataset.correct === 'BUS_DATA') firstError = "IGCSE Hint: The Data Bus must be Bidirectional (CPU <-> Memory).";
                            else firstError = `Hint: That's not the correct component for the ${z.dataset.correct} slot.`;
                        }
                    }
                }
            });
            
            const fb = document.getElementById('buildFeedback');
            fb.classList.remove('hidden', 'bg-emerald-100', 'text-emerald-700', 'bg-red-100', 'text-red-700');
            if (s === t) {
                fb.textContent = "Perfect! IGCSE Von Neumann Architecture Mastered!";
                fb.classList.add('bg-emerald-100', 'text-emerald-700');
            } else {
                fb.textContent = `${s}/${t} correct. ${firstError}`;
                fb.classList.add('bg-red-100', 'text-red-700');
            }
            fb.classList.remove('hidden');
        });

        document.getElementById('resetBuildBtn').addEventListener('click', () => {
            document.querySelectorAll('.drop-zone').forEach(z => {
                z.classList.remove('correct-drop', 'wrong-drop');
                const s = z.querySelector('span'); if (s) s.style.display='block';
                const i = z.querySelector('.draggable-item'); if (i) document.getElementById('toolbox').appendChild(i);
            });
            document.getElementById('buildFeedback').classList.add('hidden');
        });

        // Sim Engine
        function addLog(m){ logData.unshift(m); if(logData.length>5) logData.pop(); elLogs.innerHTML = logData.map((l,i)=>`<div><span class="text-slate-400">[${logData.length-i}]</span> ${l}</div>`).join(''); }
        
        function renderRAM(){ 
            elRamList.innerHTML = ram.map((c,idx)=>`<div class="flex items-center gap-2 p-1 rounded border ${pc===idx?'bg-blue-50 border-blue-200':'border-transparent'}"><div class="w-4 text-[9px] font-bold ${pc===idx?'text-blue-600':'text-slate-400'}">${idx}</div><div class="flex-1 text-[10px] px-2 py-0.5 rounded border ${c.type==='instr'?'bg-blue-50 text-blue-700 font-bold':'bg-white text-slate-500'}">${c.value}</div></div>`).join(''); 
        }
        
        function updateReg(id,v,a){ 
            const e=document.getElementById(id); 
            if(!e)return; 
            e.querySelector('.val').textContent=v===null?'---':v; 
            if(a) e.classList.add('register-active'); 
            else e.classList.remove('register-active'); 
        }

        function updateFlow(){ 
            document.querySelectorAll('.flow-node').forEach(n=>n.classList.remove('active')); 
            document.querySelectorAll('.flow-arrow').forEach(a=>a.classList.remove('active')); 
            const n=document.getElementById(`flow-${cycleStep}`); 
            if(n){ 
                n.classList.add('active'); 
                const o=['FETCH_PC','FETCH_BUS','DECODE','EXECUTE','UPDATE_PC']; 
                const i=o.indexOf(cycleStep); 
                if(i>0) document.getElementById(`arrow-${i}`)?.classList.add('active'); 
            } 
        }

        function updateUI(){ 
            updateReg('reg-pc',pc,cycleStep==='FETCH_PC'||cycleStep==='UPDATE_PC'); 
            updateReg('reg-cir',cir,cycleStep==='DECODE'||cycleStep==='FETCH_BUS'); 
            updateReg('reg-mar',mar,cycleStep==='FETCH_PC'||cycleStep==='FETCH_BUS'); 
            updateReg('reg-mdr',mdr,cycleStep==='FETCH_BUS'||cycleStep==='EXECUTE'); 
            updateReg('reg-acc',accumulator,cycleStep==='EXECUTE'); 
            
            document.getElementById('alu-l').textContent=aluLeft; 
            const ar=document.getElementById('alu-r'); 
            ar.textContent=aluRight===null?'?':aluRight; 
            ar.style.opacity=aluRight===null?'0.3':'1'; 
            
            const ao=document.getElementById('alu-out'); 
            if(aluRight!==null){ 
                ao.textContent=aluLeft+aluRight; 
                ao.classList.replace('bg-slate-400','bg-orange-600'); 
            } else { 
                ao.textContent='ALU WAIT'; 
                ao.classList.replace('bg-orange-600','bg-slate-400'); 
                if (!ao.classList.contains('bg-slate-400')) ao.classList.add('bg-slate-400');
            } 
            renderRAM(); 
            updateFlow(); 
        }

        function nextStep(){ 
            if(isHalted)return; 
            switch(cycleStep){ 
                case 'FETCH_PC': 
                    mar=pc; 
                    elStatusMsg.textContent=`FETCH: PC sends ${pc} to MAR.`; 
                    cycleStep='FETCH_BUS'; 
                    addLog(`PC→MAR(${pc})`); 
                    break; 
                case 'FETCH_BUS': 
                    const i=ram[mar].value; // Fetch from address in MAR, not directly PC (though they are same here, structurally better)
                    mdr=i; 
                    cir=i; 
                    elStatusMsg.textContent=`FETCH: "${i}" moved to CPU.`; 
                    cycleStep='DECODE'; 
                    addLog(`RAM→MDR→CIR`); 
                    break; 
                case 'DECODE': 
                    elStatusMsg.textContent=`DECODE: Decoding "${cir}".`; 
                    cycleStep='EXECUTE'; 
                    break; 
                case 'EXECUTE': 
                    const parts = cir.toString().split(' ');
                    const op = parts[0];
                    const addr = parts.length > 1 ? parseInt(parts[1]) : null;
                    
                    if(op==='LOAD'){ 
                        accumulator=ram[addr].value; 
                        elStatusMsg.textContent=`LOAD: RAM[${addr}] → ACC.`; 
                    } else if(op==='ADD'){ 
                        aluLeft=accumulator; 
                        aluRight=ram[addr].value; 
                        accumulator+=aluRight; 
                        elStatusMsg.textContent=`ADD: ACC + RAM[${addr}] → ACC.`; 
                    } else if(op==='STORE'){ 
                        ram[addr].value=accumulator; 
                        elStatusMsg.textContent=`STORE: ACC → RAM[${addr}].`; 
                    } else if(op==='HALT'){ 
                        isHalted=true; 
                        isRunning=false; 
                        clearInterval(autoRunInterval); 
                        elStatusMsg.textContent="HALTED."; 
                        document.getElementById('autoRunText').textContent = "Auto Run";
                        addLog("Halted."); 
                        updateUI(); 
                        return; 
                    } 
                    cycleStep='UPDATE_PC'; 
                    addLog(`Execute: ${op}`); 
                    break; 
                case 'UPDATE_PC': 
                    pc++; 
                    mar=mdr=aluRight=null; 
                    elStatusMsg.textContent=`UPDATE: PC to ${pc}.`; 
                    cycleStep='FETCH_PC'; 
                    break; 
            } 
            updateUI(); 
        }

        function reset(){ 
            ram=JSON.parse(JSON.stringify(INITIAL_RAM)); 
            pc=0; accumulator=0; cir=mar=mdr=aluRight=null; aluLeft=0; cycleStep='FETCH_PC'; 
            isRunning=isHalted=false; logData=[]; 
            elStatusMsg.textContent="Ready to start. Click 'Next Step'.";
            if(autoRunInterval)clearInterval(autoRunInterval); 
            document.getElementById('autoRunText').textContent = "Auto Run";
            updateUI(); 
            elLogs.innerHTML=''; 
        }
        
        elStepBtn.addEventListener('click', nextStep); 
        elResetBtn.addEventListener('click', reset);
        
        elAutoRunBtn.addEventListener('click', ()=>{ 
            if(isHalted)return; 
            if(isRunning){ 
                isRunning=false; 
                clearInterval(autoRunInterval); 
                document.getElementById('autoRunText').textContent = "Auto Run";
            } else { 
                isRunning=true; 
                autoRunInterval=setInterval(nextStep,1200); // Slightly slower for better readability
                document.getElementById('autoRunText').textContent = "Pause";
            } 
        });
        
        initBuildActivity(); 
        reset(); 
        // Expose challenge function for inline HTML handlers
        window.checkChallenge = checkChallenge;
    </script>
</body>
</html>
