<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two's Complement Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* bg-gray-100 */
        }
        
        .step-card {
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
        }
        
        .step-card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Monospace font for binary strings */
        .font-mono {
            font-family: 'Fira Code', monospace;
        }
        
        .bit {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2.25rem;
            height: 2.25rem;
            border: 1px solid #d1d5db; /* border-gray-300 */
            border-radius: 0.375rem;
            margin: 0 0.15rem;
            font-size: 1.125rem;
            font-weight: 500;
            background-color: #ffffff;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .dark .bit {
            border-color: #4b5563;
            background-color: #1f2937;
            color: #f3f4f6;
        }

        .bit.highlight-flip {
            background-color: #fef08a; /* yellow-200 */
            border-color: #eab308; /* yellow-500 */
            color: #854d0e; /* yellow-800 */
        }
        
        .dark .bit.highlight-flip {
            background-color: #713f12; /* yellow-900 */
            color: #fef08a;
        }

        .bit.highlight-add {
            background-color: #bbf7d0; /* green-200 */
            border-color: #22c55e; /* green-500 */
            color: #166534; /* green-800 */
        }

        .dark .bit.highlight-add {
            background-color: #14532d; /* green-900 */
            color: #bbf7d0;
        }

        .bit-group {
            display: flex;
            flex-wrap: nowrap;
            justify-content: flex-start;
            padding-bottom: 0.5rem;
        }

        .bit-header {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2.25rem;
            height: 1.5rem;
            margin: 0 0.15rem;
            font-size: 0.7rem;
            font-weight: 500;
            color: #6b7280; /* text-gray-500 */
        }

        .dark .bit-header {
            color: #9ca3af;
        }

        /* Custom Scrollbar for bit overflows (e.g., 16 bits on mobile) */
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-track {
            background: #374151;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #6b7280;
        }
    </style>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 min-h-screen flex items-center justify-center p-4 sm:p-6 lg:p-8 transition-colors duration-300">

    <main class="w-full max-w-3xl bg-white dark:bg-gray-800 rounded-2xl shadow-xl overflow-hidden border border-gray-100 dark:border-gray-700 transition-colors duration-300">
        
        <!-- Header -->
        <header class="bg-blue-600 dark:bg-blue-800 text-white p-6 sm:p-8 text-center relative">
            <button id="themeToggle" class="absolute top-4 right-4 p-2 rounded-full hover:bg-white/20 transition-colors" title="Toggle Dark Mode">
                <svg id="moonIcon" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <svg id="sunIcon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            </button>
            <h1 class="text-2xl sm:text-3xl font-bold mb-2">Two's Complement Simulator</h1>
            <p class="text-blue-100 text-sm sm:text-base max-w-xl mx-auto">Explore how computers represent signed integers in binary using the two's complement method step-by-step.</p>
        </header>

        <div class="p-6 sm:p-8">
            <div class="flex space-x-1 bg-gray-100 dark:bg-gray-700/50 p-1 rounded-xl mb-6">
                <button id="modeDecToBin" class="flex-1 py-2 px-4 rounded-lg text-sm font-medium bg-white dark:bg-gray-800 text-gray-900 dark:text-white shadow-sm transition-all">Decimal to Binary</button>
                <button id="modeBinToDec" class="flex-1 py-2 px-4 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-all">Binary to Decimal</button>
            </div>

            <div id="decToBinContainer" class="grid grid-cols-1 sm:grid-cols-3 gap-5 mb-6">
                <div class="sm:col-span-2">
                    <label for="decimalInput" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">Decimal Number</label>
                    <input type="number" id="decimalInput" class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all dark:text-white" placeholder="e.g., -42 or 15">
                </div>
                <div>
                    <label for="bits" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">Bit Length</label>
                    <select id="bits" class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all dark:text-white cursor-pointer">
                        <option value="4">4-bit</option>
                        <option value="8" selected>8-bit</option>
                        <option value="16">16-bit</option>
                    </select>
                </div>
            </div>

            <div id="binToDecContainer" class="hidden mb-6">
                <label for="binaryInput" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">Binary Number (Two's Complement)</label>
                <input type="text" id="binaryInput" class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all dark:text-white font-mono tracking-wider" placeholder="e.g., 11010110">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
                <button id="convertBtn" class="sm:col-span-2 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl shadow-sm hover:shadow transition duration-200 ease-in-out flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Run Full Simulation
                </button>
                <button id="nextStepBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-gray-300 dark:disabled:bg-gray-700 disabled:cursor-not-allowed text-white font-semibold py-3 px-4 rounded-xl shadow-sm hover:shadow transition duration-200 ease-in-out flex items-center justify-center gap-2" disabled>
                    Step
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>

            <!-- Error Message -->
            <div id="error-message" class="hidden mt-4 p-4 bg-red-50 dark:bg-red-900/30 border-l-4 border-red-500 text-red-700 dark:text-red-400 rounded-r-lg text-sm font-medium"></div>

            <!-- Simulation Steps Container -->
            <div id="simulation-steps" class="mt-8 space-y-6 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-gray-200 dark:before:via-gray-700 before:to-transparent hidden">
                <!-- Dynamic steps injected here -->
            </div>
        </div>
    </main>

    <script>
        const decimalInput = document.getElementById('decimalInput');
        const bitsSelect = document.getElementById('bits');
        const binaryInput = document.getElementById('binaryInput');
        const convertBtn = document.getElementById('convertBtn');
        const nextStepBtn = document.getElementById('nextStepBtn');
        const simulationSteps = document.getElementById('simulation-steps');
        const errorMessage = document.getElementById('error-message');
        const themeToggleBtn = document.getElementById('themeToggle');
        
        const modeDecToBinBtn = document.getElementById('modeDecToBin');
        const modeBinToDecBtn = document.getElementById('modeBinToDec');
        const decToBinContainer = document.getElementById('decToBinContainer');
        const binToDecContainer = document.getElementById('binToDecContainer');

        let simulationQueue = [];
        let currentStepIndex = 0;
        let currentMode = 'decToBin';

        // Theme Setup
        const setDarkMode = (isDark) => {
            if (isDark) {
                document.documentElement.classList.add('dark');
                document.getElementById('moonIcon').classList.remove('hidden');
                document.getElementById('sunIcon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moonIcon').classList.add('hidden');
                document.getElementById('sunIcon').classList.remove('hidden');
            }
        };

        // Initialize theme based on system preference
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            setDarkMode(true);
        }

        themeToggleBtn.addEventListener('click', () => {
            const isDark = document.documentElement.classList.contains('dark');
            setDarkMode(!isDark);
        });

        modeDecToBinBtn.addEventListener('click', () => setMode('decToBin'));
        modeBinToDecBtn.addEventListener('click', () => setMode('binToDec'));

        function setMode(mode) {
            currentMode = mode;
            resetUI();
            decimalInput.value = '';
            binaryInput.value = '';
            
            if (mode === 'decToBin') {
                modeDecToBinBtn.className = 'flex-1 py-2 px-4 rounded-lg text-sm font-medium bg-white dark:bg-gray-800 text-gray-900 dark:text-white shadow-sm transition-all';
                modeBinToDecBtn.className = 'flex-1 py-2 px-4 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-all';
                decToBinContainer.classList.remove('hidden');
                binToDecContainer.classList.add('hidden');
            } else {
                modeBinToDecBtn.className = 'flex-1 py-2 px-4 rounded-lg text-sm font-medium bg-white dark:bg-gray-800 text-gray-900 dark:text-white shadow-sm transition-all';
                modeDecToBinBtn.className = 'flex-1 py-2 px-4 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-all';
                decToBinContainer.classList.add('hidden');
                binToDecContainer.classList.remove('hidden');
            }
        }

        convertBtn.addEventListener('click', runFullSimulation);
        nextStepBtn.addEventListener('click', showNextStep);
        decimalInput.addEventListener('input', prepareForStepByStep);
        bitsSelect.addEventListener('change', prepareForStepByStep);
        binaryInput.addEventListener('input', prepareForStepByStep);
        
        decimalInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') runFullSimulation();
        });
        binaryInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') runFullSimulation();
        });

        function prepareForStepByStep() {
            if (currentMode === 'decToBin') {
                const val = decimalInput.value;
                if (val.trim() === '') {
                    resetUI();
                    return;
                }

                const num = parseInt(val);
                const bits = parseInt(bitsSelect.value);

                if (validateInput(num, bits)) {
                    simulationQueue = generateSteps(num, bits);
                    currentStepIndex = 0;
                    simulationSteps.innerHTML = '';
                    simulationSteps.classList.add('hidden');
                    nextStepBtn.disabled = false;
                } else {
                    nextStepBtn.disabled = true;
                }
            } else {
                const val = binaryInput.value.trim();
                if (val === '') {
                    resetUI();
                    return;
                }

                if (validateBinaryInput(val)) {
                    simulationQueue = generateBinToDecSteps(val);
                    currentStepIndex = 0;
                    simulationSteps.innerHTML = '';
                    simulationSteps.classList.add('hidden');
                    nextStepBtn.disabled = false;
                } else {
                    nextStepBtn.disabled = true;
                }
            }
        }

        function resetUI() {
            simulationSteps.innerHTML = '';
            simulationSteps.classList.add('hidden');
            errorMessage.classList.add('hidden');
            nextStepBtn.disabled = true;
        }

        function showNextStep() {
            if (currentStepIndex === 0) {
                simulationSteps.classList.remove('hidden');
            }

            if (currentStepIndex < simulationQueue.length) {
                const step = simulationQueue[currentStepIndex];
                addStepToDOM(step);
                currentStepIndex++;
            }
            if (currentStepIndex >= simulationQueue.length) {
                nextStepBtn.disabled = true;
            }
            
            // Scroll to bottom of steps
            setTimeout(() => {
                const lastChild = simulationSteps.lastElementChild;
                if(lastChild) lastChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function runFullSimulation() {
            simulationSteps.innerHTML = '';
            simulationSteps.classList.remove('hidden');
            errorMessage.classList.add('hidden');

            let steps = [];

            if (currentMode === 'decToBin') {
                const val = decimalInput.value;
                if (val.trim() === '') {
                    showError("Please enter a decimal number first.");
                    return;
                }
                const num = parseInt(val);
                const bits = parseInt(bitsSelect.value);
                if (!validateInput(num, bits)) return;
                
                steps = generateSteps(num, bits);
            } else {
                const val = binaryInput.value.trim();
                if (val === '') {
                    showError("Please enter a binary number first.");
                    return;
                }
                if (!validateBinaryInput(val)) return;
                
                steps = generateBinToDecSteps(val);
            }
            
            steps.forEach((step, index) => {
                setTimeout(() => {
                    addStepToDOM(step);
                    if (index === steps.length - 1) {
                         const lastChild = simulationSteps.lastElementChild;
                         if(lastChild) lastChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                }, index * 300); // Staggered animation
            });
            
            // Reset state so step-by-step requires a new input
            currentStepIndex = steps.length;
            nextStepBtn.disabled = true;
        }

        function validateInput(num, bits) {
             if (isNaN(num)) {
                showError("Please enter a valid numeric value.");
                return false;
            }

            const min = -Math.pow(2, bits - 1);
            const max = Math.pow(2, bits - 1) - 1;

            if (num < min || num > max) {
                showError(`Number out of range for ${bits}-bit signed integer. The valid range is ${min} to ${max}.`);
                return false;
            }
            errorMessage.classList.add('hidden');
            return true;
        }

        function validateBinaryInput(str) {
            if (!/^[01]+$/.test(str)) {
                showError("Invalid input. Please enter only 0s and 1s.");
                return false;
            }
            if (str.length < 2) {
                showError("Please enter at least 2 bits to demonstrate sign and magnitude properly.");
                return false;
            }
            if (str.length > 32) {
                showError("Maximum supported length is 32 bits for this simulation.");
                return false;
            }
            errorMessage.classList.add('hidden');
            return true;
        }

        function generateBinToDecSteps(binaryStr) {
            const bits = binaryStr.length;
            const msb = binaryStr[0];
            const steps = [];

            if (msb === '0') {
                // Positive number
                const decimalValue = parseInt(binaryStr, 2);
                steps.push({
                    title: "Step 1: Check the Sign Bit (MSB)",
                    description: `The Most Significant Bit (the leftmost bit) is <strong>0</strong>. This indicates that the number is <strong>positive</strong>.`,
                    binaryString: binaryStr,
                    highlightType: 'msb',
                    icon: 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z'
                });
                
                steps.push({
                    title: "Step 2: Convert to Decimal",
                    description: `For positive numbers in two's complement, we simply convert the binary value directly to decimal. <br>The binary value <code>${binaryStr}</code> equals <strong>${decimalValue}</strong>.`,
                    binaryString: binaryStr,
                    highlightType: 'none',
                    icon: 'M13 10V3L4 14h7v7l9-11h-7z'
                });
            } else {
                // Negative number
                steps.push({
                    title: "Step 1: Check the Sign Bit (MSB)",
                    description: `The Most Significant Bit (the leftmost bit) is <strong>1</strong>. This indicates that the number is <strong>negative</strong>. To find its absolute decimal value, we reverse the two's complement process.`,
                    binaryString: binaryStr,
                    highlightType: 'msb',
                    icon: 'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z'
                });

                // Mathematically, applying the two's complement process again yields the positive magnitude.
                const inverted = binaryStr.split('').map(bit => (bit === '0' ? '1' : '0')).join('');
                steps.push({
                    title: "Step 2: One's Complement (Invert Bits)",
                    description: "To find the magnitude (absolute value), we perform the two's complement operation again. First, flip every single bit.",
                    binaryString: inverted,
                    highlightType: 'flip',
                    icon: 'M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4'
                });

                let addCarry = 1;
                let finalBinary = '';
                for (let i = bits - 1; i >= 0; i--) {
                    let bit = parseInt(inverted[i]);
                    let sum = bit + addCarry;
                    if (sum === 2) {
                        finalBinary = '0' + finalBinary;
                        addCarry = 1;
                    } else if (sum === 1) {
                        finalBinary = '1' + finalBinary;
                        addCarry = 0;
                    } else {
                        finalBinary = '0' + finalBinary;
                        addCarry = 0;
                    }
                }

                steps.push({
                    title: "Step 3: Add 1 (Complete Two's Complement)",
                    description: `Add <strong>1</strong> to the inverted result. This gives us the binary magnitude (absolute value) of the negative number.`,
                    binaryString: finalBinary,
                    highlightType: 'add',
                    icon: 'M12 6v6m0 0v6m0-6h6m-6 0H6'
                });

                const decimalValue = parseInt(finalBinary, 2);
                steps.push({
                    title: "Step 4: Convert and Apply Negative Sign",
                    description: `The binary magnitude <code>${finalBinary}</code> equals <strong>${decimalValue}</strong> in decimal. Because the original sign bit was 1, we apply a negative sign. The final answer is <strong>-${decimalValue}</strong>.`,
                    binaryString: finalBinary,
                    highlightType: 'none',
                    icon: 'M5 13l4 4L19 7'
                });
            }

            return steps;
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove('hidden');
            simulationSteps.innerHTML = '';
            simulationSteps.classList.add('hidden');
        }

        function generateSteps(num, bits) {
            if (num >= 0) {
                return generatePositiveSteps(num, bits);
            } else {
                return generateNegativeSteps(num, bits);
            }
        }

        function generatePositiveSteps(num, bits) {
            const steps = [];
            const binary = num.toString(2).padStart(bits, '0');
            
            steps.push({
                title: "Step 1: Convert to Binary",
                description: `For positive numbers, two's complement is identical to the standard binary representation. We simply convert the decimal value <strong>${num}</strong> to binary and pad it with leading zeros to fit the <strong>${bits}-bit</strong> length.`,
                binaryString: binary,
                highlightType: 'none',
                icon: 'M13 10V3L4 14h7v7l9-11h-7z'
            });
            
            steps.push({
                title: "Final Result",
                description: `The Most Significant Bit (MSB, the leftmost bit) is <strong>0</strong>, which indicates that this is a positive number.`,
                binaryString: binary,
                highlightType: 'msb', // Highlights the first bit
                icon: 'M5 13l4 4L19 7'
            });
            return steps;
        }

        function generateNegativeSteps(num, bits) {
            const steps = [];
            const absNum = Math.abs(num);
            const binary = absNum.toString(2).padStart(bits, '0');
            
            steps.push({
                title: "Step 1: Convert Absolute Value to Binary",
                description: `First, take the absolute value (<strong>${absNum}</strong>) and convert it to a standard <strong>${bits}-bit</strong> binary number.`,
                binaryString: binary,
                highlightType: 'none',
                icon: 'M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z'
            });

            const inverted = binary.split('').map(bit => (bit === '0' ? '1' : '0')).join('');
            steps.push({
                title: "Step 2: One's Complement (Invert Bits)",
                description: "Flip every single bit. All <code>0</code>s become <code>1</code>s, and all <code>1</code>s become <code>0</code>s.",
                binaryString: inverted,
                highlightType: 'flip', // Special CSS class
                icon: 'M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4'
            });

            // Perform binary addition algorithm
            let carry = 1;
            let result = '';
            for (let i = bits - 1; i >= 0; i--) {
                let bit = parseInt(inverted[i]);
                let sum = bit + carry;
                if (sum === 2) {
                    result = '0' + result;
                    carry = 1;
                } else if (sum === 1) {
                    result = '1' + result;
                    carry = 0;
                } else {
                    result = '0' + result;
                    carry = 0;
                }
            }
            
            steps.push({
                title: "Step 3: Add 1 (Two's Complement)",
                description: `Add <strong>1</strong> to the One's Complement representation. ` + (carry === 1 ? `<span class="text-red-500 dark:text-red-400 font-medium">A carry-out of 1 overflowed past our ${bits}-bit limit. It is discarded.</span>` : ``),
                binaryString: result,
                highlightType: 'add',
                carryOut: carry,
                icon: 'M12 6v6m0 0v6m0-6h6m-6 0H6'
            });
            
            steps.push({
                title: "Final Result",
                description: `The result is the two's complement binary representation of <strong>${num}</strong>. The Most Significant Bit (MSB) is <strong>1</strong>, indicating a negative number.`,
                binaryString: result,
                highlightType: 'msb',
                icon: 'M5 13l4 4L19 7'
            });
            return steps;
        }

        function addStepToDOM(stepData) {
            const stepDiv = document.createElement('div');
            stepDiv.className = 'step-card relative flex items-start gap-4';
            
            // Icon
            const iconHTML = `
                <div class="relative z-10 flex items-center justify-center w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-900/50 text-blue-600 dark:text-blue-400 border-4 border-white dark:border-gray-800 flex-shrink-0">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${stepData.icon}"></path>
                    </svg>
                </div>
            `;

            // Content
            let binaryHTML = '';
            if(stepData.binaryString) {
                const bits = stepData.binaryString.length;
                
                // Build Headers
                let headersHTML = '';
                for (let i = bits - 1; i >= 0; i--) {
                    headersHTML += `<span class="bit-header font-mono">2<sup>${i}</sup></span>`;
                }
                
                // Build Bits
                let bitsHTML = '';
                for(let i=0; i<bits; i++) {
                    const val = stepData.binaryString[i];
                    let extraClass = '';
                    if (stepData.highlightType === 'flip') extraClass = 'highlight-flip';
                    if (stepData.highlightType === 'add') extraClass = 'highlight-add';
                    if (stepData.highlightType === 'msb' && i === 0) {
                        extraClass = 'ring-2 ring-blue-500 ring-offset-2 dark:ring-offset-gray-800';
                    }
                    bitsHTML += `<span class="bit font-mono ${extraClass}">${val}</span>`;
                }

                // Handle Carry Out
                if (stepData.carryOut === 1) {
                    headersHTML = `<span class="bit-header font-mono opacity-0">C</span>` + headersHTML;
                    bitsHTML = `
                        <div class="flex flex-col items-center mr-2">
                            <span class="text-[0.65rem] text-red-500 font-bold mb-1 uppercase tracking-wider">Carry</span>
                            <span class="bit font-mono !border-red-400 !bg-red-50 dark:!bg-red-900/20 !text-red-600 dark:!text-red-400" title="Discarded Carry Bit">1</span>
                        </div>
                        <div class="w-px bg-gray-300 dark:bg-gray-600 h-10 mx-2 self-end mb-1"></div>
                        ` + bitsHTML;
                }

                binaryHTML = `
                <div class="mt-4 bg-gray-50 dark:bg-gray-900 rounded-xl p-4 border border-gray-200 dark:border-gray-700 w-full overflow-x-auto custom-scrollbar">
                    <div class="min-w-max">
                        <div class="bit-group w-full justify-center ${stepData.carryOut ? 'pl-2' : ''}">${headersHTML}</div>
                        <div class="bit-group w-full justify-center items-end">${bitsHTML}</div>
                    </div>
                </div>`;
            }

            stepDiv.innerHTML = `
                ${iconHTML}
                <div class="flex-1 pb-2">
                    <h3 class="font-bold text-lg text-gray-900 dark:text-white mb-1">${stepData.title}</h3>
                    <p class="text-gray-600 dark:text-gray-400 text-sm leading-relaxed">${stepData.description}</p>
                    ${binaryHTML}
                </div>
            `;
            
            simulationSteps.appendChild(stepDiv);
            
            // Trigger entry animation
            requestAnimationFrame(() => {
                stepDiv.classList.add('visible');
            });
        }

        // Initialize state on first load
        prepareForStepByStep();
    </script>
</body>
</html>
