<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Algorithm Simulations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* A slightly off-white background */
        }
        .pseudo-code {
            background-color: #1e293b; /* Dark blue-gray */
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .pseudo-code .line.active {
            background-color: #3b82f6; /* Bright blue for active line */
            color: #ffffff;
            display: block;
            margin: 0 -1rem;
            padding: 0 1rem;
        }
        .list-item {
            transition: all 0.3s ease-in-out;
            border: 2px solid transparent;
        }
        .list-item.active {
            transform: translateY(-5px) scale(1.05);
            background-color: #3b82f6;
            color: white;
            border-color: #2563eb;
        }
        .variable-box {
            transition: all 0.3s ease-in-out;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .variable-box.updated {
            animation: pulse 0.6s ease;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        .tab.active {
            border-color: #3b82f6;
            background-color: #3b82f6;
            color: white;
        }
        .control-btn {
            transition: background-color 0.2s, transform 0.2s;
        }
        .control-btn:hover {
            transform: translateY(-2px);
        }
        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(0);
        }
        /* Custom Radio Buttons */
        .loop-type-radio {
            display: none;
        }
        .loop-type-label {
            display: inline-block;
            background-color: #e5e7eb;
            color: #4b5563;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            border: 2px solid transparent;
        }
        .loop-type-radio:checked + .loop-type-label {
            background-color: #dbeafe;
            color: #1d4ed8;
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto bg-white p-6 rounded-2xl shadow-lg">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800">Algorithm Simulations</h1>
            <p class="text-gray-600 mt-2">Step through common algorithms to see how they work.</p>
        </header>
        
        <div class="mb-8 p-4 bg-gray-50 rounded-xl border border-gray-200">
            <h2 class="text-xl font-bold text-gray-800 mb-2">Configure Your Array</h2>
            <p class="text-gray-600 mb-3">Enter a comma-separated list of numbers to run the simulations on.</p>
            <input type="text" id="listInput" value="12, 45, 8, 23, 19" class="w-full p-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
        </div>

        <!-- Tabs for selecting algorithm -->
        <div id="tabs" class="flex flex-wrap justify-center gap-2 mb-8">
            <!-- Tabs will be inserted here by JS -->
        </div>

        <div id="simulation-container">
            <!-- Active simulation will be displayed here -->
        </div>
    </div>

    <script>
        // --- ALGORITHM DEFINITIONS ---
        const algorithms = {
            sum: {
                title: "Summing a List",
                description: "This algorithm calculates the total of all numbers in a list.",
                baseInitialState: { sum: 0 },
                loopTypes: {
                    forIndex: {
                        name: "FOR...TO",
                        pseudoCode: [
                            "myList ← [ ... ]",
                            "sum ← 0",
                            "FOR i ← 1 TO length(myList)",
                            "  sum ← sum + myList[i-1]",
                            "NEXT i",
                            "OUTPUT sum"
                        ],
                        loopLine: 2,
                        initialState: { i: 0 },
                        step: (state) => {
                            state.variables.i = state.currentIndex + 1;
                            const number = state.list[state.currentIndex];
                            state.variables.sum += number;
                            state.log = `i is ${state.variables.i}. Adding ${number}. New sum is ${state.variables.sum}.`;
                            state.activePseudoLine = 3;
                            return ['sum', 'i'];
                        }
                    },
                    while: {
                        name: "WHILE",
                        pseudoCode: [
                            "myList ← [ ... ]",
                            "sum ← 0",
                            "i ← 1",
                            "WHILE i <= length(myList)",
                            "  sum ← sum + myList[i-1]",
                            "  i ← i + 1",
                            "ENDWHILE",
                            "OUTPUT sum"
                        ],
                        loopLine: 3,
                        initialState: { i: 1 },
                        step: (state) => {
                            const number = state.list[state.currentIndex];
                            state.variables.sum += number;
                            state.variables.i = state.currentIndex + 2;
                            state.log = `i is ${state.currentIndex + 1}. Adding ${number}. New sum is ${state.variables.sum}.`;
                            state.activePseudoLine = 4;
                            return ['sum', 'i'];
                        }
                    },
                    repeatUntil: {
                        name: "REPEAT UNTIL",
                        pseudoCode: [
                            "myList ← [ ... ]",
                            "sum ← 0",
                            "i ← 1",
                            "REPEAT",
                            "  sum ← sum + myList[i-1]",
                            "  i ← i + 1",
                            "UNTIL i > length(myList)",
                            "OUTPUT sum"
                        ],
                        loopLine: 3,
                        initialState: { i: 1 },
                        step: (state) => {
                            const number = state.list[state.currentIndex];
                            state.variables.sum += number;
                            state.variables.i = state.currentIndex + 2;
                            state.log = `i is ${state.currentIndex + 1}. Adding ${number}. New sum: ${state.variables.sum}.`;
                            state.activePseudoLine = 4;
                            return ['sum', 'i'];
                        }
                    }
                }
            },
             count: {
                title: "Counting Items",
                description: "This algorithm counts how many items are in a list.",
                baseInitialState: { count: 0 },
                loopTypes: {
                    forIndex: {
                        name: "FOR...TO",
                         pseudoCode: [
                            "myList ← [ ... ]",
                            "count ← 0",
                            "FOR i ← 1 TO length(myList)",
                            "  count ← count + 1",
                            "NEXT i",
                            "OUTPUT count"
                        ],
                        loopLine: 2,
                        initialState: { i: 0 },
                        step: (state) => {
                            state.variables.i = state.currentIndex + 1;
                            state.variables.count++;
                            state.log = `i is ${state.variables.i}. Incrementing count. New count is ${state.variables.count}.`;
                            state.activePseudoLine = 3;
                            return ['count', 'i'];
                        }
                    },
                    while: {
                        name: "WHILE",
                        pseudoCode: [
                            "myList ← [ ... ]",
                            "count ← 0",
                            "i ← 1",
                            "WHILE i <= length(myList)",
                            "  count ← count + 1",
                            "  i ← i + 1",
                            "ENDWHILE",
                            "OUTPUT count"
                        ],
                        loopLine: 3,
                        initialState: { i: 1 },
                        step: (state) => {
                            state.variables.count++;
                            state.variables.i = state.currentIndex + 2;
                            state.log = `i is ${state.currentIndex + 1}. Incrementing count. New count is ${state.variables.count}.`;
                            state.activePseudoLine = 4;
                            return ['count', 'i'];
                        }
                    },
                    repeatUntil: {
                        name: "REPEAT UNTIL",
                        pseudoCode: [
                            "myList ← [ ... ]",
                            "count ← 0",
                            "i ← 1",
                            "REPEAT",
                            "  count ← count + 1",
                            "  i ← i + 1",
                            "UNTIL i > length(myList)",
                            "OUTPUT count"
                        ],
                        loopLine: 3,
                        initialState: { i: 1 },
                        step: (state) => {
                            state.variables.count++;
                            state.variables.i = state.currentIndex + 2;
                            state.log = `i is ${state.currentIndex + 1}. Incrementing count. New count: ${state.variables.count}.`;
                            state.activePseudoLine = 4;
                            return ['count', 'i'];
                        }
                    }
                }
            },
            average: {
                title: "Calculating the Average",
                description: "This algorithm finds the average by first summing the numbers and counting the items, then dividing the sum by the count.",
                baseInitialState: { sum: 0, count: 0, average: 0 },
                loopTypes: {
                    forIndex: {
                        name: "FOR...TO",
                        pseudoCode: [
                            "myList ← [ ... ]", "sum ← 0", "count ← 0", "average ← 0",
                            "FOR i ← 1 TO length(myList)",
                            "  sum ← sum + myList[i-1]",
                            "  count ← count + 1",
                            "NEXT i",
                            "average ← sum / count",
                            "OUTPUT average"
                        ],
                        loopLine: 4,
                        initialState: { i: 0 },
                        step: (state) => {
                            state.variables.i = state.currentIndex + 1;
                            const number = state.list[state.currentIndex];
                            state.variables.sum += number;
                            state.variables.count++;
                            state.log = `i is ${state.variables.i}. New sum: ${state.variables.sum}, New count: ${state.variables.count}.`;
                            state.activePseudoLine = 5;
                            return ['sum', 'count', 'i'];
                        },
                        onFinish: (state) => {
                            if (state.variables.count > 0) {
                                state.variables.average = state.variables.sum / state.variables.count;
                            } else {
                                state.variables.average = 0;
                            }
                            state.log = `Loop finished. Calculating average: ${state.variables.sum} / ${state.variables.count} = ${state.variables.average.toFixed(2)}.`;
                            state.activePseudoLine = 8;
                            return ['average'];
                        }
                    },
                    while: {
                        name: "WHILE",
                         pseudoCode: [
                            "myList ← [ ... ]", "sum ← 0", "count ← 0", "average ← 0", "i ← 1",
                            "WHILE i <= length(myList)",
                            "  sum ← sum + myList[i-1]",
                            "  count ← count + 1",
                            "  i ← i + 1",
                            "ENDWHILE",
                            "average ← sum / count",
                            "OUTPUT average"
                        ],
                        loopLine: 5,
                        initialState: { i: 1 },
                         step: (state) => {
                            const number = state.list[state.currentIndex];
                            state.variables.sum += number;
                            state.variables.count++;
                            state.variables.i = state.currentIndex + 2;
                            state.log = `i is ${state.currentIndex + 1}. New sum: ${state.variables.sum}, New count: ${state.variables.count}.`;
                            state.activePseudoLine = 6;
                            return ['sum', 'count', 'i'];
                        },
                         onFinish: (state) => {
                            if (state.variables.count > 0) {
                                state.variables.average = state.variables.sum / state.variables.count;
                            } else {
                                state.variables.average = 0;
                            }
                            state.log = `Loop finished. Calculating average: ${state.variables.sum} / ${state.variables.count} = ${state.variables.average.toFixed(2)}.`;
                            state.activePseudoLine = 10;
                            return ['average'];
                        }
                    },
                    repeatUntil: {
                        name: "REPEAT UNTIL",
                        pseudoCode: [
                           "myList ← [ ... ]", "sum ← 0", "count ← 0", "average ← 0", "i ← 1",
                           "REPEAT",
                           "  sum ← sum + myList[i-1]",
                           "  count ← count + 1",
                           "  i ← i + 1",
                           "UNTIL i > length(myList)",
                           "average ← sum / count",
                           "OUTPUT average"
                        ],
                        loopLine: 5,
                        initialState: { i: 1 },
                        step: (state) => {
                           const number = state.list[state.currentIndex];
                           state.variables.sum += number;
                           state.variables.count++;
                           state.variables.i = state.currentIndex + 2;
                           state.log = `i is ${state.currentIndex + 1}. New sum: ${state.variables.sum}, New count: ${state.variables.count}.`;
                           state.activePseudoLine = 6;
                           return ['sum', 'count', 'i'];
                        },
                        onFinish: (state) => {
                           if (state.variables.count > 0) {
                               state.variables.average = state.variables.sum / state.variables.count;
                           } else {
                               state.variables.average = 0;
                           }
                           state.log = `Loop finished. Calculating average: ${state.variables.sum} / ${state.variables.count} = ${state.variables.average.toFixed(2)}.`;
                           state.activePseudoLine = 10;
                           return ['average'];
                        }
                    }
                }
            },
            max: {
                title: "Finding the Maximum",
                description: "This algorithm finds the largest number in a list.",
                baseInitialState: { max: '?' },
                 loopTypes: {
                    forIndex: {
                        name: "FOR...TO",
                        pseudoCode: [
                           "myList ← [ ... ]", "max ← myList[0]",
                           "FOR i ← 1 TO length(myList)",
                           "  IF myList[i-1] > max THEN",
                           "    max ← myList[i-1]",
                           "  ENDIF", "NEXT i", "OUTPUT max"
                        ],
                        loopLine: 2,
                        initialState: { i: 0 },
                        onStart: (state) => {
                           if(state.list.length > 0) {
                            state.variables.max = state.list[0];
                            state.log = `Initialization: Set max to the first item: ${state.variables.max}.`;
                           } else {
                            state.variables.max = "N/A";
                            state.log = `List is empty. Cannot find maximum.`;
                           }
                           state.activePseudoLine = 1; return ['max'];
                        },
                        step: (state) => {
                           state.variables.i = state.currentIndex + 1;
                           const number = state.list[state.currentIndex];
                           state.activePseudoLine = 3;
                           if (number > state.variables.max) {
                               state.log = `i is ${state.variables.i}. ${number} > ${state.variables.max}. New max is ${number}.`;
                               state.variables.max = number;
                               state.activePseudoLine = 4; return ['max', 'i'];
                           } else {
                               state.log = `i is ${state.variables.i}. ${number} is not > ${state.variables.max}. Max remains.`;
                               return ['i'];
                           }
                        }
                   },
                   while: {
                       name: "WHILE",
                       pseudoCode: [
                           "myList ← [ ... ]", "max ← myList[0]", "i ← 1",
                           "WHILE i <= length(myList)",
                           "  IF myList[i-1] > max THEN",
                           "    max ← myList[i-1]",
                           "  ENDIF",
                           "  i ← i + 1",
                           "ENDWHILE", "OUTPUT max"
                       ],
                       loopLine: 3,
                       initialState: { i: 1 },
                       onStart: (state) => {
                           if(state.list.length > 0) {
                            state.variables.max = state.list[0];
                            state.log = `Initialization: Set max to the first item: ${state.variables.max}.`;
                           } else {
                            state.variables.max = "N/A";
                            state.log = `List is empty. Cannot find maximum.`;
                           }
                           state.activePseudoLine = 1; return ['max'];
                       },
                       step: (state) => {
                           const number = state.list[state.currentIndex];
                           state.activePseudoLine = 4;
                           let updated = ['i'];
                           if (number > state.variables.max) {
                               state.log = `i is ${state.currentIndex+1}. ${number} > ${state.variables.max}. New max is ${number}.`;
                               state.variables.max = number;
                               state.activePseudoLine = 5;
                               updated.push('max');
                           } else {
                               state.log = `i is ${state.currentIndex+1}. ${number} is not > ${state.variables.max}. Max remains.`;
                           }
                           state.variables.i = state.currentIndex + 2;
                           return updated;
                       }
                   },
                   repeatUntil: {
                        name: "REPEAT UNTIL",
                        pseudoCode: [
                           "myList ← [ ... ]", "max ← myList[0]", "i ← 1",
                           "REPEAT",
                           "  IF myList[i-1] > max THEN",
                           "    max ← myList[i-1]",
                           "  ENDIF",
                           "  i ← i + 1",
                           "UNTIL i > length(myList)", "OUTPUT max"
                        ],
                        loopLine: 3,
                        initialState: { i: 1 },
                        onStart: (state) => {
                           if(state.list.length > 0) {
                            state.variables.max = state.list[0];
                            state.log = `Initialization: Set max to the first item: ${state.variables.max}.`;
                           } else {
                            state.variables.max = "N/A";
                            state.log = `List is empty. Cannot find maximum.`;
                           }
                           state.activePseudoLine = 1; return ['max'];
                        },
                        step: (state) => {
                           const number = state.list[state.currentIndex];
                           state.activePseudoLine = 4;
                           let updated = ['i'];
                           if (number > state.variables.max) {
                               state.log = `i is ${state.currentIndex+1}. ${number} > ${state.variables.max}. New max is ${number}.`;
                               state.variables.max = number;
                               state.activePseudoLine = 5;
                               updated.push('max');
                           } else {
                               state.log = `i is ${state.currentIndex+1}. ${number} is not > ${state.variables.max}. Max remains.`;
                           }
                           state.variables.i = state.currentIndex + 2;
                           return updated;
                        }
                   }
                }
            },
            min: {
                title: "Finding the Minimum",
                description: "This algorithm finds the smallest number in a list.",
                baseInitialState: { min: '?' },
                 loopTypes: {
                    forIndex: {
                        name: "FOR...TO",
                        pseudoCode: [ "myList ← [ ... ]", "min ← myList[0]", "FOR i ← 1 TO length(myList)", "  IF myList[i-1] < min THEN", "    min ← myList[i-1]", "  ENDIF", "NEXT i", "OUTPUT min" ],
                        loopLine: 2,
                        initialState: { i: 0 },
                        onStart: (state) => { 
                            if(state.list.length > 0) {
                                state.variables.min = state.list[0]; state.log = `Initialization: Set min to the first item: ${state.variables.min}.`; 
                            } else {
                                state.variables.min = "N/A";
                                state.log = `List is empty. Cannot find minimum.`;
                            }
                            state.activePseudoLine = 1; return ['min']; 
                        },
                        step: (state) => {
                           state.variables.i = state.currentIndex + 1; const number = state.list[state.currentIndex]; state.activePseudoLine = 3;
                           if (number < state.variables.min) {
                               state.log = `i is ${state.variables.i}. ${number} < ${state.variables.min}. New min is ${number}.`;
                               state.variables.min = number; state.activePseudoLine = 4; return ['min', 'i'];
                           } else {
                               state.log = `i is ${state.variables.i}. ${number} is not < ${state.variables.min}. Min remains.`;
                               return ['i'];
                           }
                        }
                   },
                   while: {
                       name: "WHILE",
                       pseudoCode: [ "myList ← [ ... ]", "min ← myList[0]", "i ← 1", "WHILE i <= length(myList)", "  IF myList[i-1] < min THEN", "    min ← myList[i-1]", "  ENDIF", "  i ← i + 1", "ENDWHILE", "OUTPUT min" ],
                       loopLine: 3,
                       initialState: { i: 1 },
                       onStart: (state) => { 
                            if(state.list.length > 0) {
                                state.variables.min = state.list[0]; state.log = `Initialization: Set min to the first item: ${state.variables.min}.`; 
                            } else {
                                state.variables.min = "N/A";
                                state.log = `List is empty. Cannot find minimum.`;
                            }
                            state.activePseudoLine = 1; return ['min']; 
                        },
                       step: (state) => {
                           const number = state.list[state.currentIndex]; state.activePseudoLine = 4; let updated = ['i'];
                           if (number < state.variables.min) {
                               state.log = `i is ${state.currentIndex+1}. ${number} < ${state.variables.min}. New min is ${number}.`;
                               state.variables.min = number; state.activePseudoLine = 5; updated.push('min');
                           } else {
                               state.log = `i is ${state.currentIndex+1}. ${number} is not < ${state.variables.min}. Min remains.`;
                           }
                           state.variables.i = state.currentIndex + 2;
                           return updated;
                       }
                   },
                   repeatUntil: {
                       name: "REPEAT UNTIL",
                       pseudoCode: [ "myList ← [ ... ]", "min ← myList[0]", "i ← 1", "REPEAT", "  IF myList[i-1] < min THEN", "    min ← myList[i-1]", "  ENDIF", "  i ← i + 1", "UNTIL i > length(myList)", "OUTPUT min" ],
                       loopLine: 3,
                       initialState: { i: 1 },
                       onStart: (state) => {
                            if(state.list.length > 0) {
                                state.variables.min = state.list[0]; state.log = `Initialization: Set min to the first item: ${state.variables.min}.`; 
                            } else {
                                state.variables.min = "N/A";
                                state.log = `List is empty. Cannot find minimum.`;
                            }
                            state.activePseudoLine = 1; return ['min']; 
                        },
                       step: (state) => {
                           const number = state.list[state.currentIndex]; state.activePseudoLine = 4; let updated = ['i'];
                           if (number < state.variables.min) {
                               state.log = `i is ${state.currentIndex+1}. ${number} < ${state.variables.min}. New min is ${number}.`;
                               state.variables.min = number; state.activePseudoLine = 5; updated.push('min');
                           } else {
                               state.log = `i is ${state.currentIndex+1}. ${number} is not < ${state.variables.min}. Min remains.`;
                           }
                           state.variables.i = state.currentIndex + 2;
                           return updated;
                       }
                   }
                }
            },
            find: {
                title: "Finding a Value",
                description: "This algorithm checks if a specific value exists within the list.",
                baseInitialState: { valueToFind: 23, found: 'FALSE' },
                customControls: `
                    <div class="flex items-center gap-2">
                        <label for="valueToFindInput" class="text-sm font-medium text-gray-700">Value to Find:</label>
                        <input type="number" id="valueToFindInput" value="23" class="w-24 p-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                    </div>
                `,
                loopTypes: {
                    forIndex: {
                        name: "FOR...TO",
                        pseudoCode: [ "myList ← [ ... ]", "valueToFind ← 23", "found ← FALSE", "FOR i ← 1 TO length(myList)", "  IF myList[i-1] = valueToFind THEN", "    found ← TRUE", "  ENDIF", "NEXT i", "OUTPUT found" ],
                        loopLine: 3,
                        initialState: { i: 0 },
                        step: (state) => {
                           state.variables.i = state.currentIndex + 1; const number = state.list[state.currentIndex]; const valueToFind = state.variables.valueToFind; state.activePseudoLine = 4; let updated = ['i'];
                           if (number == valueToFind) {
                               state.variables.found = 'TRUE'; state.log = `i is ${state.variables.i}. ${number} matches ${valueToFind}! Set found to TRUE.`; state.activePseudoLine = 5; updated.push('found');
                           } else {
                               state.log = `i is ${state.variables.i}. ${number} does not match ${valueToFind}.`;
                           }
                           return updated;
                        }
                   },
                   while: {
                       name: "WHILE",
                       pseudoCode: [ "myList ← [ ... ]", "valueToFind ← 23", "found ← FALSE", "i ← 1", "WHILE i <= length(myList) AND found = FALSE", "  IF myList[i-1] = valueToFind THEN", "    found ← TRUE", "  ENDIF", "  i ← i + 1", "ENDWHILE", "OUTPUT found" ],
                       loopLine: 4,
                       initialState: { i: 1 },
                       step: (state) => {
                           const number = state.list[state.currentIndex]; const valueToFind = state.variables.valueToFind; state.activePseudoLine = 5; let updated = ['i'];
                           if (number == valueToFind) {
                               state.variables.found = 'TRUE'; state.log = `i is ${state.currentIndex+1}. Match found! Set found to TRUE. Loop will terminate.`; state.activePseudoLine = 6; updated.push('found');
                           } else {
                               state.log = `i is ${state.currentIndex+1}. No match.`;
                           }
                           state.variables.i = state.currentIndex + 2;
                           return updated;
                       },
                       // Custom condition check for early exit
                       shouldContinue: (state) => state.currentIndex < state.list.length -1 && state.variables.found !== 'TRUE'
                   },
                   repeatUntil: {
                       name: "REPEAT UNTIL",
                       pseudoCode: [ "myList ← [ ... ]", "valueToFind ← 23", "found ← FALSE", "i ← 1", "REPEAT", "  IF myList[i-1] = valueToFind THEN", "    found ← TRUE", "  ENDIF", "  i ← i + 1", "UNTIL i > length(myList) OR found = TRUE", "OUTPUT found" ],
                       loopLine: 4,
                       initialState: { i: 1 },
                       step: (state) => {
                           const number = state.list[state.currentIndex]; const valueToFind = state.variables.valueToFind; state.activePseudoLine = 5; let updated = ['i'];
                           if (number == valueToFind) {
                               state.variables.found = 'TRUE'; state.log = `i is ${state.currentIndex+1}. Match found! Set found to TRUE. Loop will terminate.`; state.activePseudoLine = 6; updated.push('found');
                           } else {
                               state.log = `i is ${state.currentIndex+1}. No match.`;
                           }
                           state.variables.i = state.currentIndex + 2;
                           return updated;
                       },
                       // Custom condition check for early exit
                       shouldContinue: (state) => state.currentIndex < state.list.length -1 && state.variables.found !== 'TRUE'
                   }
                }
            }
        };

        let simState = {};
        let currentAlgoKey = 'sum';
        let currentLoopType = 'forIndex';

        function createSimulationUI(algoKey, loopType) {
            const algo = algorithms[algoKey];
            const loopData = algo.loopTypes[loopType];
            const container = document.getElementById('simulation-container');
            
            const allInitialState = {...algo.baseInitialState, ...loopData.initialState};
            const variablesHtml = Object.keys(allInitialState).map(key => `
                <div id="var-${key}" class="variable-box bg-gray-100 p-4 rounded-lg text-center">
                    <div class="text-sm font-medium text-gray-500">${key}</div>
                    <div class="text-2xl font-bold text-gray-800">${allInitialState[key]}</div>
                </div>
            `).join('');
            
            const loopTypeRadios = Object.keys(algo.loopTypes).map(key => `
                <div>
                    <input type="radio" id="loop-${key}" name="loopType" value="${key}" class="loop-type-radio" ${key === loopType ? 'checked' : ''}>
                    <label for="loop-${key}" class="loop-type-label text-sm">${algo.loopTypes[key].name}</label>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <!-- Left Column: Pseudocode and Controls -->
                    <div>
                        <h2 class="text-2xl font-bold text-gray-800 mb-2">${algo.title}</h2>
                        <p class="text-gray-600 mb-4">${algo.description}</p>

                        <div class="mb-4">
                            <h3 class="text-md font-semibold text-gray-700 mb-2">Choose Loop Type:</h3>
                            <div class="flex flex-wrap gap-2">
                                ${loopTypeRadios}
                            </div>
                        </div>

                        <div class="pseudo-code mb-4">
                            ${loopData.pseudoCode.map((line, index) => `<span class="line" data-line="${index}">${line}</span>`).join('\n')}
                        </div>
                        <div class="flex flex-wrap items-center gap-4">
                            <button id="startBtn" class="control-btn bg-blue-500 text-white font-bold py-2 px-4 rounded-lg shadow-md hover:bg-blue-600">Start</button>
                            <button id="nextBtn" class="control-btn bg-green-500 text-white font-bold py-2 px-4 rounded-lg shadow-md hover:bg-green-600" disabled>Next Step</button>
                            <button id="resetBtn" class="control-btn bg-gray-500 text-white font-bold py-2 px-4 rounded-lg shadow-md hover:bg-gray-600" disabled>Reset</button>
                            ${algo.customControls || ''}
                        </div>
                    </div>

                    <!-- Right Column: Visualization -->
                    <div>
                        <h3 class="text-xl font-semibold text-gray-700 mb-4">Visualization</h3>
                        <div id="list-container" class="flex flex-wrap justify-center gap-3 mb-6 min-h-[80px]"></div>
                        <h3 class="text-xl font-semibold text-gray-700 mb-4">Variables</h3>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">${variablesHtml}</div>
                        <h3 class="text-xl font-semibold text-gray-700 mb-4">Log</h3>
                        <div id="log" class="bg-gray-50 border border-gray-200 p-4 rounded-lg text-gray-700 min-h-[60px]">
                            Simulation not started. Click 'Start'.
                        </div>
                    </div>
                </div>
            `;
            
            // Add event listeners
            document.getElementById('startBtn').addEventListener('click', startSimulation);
            document.getElementById('nextBtn').addEventListener('click', nextStep);
            document.getElementById('resetBtn').addEventListener('click', () => selectAlgorithm(currentAlgoKey, currentLoopType));
            
            document.getElementsByName('loopType').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    selectAlgorithm(algoKey, e.target.value);
                });
            });

            if (algo.customControls) {
                 document.getElementById('valueToFindInput').addEventListener('change', (e) => {
                     if(simState.running) {
                        selectAlgorithm(currentAlgoKey, currentLoopType);
                     }
                 });
            }
        }

        function resetSimulation(algoKey, loopType) {
             const algo = algorithms[algoKey];
             const loopData = algo.loopTypes[loopType];
             const allInitialState = {...algo.baseInitialState, ...loopData.initialState};
            
             const rawList = document.getElementById('listInput').value;
             const parsedList = rawList.split(',').map(s => s.trim()).filter(s => s !== "").map(Number).filter(n => !isNaN(n));

             simState = {
                key: algoKey,
                loopType: loopType,
                list: parsedList.length > 0 ? parsedList : [12, 45, 8, 23, 19],
                currentIndex: -1,
                variables: JSON.parse(JSON.stringify(allInitialState)),
                finished: false,
                running: false,
                log: "Simulation reset. Click 'Start'.",
                activePseudoLine: -1
             };
             
             // Update the pseudocode with the current list
             const pseudoLineZero = document.querySelector(`.pseudo-code .line[data-line="0"]`);
             if (pseudoLineZero) {
                 pseudoLineZero.textContent = `myList ← [${simState.list.join(', ')}]`;
             }

             if (algoKey === 'find') {
                const inputValue = parseInt(document.getElementById('valueToFindInput').value, 10);
                simState.variables.valueToFind = isNaN(inputValue) ? 23 : inputValue;
                const pseudoLineOne = document.querySelector(`[data-line="1"]`);
                if(pseudoLineOne) pseudoLineOne.textContent = `valueToFind ← ${simState.variables.valueToFind}`;
             }
             
             updateUI();
             document.getElementById('startBtn').disabled = false;
             document.getElementById('nextBtn').disabled = true;
             document.getElementById('resetBtn').disabled = true;
        }

        function startSimulation() {
            resetSimulation(currentAlgoKey, currentLoopType);
            simState.running = true;
            
            const loopData = algorithms[simState.key].loopTypes[simState.loopType];
            
            simState.log = "Simulation started. Ready for first step.";
            simState.activePseudoLine = loopData.loopLine -1;

            if (simState.list.length === 0) {
                simState.finished = true;
                simState.log = "The list is empty. Nothing to process.";
                if(loopData.onFinish) loopData.onFinish(simState);
                document.getElementById('nextBtn').disabled = true;
            }

            if (loopData.onStart) {
                const updatedVars = loopData.onStart(simState);
                updateUI(updatedVars);
            } else {
                updateUI();
            }

            document.getElementById('startBtn').disabled = true;
            document.getElementById('nextBtn').disabled = simState.finished;
            document.getElementById('resetBtn').disabled = false;
        }

        function nextStep() {
            if (simState.finished) return;
            
            simState.currentIndex++;
            const loopData = algorithms[simState.key].loopTypes[simState.loopType];
            let updatedVars = [];
            
            const continueCondition = loopData.shouldContinue ? loopData.shouldContinue(simState) : simState.currentIndex < simState.list.length;

            if (continueCondition) {
                updatedVars = loopData.step(simState);
            } else {
                simState.finished = true;
                if (loopData.onFinish) {
                    updatedVars = loopData.onFinish(simState);
                } else {
                    simState.log = "Algorithm finished running.";
                    simState.activePseudoLine = loopData.pseudoCode.length - 1;
                }
                document.getElementById('nextBtn').disabled = true;
            }
            updateUI(updatedVars);
        }

        function updateUI(updatedVars = []) {
            const listContainer = document.getElementById('list-container');
            if (listContainer) {
                if(simState.list && simState.list.length > 0) {
                    listContainer.innerHTML = simState.list.map((item, index) => `
                        <div class="list-item w-20 h-20 flex items-center justify-center text-2xl font-bold bg-gray-200 rounded-lg ${index === simState.currentIndex ? 'active' : ''}">
                            ${item}
                        </div>
                    `).join('');
                } else {
                    listContainer.innerHTML = `<p class="text-gray-500">List is empty.</p>`;
                }
            }

            for (const key in simState.variables) {
                const el = document.getElementById(`var-${key}`);
                if (el) {
                    el.children[1].textContent = typeof simState.variables[key] === 'number' && !Number.isInteger(simState.variables[key])
                        ? simState.variables[key].toFixed(2)
                        : simState.variables[key];
                    el.classList.remove('updated');
                    if(updatedVars.includes(key)){
                        setTimeout(() => el.classList.add('updated'), 10);
                    }
                }
            }
            
            const logEl = document.getElementById('log');
            if (logEl) logEl.textContent = simState.log;

            document.querySelectorAll('.pseudo-code .line').forEach(line => line.classList.remove('active'));
            if(simState.activePseudoLine >= 0) {
                const activeLine = document.querySelector(`.pseudo-code .line[data-line="${simState.activePseudoLine}"]`);
                if(activeLine) activeLine.classList.add('active');
            }
        }
        
        function setupTabs() {
            const tabsContainer = document.getElementById('tabs');
            tabsContainer.innerHTML = Object.keys(algorithms).map(key => `
                <button data-algo="${key}" class="tab border-2 border-transparent text-sm md:text-base font-semibold py-2 px-4 rounded-full transition-colors duration-200">
                    ${algorithms[key].title}
                </button>
            `).join('');
            
            tabsContainer.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON') {
                    selectAlgorithm(e.target.dataset.algo, currentLoopType);
                }
            });
        }
        
        function selectAlgorithm(algoKey, loopType = 'forIndex') {
            currentAlgoKey = algoKey;
            
            if (!algorithms[algoKey].loopTypes[loopType]) {
                currentLoopType = 'forIndex';
            } else {
                currentLoopType = loopType;
            }

            document.querySelectorAll('#tabs .tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.algo === algoKey);
            });
            createSimulationUI(algoKey, currentLoopType);
            resetSimulation(algoKey, currentLoopType);
        }

        window.onload = () => {
            setupTabs();
            selectAlgorithm('sum', 'forIndex'); // Start with the first algorithm and default loop
        };
    </script>
</body>
</html>
