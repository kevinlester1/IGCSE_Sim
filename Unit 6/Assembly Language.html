<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assembly Language Simulator</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icons (Inlined for standalone usage) ---
        const Icon = ({ path, className, color }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width="24" 
                height="24" 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {path}
            </svg>
        );

        const Play = (props) => <Icon {...props} path={<polygon points="5 3 19 12 5 21 5 3"></polygon>} />;
        const SkipForward = (props) => <Icon {...props} path={<><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></>} />;
        const RotateCcw = (props) => <Icon {...props} path={<><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></>} />;
        const Save = (props) => <Icon {...props} path={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></>} />;
        const BookOpen = (props) => <Icon {...props} path={<><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></>} />;
        const Cpu = (props) => <Icon {...props} path={<><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></>} />;
        const Database = (props) => <Icon {...props} path={<><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s 9-1.34 9-3V5"></path></>} />;
        const CheckCircle = (props) => <Icon {...props} path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></>} />;
        const AlertCircle = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></>} />;
        const Terminal = (props) => <Icon {...props} path={<><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></>} />;
        const Code = (props) => <Icon {...props} path={<><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></>} />;


        const AssemblySimulator = () => {
            // --- State ---
            const [code, setCode] = useState("");
            const [output, setOutput] = useState([]);
            const [registers, setRegisters] = useState({ R0: 0, R1: 0, R2: 0, R3: 0 });
            const [memory, setMemory] = useState(Array(16).fill(0));
            const [pc, setPc] = useState(0); // Program Counter
            const [flags, setFlags] = useState({ Z: 0, N: 0 }); // Zero, Negative
            const [isRunning, setIsRunning] = useState(false);
            const [error, setError] = useState(null);
            const [speed, setSpeed] = useState(500);
            const [instructions, setInstructions] = useState([]);
            const [labels, setLabels] = useState({});
            const [activeTab, setActiveTab] = useState('editor'); // 'editor' or 'presets'

            const runInterval = useRef(null);

            // --- Constants & Presets ---
            const PRESETS = {
                simple: {
                name: "Simple Math",
                desc: "Basic addition: a = 5 + 3",
                code: `; Simple Addition (R0 = 5 + 3)
MOV R0, 5    ; Load 5 into R0
MOV R1, 3    ; Load 3 into R1
ADD R0, R1   ; Add R1 to R0
HLT          ; Stop`
                },
                loop: {
                name: "Loop (For Loop)",
                desc: "Count down from 5 to 0",
                code: `; Loop Example
; for(i=5; i>0; i--)

MOV R0, 5      ; Initialize counter i=5

LOOP_START:
  CMP R0, 0    ; Compare R0 with 0
  JZ END       ; Jump to END if R0 == 0
  
  SUB R0, 1    ; Decrement R0
  JMP LOOP_START ; Jump back to start

END:
  HLT          ; Stop`
                },
                memory: {
                name: "Memory Access",
                desc: "Store and Load from RAM",
                code: `; Memory Operations
MOV R0, 42     ; Value to store
STORE R0, 0    ; Store R0 into Mem[0]
MOV R1, 0      ; Clear R1
LOAD R1, 0     ; Load Mem[0] into R1
ADD R1, 8      ; Modify value
STORE R1, 1    ; Store result in Mem[1]
HLT`
                },
                challenge: {
                name: "CHALLENGE: Sum 1 to 5",
                desc: "Calculate 1+2+3+4+5. Result must be 15 in R0.",
                code: `; CHALLENGE: Sum numbers 1 to 5
; Goal: R0 should equal 15 (1+2+3+4+5)
; Use R1 as your counter.

MOV R0, 0    ; Accumulator (Sum)
MOV R1, 5    ; Counter (Start at 5)

; TODO: Write a loop here to add R1 to R0
; and decrement R1 until it reaches 0.



HLT`
                }
            };

            // --- Logic ---

            const parseCode = (sourceCode) => {
                const lines = sourceCode.split('\n');
                const parsedOps = [];
                const foundLabels = {};
                
                // First pass: Clean code and find labels
                let validLineIndex = 0;

                lines.forEach((line, index) => {
                    let cleanLine = line.split(';')[0].trim(); // Remove comments
                    if (!cleanLine) return;

                    if (cleanLine.endsWith(':')) {
                        const labelName = cleanLine.slice(0, -1).toUpperCase();
                        foundLabels[labelName] = validLineIndex;
                    } else if (cleanLine.includes(':')) {
                        // Handle "LABEL: INSTRUCTION" on same line
                        const parts = cleanLine.split(':');
                        const labelName = parts[0].trim().toUpperCase();
                        foundLabels[labelName] = validLineIndex;
                        parsedOps.push(parts[1].trim());
                        validLineIndex++;
                    } else {
                        parsedOps.push(cleanLine);
                        validLineIndex++;
                    }
                });

                return { ops: parsedOps, lbls: foundLabels };
            };

            const resetMachine = () => {
                setRegisters({ R0: 0, R1: 0, R2: 0, R3: 0 });
                setMemory(Array(16).fill(0));
                setPc(0);
                setFlags({ Z: 0, N: 0 });
                setError(null);
                setOutput(["System ready."]);
                stopExecution();
            };

            const executeStep = () => {
                // If not already parsed or PC is out of bounds, stop
                if (pc >= instructions.length) {
                    stopExecution();
                    setOutput(prev => [...prev, "Program finished."]);
                    return;
                }

                const currentLine = instructions[pc];
                const parts = currentLine.replace(/,/g, ' ').split(/\s+/).filter(x => x);
                const op = parts[0].toUpperCase();
                const args = parts.slice(1).map(a => a.toUpperCase());

                let nextPc = pc + 1;
                let newRegisters = { ...registers };
                let newMemory = [...memory];
                let newFlags = { ...flags };
                let jumpTaken = false;

                // Helper to get value (either register or literal)
                const getValue = (arg) => {
                    if (['R0', 'R1', 'R2', 'R3'].includes(arg)) {
                        return newRegisters[arg];
                    }
                    return parseInt(arg);
                };

                try {
                switch (op) {
                    case 'MOV': // MOV dest, src
                    if (['R0', 'R1', 'R2', 'R3'].includes(args[0])) {
                        newRegisters[args[0]] = getValue(args[1]);
                    }
                    break;
                    case 'ADD': // ADD dest, src
                    if (['R0', 'R1', 'R2', 'R3'].includes(args[0])) {
                        newRegisters[args[0]] += getValue(args[1]);
                        // Flag update
                        newFlags.Z = newRegisters[args[0]] === 0 ? 1 : 0;
                        newFlags.N = newRegisters[args[0]] < 0 ? 1 : 0;
                    }
                    break;
                    case 'SUB': // SUB dest, src
                    if (['R0', 'R1', 'R2', 'R3'].includes(args[0])) {
                        newRegisters[args[0]] -= getValue(args[1]);
                        // Flag update
                        newFlags.Z = newRegisters[args[0]] === 0 ? 1 : 0;
                        newFlags.N = newRegisters[args[0]] < 0 ? 1 : 0;
                    }
                    break;
                    case 'CMP': // CMP a, b (updates flags only)
                    const valA = getValue(args[0]);
                    const valB = getValue(args[1]);
                    const diff = valA - valB;
                    newFlags.Z = diff === 0 ? 1 : 0;
                    newFlags.N = diff < 0 ? 1 : 0;
                    break;
                    case 'JMP': // Unconditional Jump
                    if (labels[args[0]] !== undefined) {
                        nextPc = labels[args[0]];
                        jumpTaken = true;
                    } else { throw new Error(`Unknown Label: ${args[0]}`); }
                    break;
                    case 'JZ': // Jump if Zero
                    case 'JE':
                    if (flags.Z === 1) {
                        if (labels[args[0]] !== undefined) {
                        nextPc = labels[args[0]];
                        jumpTaken = true;
                        } else { throw new Error(`Unknown Label: ${args[0]}`); }
                    }
                    break;
                    case 'JNZ': // Jump if Not Zero
                    case 'JNE':
                    if (flags.Z === 0) {
                        if (labels[args[0]] !== undefined) {
                        nextPc = labels[args[0]];
                        jumpTaken = true;
                        } else { throw new Error(`Unknown Label: ${args[0]}`); }
                    }
                    break;
                    case 'STORE': // STORE reg, addr
                    const addr = parseInt(args[1]);
                    if (addr >= 0 && addr < 16) {
                        newMemory[addr] = getValue(args[0]);
                    }
                    break;
                    case 'LOAD': // LOAD reg, addr
                    const loadAddr = parseInt(args[1]);
                    if (loadAddr >= 0 && loadAddr < 16) {
                        if (['R0', 'R1', 'R2', 'R3'].includes(args[0])) {
                            newRegisters[args[0]] = newMemory[loadAddr];
                        }
                    }
                    break;
                    case 'HLT':
                    stopExecution();
                    setOutput(prev => [...prev, "Halt reached."]);
                    return; // Stop immediately
                    default:
                    console.log("Unknown instruction", op);
                    break;
                }

                setRegisters(newRegisters);
                setMemory(newMemory);
                setFlags(newFlags);
                setPc(nextPc);
                
                } catch (e) {
                    setError(e.message);
                    stopExecution();
                }
            };

            const startExecution = () => {
                if (code.trim() === "") return;
                
                // If starting from 0, parse first
                if (pc === 0) {
                    const { ops, lbls } = parseCode(code);
                    setInstructions(ops);
                    setLabels(lbls);
                    
                    if (ops.length === 0) {
                        setError("No executable code found.");
                        return;
                    }
                }
                
                setIsRunning(true);
            };

            const stopExecution = () => {
                setIsRunning(false);
                if (runInterval.current) {
                clearInterval(runInterval.current);
                runInterval.current = null;
                }
            };

            const stepOnce = () => {
                // If not parsed yet (PC=0 and empty instructions), parse first
                if (pc === 0 && instructions.length === 0) {
                    const { ops, lbls } = parseCode(code);
                    setInstructions(ops);
                    setLabels(lbls);
                    setOutput(prev => [...prev, "Code loaded. Ready to step."]);
                    return;
                }
                executeStep();
            };

            // Effect to handle running interval
            useEffect(() => {
                if (isRunning) {
                    if (instructions.length === 0 && pc === 0) {
                        const { ops, lbls } = parseCode(code);
                        setInstructions(ops);
                        setLabels(lbls);
                    }
                }
            }, [isRunning, code]);

            // Stepping timer
            useEffect(() => {
                let timeout;
                if (isRunning) {
                timeout = setTimeout(() => {
                    executeStep();
                }, speed);
                }
                return () => clearTimeout(timeout);
            }, [isRunning, pc, instructions]);

            // load preset
            const loadPreset = (key) => {
                resetMachine();
                setCode(PRESETS[key].code);
                setOutput([`Loaded: ${PRESETS[key].name}`]);
            };

            // Challenge Checker
            const checkChallenge = () => {
                if (registers.R0 === 15) {
                return true;
                }
                return false;
            };

            return (
                <div className="flex flex-col h-screen bg-slate-900 text-slate-100 font-mono overflow-hidden">
                {/* Header */}
                <header className="flex items-center justify-between px-6 py-4 bg-slate-800 border-b border-slate-700 shadow-md z-10">
                    <div className="flex items-center gap-3">
                    <Cpu className="w-8 h-8 text-blue-400" />
                    <h1 className="text-xl font-bold tracking-wider text-blue-100">ASM<span className="text-blue-500">SIM</span></h1>
                    </div>
                    <div className="flex gap-3">
                    <button 
                        onClick={resetMachine}
                        className="flex items-center gap-2 px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded text-sm transition-colors"
                    >
                        <RotateCcw className="w-4 h-4" /> Reset
                    </button>
                    <button 
                        onClick={() => window.open('https://en.wikipedia.org/wiki/Assembly_language', '_blank')}
                        className="flex items-center gap-2 px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded text-sm transition-colors"
                    >
                        <BookOpen className="w-4 h-4" /> Help
                    </button>
                    </div>
                </header>

                <main className="flex-1 flex overflow-hidden">
                    
                    {/* Left Column: Editor */}
                    <div className="flex-1 flex flex-col border-r border-slate-700 max-w-[50%]">
                    {/* Tabs */}
                    <div className="flex bg-slate-800 border-b border-slate-700">
                        <button 
                        onClick={() => setActiveTab('editor')}
                        className={`px-6 py-3 text-sm font-semibold flex items-center gap-2 ${activeTab === 'editor' ? 'bg-slate-700 text-white border-t-2 border-blue-500' : 'text-slate-400 hover:text-white'}`}
                        >
                        <Code className="w-4 h-4" /> Editor
                        </button>
                        <button 
                        onClick={() => setActiveTab('presets')}
                        className={`px-6 py-3 text-sm font-semibold flex items-center gap-2 ${activeTab === 'presets' ? 'bg-slate-700 text-white border-t-2 border-green-500' : 'text-slate-400 hover:text-white'}`}
                        >
                        <Save className="w-4 h-4" /> Presets
                        </button>
                    </div>

                    {activeTab === 'editor' ? (
                        <div className="flex-1 relative flex flex-col">
                            <div className="flex-1 relative bg-slate-900">
                            {/* Line Numbers */}
                            <div className="absolute left-0 top-0 bottom-0 w-10 bg-slate-800 text-slate-500 text-right pr-2 pt-4 text-sm font-mono select-none border-r border-slate-700">
                                {code.split('\n').map((_, i) => (
                                <div key={i} className="leading-6">{i+1}</div>
                                ))}
                            </div>
                            <textarea
                                value={code}
                                onChange={(e) => setCode(e.target.value)}
                                className="w-full h-full pl-12 pr-4 py-4 bg-transparent text-slate-100 outline-none resize-none leading-6 font-mono text-sm"
                                spellCheck="false"
                                placeholder="MOV R0, 10..."
                            />
                            </div>
                            {/* Console Output */}
                            <div className="h-32 bg-black border-t border-slate-700 p-2 overflow-y-auto font-mono text-xs text-green-400">
                            <div className="flex items-center gap-2 text-slate-500 mb-1 font-bold select-none"><Terminal className="w-3 h-3"/> SYSTEM CONSOLE</div>
                            {output.map((line, i) => <div key={i}>{`> ${line}`}</div>)}
                            {error && <div className="text-red-400 font-bold">{`ERROR: ${error}`}</div>}
                            </div>
                        </div>
                    ) : (
                        <div className="flex-1 bg-slate-800 p-6 overflow-y-auto">
                        <h3 className="text-lg font-bold mb-4 text-white">Load Example Code</h3>
                        <div className="grid gap-4">
                            {Object.entries(PRESETS).map(([key, data]) => (
                            <button 
                                key={key}
                                onClick={() => { loadPreset(key); setActiveTab('editor'); }}
                                className="text-left p-4 rounded-lg bg-slate-700 hover:bg-slate-600 border border-slate-600 hover:border-blue-400 transition-all group"
                            >
                                <div className="font-bold text-blue-300 group-hover:text-white">{data.name}</div>
                                <div className="text-sm text-slate-400 mt-1">{data.desc}</div>
                            </button>
                            ))}
                        </div>
                        
                        <div className="mt-8 p-4 bg-indigo-900/30 border border-indigo-500/30 rounded-lg">
                            <h4 className="font-bold text-indigo-300 mb-2">Instruction Set Reference</h4>
                            <ul className="text-xs space-y-2 text-slate-300">
                                <li><code className="text-yellow-400">MOV dest, src</code> - Copy value (e.g., MOV R0, 5)</li>
                                <li><code className="text-yellow-400">ADD dest, src</code> - Add (dest = dest + src)</li>
                                <li><code className="text-yellow-400">SUB dest, src</code> - Subtract (dest = dest - src)</li>
                                <li><code className="text-yellow-400">CMP a, b</code> - Compare values (sets flags)</li>
                                <li><code className="text-yellow-400">JMP label</code> - Jump to label</li>
                                <li><code className="text-yellow-400">JZ label</code> - Jump if Zero (last result was 0)</li>
                                <li><code className="text-yellow-400">STORE reg, addr</code> - Save reg to RAM address</li>
                                <li><code className="text-yellow-400">LOAD reg, addr</code> - Load RAM address to reg</li>
                                <li><code className="text-yellow-400">HLT</code> - Stop program</li>
                            </ul>
                        </div>
                        </div>
                    )}
                    </div>

                    {/* Right Column: Visualization */}
                    <div className="flex-1 flex flex-col bg-slate-900 p-6 overflow-y-auto">
                    
                    {/* Controls */}
                    <div className="flex gap-4 mb-8">
                        {!isRunning ? (
                        <button onClick={startExecution} className="flex-1 py-3 bg-green-600 hover:bg-green-500 text-white rounded font-bold shadow-lg shadow-green-900/50 flex items-center justify-center gap-2 transition-all">
                            <Play className="w-5 h-5" /> Run Code
                        </button>
                        ) : (
                        <button onClick={stopExecution} className="flex-1 py-3 bg-red-600 hover:bg-red-500 text-white rounded font-bold shadow-lg shadow-red-900/50 flex items-center justify-center gap-2 transition-all">
                            <div className="w-4 h-4 bg-white rounded-sm animate-pulse" /> Stop
                        </button>
                        )}
                        
                        <button onClick={stepOnce} disabled={isRunning} className="flex-1 py-3 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded font-bold shadow-lg shadow-blue-900/50 flex items-center justify-center gap-2 transition-all">
                        <SkipForward className="w-5 h-5" /> Step
                        </button>
                    </div>

                    {/* Registers */}
                    <div className="bg-slate-800 rounded-xl p-6 border border-slate-700 mb-6 shadow-xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-2 opacity-10 pointer-events-none"><Cpu size={120} /></div>
                        <h3 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                            <Cpu className="w-4 h-4" /> Registers
                        </h3>
                        <div className="grid grid-cols-2 gap-4 relative z-10">
                            {Object.keys(registers).map((reg) => (
                            <div key={reg} className="bg-slate-900 p-3 rounded border border-slate-700 flex justify-between items-center group hover:border-blue-500 transition-colors">
                                <span className="font-bold text-slate-500">{reg}</span>
                                <span className="font-mono text-xl text-blue-400">{registers[reg]}</span>
                            </div>
                            ))}
                        </div>
                        
                        {/* Status Flags & PC */}
                        <div className="grid grid-cols-2 gap-4 mt-4 pt-4 border-t border-slate-700">
                            <div className="flex flex-col">
                            <span className="text-xs text-slate-500 uppercase">Program Counter</span>
                            <span className="font-mono text-lg text-white">{pc}</span>
                            </div>
                            <div className="flex gap-4">
                            <div className="flex flex-col items-center">
                                <span className="text-xs text-slate-500 mb-1">ZERO (Z)</span>
                                <div className={`w-3 h-3 rounded-full ${flags.Z ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)]' : 'bg-slate-700'}`}></div>
                            </div>
                            <div className="flex flex-col items-center">
                                <span className="text-xs text-slate-500 mb-1">NEG (N)</span>
                                <div className={`w-3 h-3 rounded-full ${flags.N ? 'bg-yellow-500 shadow-[0_0_8px_rgba(234,179,8,0.8)]' : 'bg-slate-700'}`}></div>
                            </div>
                            </div>
                        </div>
                    </div>

                    {/* Memory */}
                    <div className="bg-slate-800 rounded-xl p-6 border border-slate-700 mb-6 flex-1 shadow-xl">
                        <h3 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                            <Database className="w-4 h-4" /> Memory (RAM)
                        </h3>
                        <div className="grid grid-cols-4 gap-3">
                            {memory.map((val, idx) => (
                            <div key={idx} className="aspect-square bg-slate-900 rounded border border-slate-700 flex flex-col items-center justify-center hover:border-purple-500 transition-colors relative">
                                <span className="absolute top-1 left-1 text-[10px] text-slate-600">x{idx.toString(16).toUpperCase()}</span>
                                <span className={`font-mono font-bold ${val !== 0 ? 'text-purple-400' : 'text-slate-600'}`}>
                                    {val}
                                </span>
                            </div>
                            ))}
                        </div>
                    </div>

                    {/* Challenge Status */}
                    {code.includes("CHALLENGE") && (
                        <div className={`rounded-xl p-4 border transition-all duration-500 ${checkChallenge() ? 'bg-green-900/20 border-green-500/50' : 'bg-slate-800 border-slate-700'}`}>
                            <div className="flex items-center gap-3">
                            {checkChallenge() ? (
                                <CheckCircle className="w-8 h-8 text-green-500 animate-bounce" />
                            ) : (
                                <AlertCircle className="w-8 h-8 text-slate-500" />
                            )}
                            <div>
                                <h4 className={`font-bold ${checkChallenge() ? 'text-green-400' : 'text-slate-400'}`}>
                                    {checkChallenge() ? "Challenge Complete!" : "Challenge Active"}
                                </h4>
                                <p className="text-sm text-slate-500">
                                    {checkChallenge() 
                                        ? "Great job! You've successfully calculated the sum." 
                                        : "Write code to make R0 equal to 15."}
                                </p>
                            </div>
                            </div>
                        </div>
                    )}

                    </div>
                </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AssemblySimulator />);
    </script>
</body>
</html>
