        const steps = [
            {

                python: `# Read the analysis above first!

`,
                pseudo: `// Read the analysis above first!
// Understanding the question is 50% of the work.

// Key Requirements:
// 1. Parallel Arrays
// 2. Validation Loop (REPEAT...UNTIL)
// 3. Formatting (ROUND)
`

            {
                id: 'setup',

                <div className="space-y-4">

                    </p>
                    <div className="bg-yellow-50 border border-yellow-200 p-3 rounded text-sm text-yellow-800 flex gap-2">

                    </div>
                </div>
                ),
                python: `# Initialize Days array
days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"]

# Initialize other arrays (Python lists)
# 7 rows, 24 columns for Readings
readings = [[0.0] * 24 for _ in range(7)]

overall_total = 0
overall_count = 0`,
                pseudo: `// Arrays are assumed declared, but we must populate Days

// Variables for whole week calculation

`
            },
            {

                title: '2. Loops & Validation',
                icon: <Icons.AlertCircle className="w-5 h-5" />,

                <div className="space-y-4">

                    </p>
                    <div className="bg-red-50 border-l-4 border-red-400 p-3 rounded-r">
                    <h4 className="font-bold text-red-800 text-sm">CRITICAL: Validation</h4>
                    <p className="text-sm text-red-700 mt-1">
                        You MUST use a loop (While/Repeat) for validation. An 'IF' statement is not enough because the user might enter invalid data twice.
                    </p>
                    </div>
                </div>
                ),
                python: `for i in range(7):  # Loop through 7 Days
    day_total = 0
    print(f"Enter temps for {days[i]}")

    for j in range(24): # Loop through 24 Hours
        valid = False
        while not valid:
            try:
                temp = float(input(f"Hour {j}: "))
                if temp >= -20.0 and temp <= 50.0:
                    valid = True
                else:
                    print("Error: Range -20.0 to 50.0")
            except ValueError:
                print("Error: Enter a number")
        
        # Store and sum
        readings[i][j] = temp
        day_total += temp`,
                pseudo: `FOR Index <- 1 TO 7
    DayTotal <- 0
    OUTPUT "Enter temperatures for ", Days[Index]
    
    FOR Hour <- 1 TO 24
        REPEAT
            OUTPUT "Enter temp for hour ", Hour
            INPUT Temp
            IF Temp < -20.0 OR Temp > 50.0 THEN
                OUTPUT "Invalid. Must be -20 to 50"
            ENDIF
        UNTIL Temp >= -20.0 AND Temp <= 50.0
        
        Readings[Index, Hour] <- Temp
        DayTotal <- DayTotal + Temp
    NEXT Hour
    
    // ... calculate daily average here ...
NEXT Index`

                python: `    # Inside the outer 'day' loop
    avg = day_total / 24
    average_temp[i] = avg
    
    # Add to overall total
    overall_total += day_total

# After all loops finish
overall_average_c = overall_total / (7 * 24)`,
                pseudo: `    // Inside the FOR Index loop
    DailyAvg <- DayTotal / 24
    AverageTemp[Index] <- DailyAvg
    
    OverallTotal <- OverallTotal + DayTotal
NEXT Index

// After loops
OverallAverageC <- OverallTotal / 168`

                    </div>
                </div>
                ),
                python: `def to_fahrenheit(c):
    return (c * 9/5) + 32

print("\\n--- Weekly Report ---")

# Output for each day
for i in range(7):
    c_val = average_temp[i]
    f_val = to_fahrenheit(c_val)
    print(f"{days[i]}: {round(c_val, 1)}°C / {round(f_val, 1)}°F")

# Output for whole week
overall_f = to_fahrenheit(overall_average_c)
print(f"Week Average: {round(overall_average_c, 1)}°C / {round(overall_f, 1)}°F")`,
                pseudo: `// Output loop
FOR Index <- 1 TO 7
    CVal <- AverageTemp[Index]
    FVal <- (CVal * 9/5) + 32

NEXT Index

// Weekly Output

OUTPUT "Week Avg: ", ROUND(OverallF, 1), "F"`

        function IGCSEGuide() {
            const [activeStep, setActiveStep] = useState(0);
            const [viewMode, setViewMode] = useState('both'); // 'python', 'pseudo', 'both'

            const current = steps[activeStep];

            return (
                <div className="min-h-screen p-4 font-sans text-gray-800">
                <div className="max-w-6xl mx-auto bg-white rounded-xl shadow-xl overflow-hidden flex flex-col md:flex-row h-[90vh]">
                    
                    {/* Sidebar Navigation */}
                    <div className="w-full md:w-64 bg-gray-900 text-white flex-shrink-0 flex flex-col">
                    <div className="p-6 border-b border-gray-800">
                        <h1 className="text-xl font-bold tracking-tight">IGCSE CS 0984</h1>
                        <p className="text-xs text-gray-400 mt-1">15 Mark Question Guide</p>
                    </div>
                    <nav className="flex-1 overflow-y-auto py-4">
                        {steps.map((step, index) => (
                        <button
                            key={step.id}
                            onClick={() => setActiveStep(index)}
                            className={`w-full text-left px-6 py-4 flex items-center gap-3 transition-colors ${
                            activeStep === index 
                                ? 'bg-blue-600 text-white' 
                                : 'text-gray-400 hover:bg-gray-800 hover:text-white'
                            }`}
                        >
                            <div className={`${activeStep === index ? 'text-white' : 'text-gray-500'}`}>
                            {step.icon}
                            </div>
                            <div className="flex-1">
                            <span className="text-xs font-uppercase tracking-wider opacity-70">Step {index + 1}</span>
                            <p className="font-medium text-sm truncate">{step.title}</p>
                            </div>
                        </button>
                        ))}
                    </nav>
                    
                    <div className="p-4 border-t border-gray-800 bg-gray-900">
                        <div className="text-xs text-gray-500 text-center">
                        Navigate Steps
                        </div>
                        <div className="flex gap-2 mt-2">
                            <button 
                            disabled={activeStep === 0}
                            onClick={() => setActiveStep(prev => prev - 1)}
                            className="flex-1 bg-gray-800 hover:bg-gray-700 disabled:opacity-30 p-2 rounded flex justify-center"
                            >
                            <Icons.ChevronLeft size={16} />
                            </button>
                            <button 
                            disabled={activeStep === steps.length - 1}
                            onClick={() => setActiveStep(prev => prev + 1)}
                            className="flex-1 bg-blue-600 hover:bg-blue-500 disabled:opacity-30 p-2 rounded flex justify-center"
                            >
                            <Icons.ChevronRight size={16} />
                            </button>
                        </div>
                    </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-1 flex flex-col min-w-0">
                    
                    {/* Header */}
                    <header className="bg-white border-b border-gray-200 p-6 flex justify-between items-center">
                        <div>
                        <h2 className="text-2xl font-bold text-gray-800">{current.title}</h2>
                        <p className="text-sm text-gray-500">Breakdown of requirements and logic</p>
                        </div>
                        
                        <div className="flex bg-gray-100 p-1 rounded-lg">
                        <button 
                            onClick={() => setViewMode('python')}
                            className={`px-3 py-1 text-sm rounded-md transition-all ${viewMode === 'python' ? 'bg-white shadow text-blue-600 font-bold' : 'text-gray-600'}`}
                        >
                            Python
                        </button>
                        <button 
                            onClick={() => setViewMode('pseudo')}
                            className={`px-3 py-1 text-sm rounded-md transition-all ${viewMode === 'pseudo' ? 'bg-white shadow text-blue-600 font-bold' : 'text-gray-600'}`}
                        >
                            Pseudocode
                        </button>
                        <button 
                            onClick={() => setViewMode('both')}
                            className={`px-3 py-1 text-sm rounded-md transition-all ${viewMode === 'both' ? 'bg-white shadow text-blue-600 font-bold' : 'text-gray-600'}`}
                        >
                            Split View
                        </button>
                        </div>
                    </header>

                    {/* Scrollable Content */}
                    <div className="flex-1 overflow-y-auto p-6">
                        
                        {/* Explanation Block */}
                        <div className="mb-8 bg-white">
                        {current.content}
                        </div>

                        {/* Code Blocks */}
                        <div className={`grid gap-6 ${viewMode === 'both' ? 'lg:grid-cols-2' : 'grid-cols-1'}`}>
                        
                        {/* Python Column */}
                        {(viewMode === 'python' || viewMode === 'both') && (
                            <div className="flex flex-col">
                            <div className="flex items-center justify-between mb-2">
                                <span className="flex items-center gap-2 font-bold text-gray-700">
                                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg" className="w-5 h-5" alt="py" />
                                Python Solution
                                </span>
                            </div>
                            <div className="relative group flex-1">
                                <div className="absolute -inset-1 bg-gradient-to-r from-blue-100 to-indigo-100 rounded-lg blur opacity-25 group-hover:opacity-50 transition duration-200"></div>
                                <div className="relative bg-gray-900 rounded-lg p-4 shadow-inner overflow-x-auto h-full">
                                <pre className="text-sm font-mono text-blue-100 whitespace-pre-wrap">
                                    {current.python}
                                </pre>
                                </div>
                            </div>
                            </div>
                        )}

                        {/* Pseudocode Column */}
                        {(viewMode === 'pseudo' || viewMode === 'both') && (
                            <div className="flex flex-col">
                            <div className="flex items-center justify-between mb-2">
                                <span className="flex items-center gap-2 font-bold text-gray-700">
                                <Icons.Code className="w-5 h-5 text-purple-600" />
                                Pseudocode (IGCSE Style)
                                </span>
                            </div>
                            <div className="relative group flex-1">
                                <div className="absolute -inset-1 bg-gradient-to-r from-purple-100 to-pink-100 rounded-lg blur opacity-25 group-hover:opacity-50 transition duration-200"></div>
                                <div className="relative bg-gray-50 border border-gray-200 rounded-lg p-4 shadow-inner overflow-x-auto h-full">
                                <pre className="text-sm font-mono text-gray-800 whitespace-pre-wrap">
                                    {current.pseudo}
                                </pre>
                                </div>
                            </div>
                            </div>
                        )}
                        </div>

                        {/* Mark Allocation Footer for the step */}
                        <div className="mt-8 border-t pt-4">
                        <h4 className="text-sm font-bold text-gray-400 uppercase tracking-widest mb-3">Where are the marks?</h4>
                        <div className="flex flex-wrap gap-2">
                            {activeStep === 1 && (
                            <>
                                <Badge color="green">1 Mark: Initialising Days array</Badge>
                                <Badge color="blue">1 Mark: Initialising/Using Variables for Totals</Badge>
                            </>
                            )}
                            {activeStep === 2 && (
                            <>
                                <Badge color="green">1 Mark: Outer Loop (Days)</Badge>
                                <Badge color="green">1 Mark: Inner Loop (Hours)</Badge>
                                <Badge color="blue">1 Mark: Inputting Temperature</Badge>
                                <Badge color="red">1 Mark: Correct Validation Condition</Badge>
                                <Badge color="red">1 Mark: Validation Error Message</Badge>
                                <Badge color="purple">1 Mark: Storing in Array</Badge>
                            </>
                            )}
                            {activeStep === 3 && (
                            <>
                                <Badge color="green">1 Mark: Calculating Daily Average</Badge>
                                <Badge color="green">1 Mark: Storing Daily Average in Array</Badge>
                                <Badge color="blue">1 Mark: Calculating Weekly Average logic</Badge>
                            </>
                            )}
                            {activeStep === 4 && (
                            <>
                                <Badge color="purple">1 Mark: Correct C to F formula</Badge>
                                <Badge color="green">1 Mark: Outputting Daily stats with Text</Badge>
                                <Badge color="green">1 Mark: Outputting Weekly stats with Text</Badge>
                                <Badge color="yellow">1 Mark: Rounding to 1 d.p.</Badge>
                            </>
                            )}
                            {activeStep === 5 && (
                            <>
                                <Badge color="gray">Follow-up Question</Badge>
                                <Badge color="blue">2 Marks: Correct Data Examples</Badge>
                                <Badge color="purple">3 Marks: Trace Table Logic</Badge>
                            </>
                            )}
                            {activeStep === 6 && (
                            <>
                                <Badge color="yellow">Critical: Meeting all 7 rubric criteria</Badge>
                            </>
                            )}
                            {activeStep === 0 && (
                            <span className="text-sm text-gray-400 italic">Marks begin accumulating when you write logic in step 1.</span>
                            )}
                        </div>
                        </div>

                    </div>
                    </div>
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<IGCSEGuide />);
    </script>
</body>
</html>
