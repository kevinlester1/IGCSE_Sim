<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Projects</title>
    <style>
        /* Base styles for a clean, modern look */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
        }

        /* Header styling */
        header {
            background-color: #24292e; /* GitHub dark color */
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            margin-bottom: 2rem;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
        }

        header p {
            margin: 0.5rem 0 0;
            opacity: 0.8;
        }

        /* Grid layout for the links */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        /* Individual project cards */
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-decoration: none;
            color: inherit;
            display: block;
            border: 1px solid #e1e4e8;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
            border-color: #0366d6;
        }

        .card h2 {
            margin: 0 0 10px 0;
            color: #0366d6; /* GitHub link blue */
            font-size: 1.25rem;
        }

        .card p {
            margin: 0;
            color: #586069;
            font-size: 0.95rem;
        }

        /* Footer styling */
        footer {
            text-align: center;
            margin-top: 3rem;
            padding: 1rem;
            color: #6a737d;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Projects Directory</h1>
        <p>A collection of HTML pages hosted on GitHub</p>
    </header>

    <div class="container">
        <!-- Project Link 1 -->
        <a href="1.1 Binary conversions.html" class="card">
            <h2>Project One</h2>
            <p>Description of what this first HTML page is about. Click to view.</p>
        </a>

        <!-- Project Link 2 -->
        <a href="folder2/project2.html" class="card">
            <h2>Project Two</h2>
            <p>This links to an HTML file inside a subfolder.</p>
        </a>

        <!-- Project Link 3 -->
        <a href="about.html" class="card">
            <h2>About Me</h2>
            <p>A simple about page explaining who I am.</p>
        </a>
        
        <!-- Add more cards by copying the <a> block above -->
    </div>

    <footer>
        <p>Hosted with ♥ on GitHub Pages</p>
    </footer>

</body>
</html>
