        // --- K-MAP SOLVER LOGIC ---
        const getGrayCode = (bits) => {
            if (bits === 1) return ['0', '1'];
            if (bits === 2) return ['00', '01', '11', '10'];
            return [];
        };

        const SOLVER_COLORS = [
            '#ef4444', '#3b82f6', '#10b981', '#f59e0b', 
            '#8b5cf6', '#ec4899', '#14b8a6', '#f43f5e'
        ];

        function solveKMap(gridData, numVars) {
            const H = gridData.length;
            const W = gridData[0].length;
            
            const ones = [];
            for (let r = 0; r < H; r++) {
                for (let c = 0; c < W; c++) {
                if (gridData[r][c]) ones.push(`${r},${c}`);
                }
            }
            
            if (ones.length === 0) return [{ term: "0", cells: [] }];
            if (ones.length === H * W) return [{ term: "1", cells: ones }];

            let validSizes = [];
            if (numVars === 4) validSizes = [[4,4],[4,2],[2,4],[4,1],[1,4],[2,2],[2,1],[1,2],[1,1]];
            if (numVars === 3) validSizes = [[2,4],[2,2],[1,4],[2,1],[1,2],[1,1]];
            if (numVars === 2) validSizes = [[2,2],[2,1],[1,2],[1,1]];

            const implicants = [];

            for (let [h, w] of validSizes) {
                for (let r = 0; r < H; r++) {
                    for (let c = 0; c < W; c++) {
                        let groupCells = new Set();
                        let allOnes = true;
                        
                        for (let i = 0; i < h; i++) {
                        for (let j = 0; j < w; j++) {
                            let rr = (r + i) % H;
                            let cc = (c + j) % W;
                            groupCells.add(`${rr},${cc}`);
                            if (!gridData[rr][cc]) {
                            allOnes = false;
                            }
                        }
                        }
                        
                        if (allOnes) {
                        let alreadyExists = implicants.some(imp => 
                            imp.size === groupCells.size && [...imp].every(cell => groupCells.has(cell))
                        );
                        if (!alreadyExists) implicants.push(groupCells);
                        }
                    }
                }
            }

            const primeImplicants = implicants.filter((imp1, idx1) => {
                return !implicants.some((imp2, idx2) => {
                if (idx1 === idx2) return false;
                if (imp1.size >= imp2.size) return false;
                return [...imp1].every(cell => imp2.has(cell));
                });
            });

            function getMinCover(pis, targetCells) {
                let bestCover = pis; 
                const targetSet = new Set(targetCells);
                const essentialPIs = [];
                let remainingTarget = new Set(targetCells);
                let remainingPIs = [...pis];

                for (let cell of targetCells) {
                let coveringPIs = remainingPIs.filter(pi => pi.has(cell));
                if (coveringPIs.length === 1) {
                    let epi = coveringPIs[0];
                    if (!essentialPIs.includes(epi)) {
                    essentialPIs.push(epi);
                    epi.forEach(c => remainingTarget.delete(c));
                    }
                }
                }

                remainingPIs = remainingPIs.filter(pi => !essentialPIs.includes(pi));
                let initialCovered = new Set();
                essentialPIs.forEach(pi => pi.forEach(c => {
                if (targetSet.has(c)) initialCovered.add(c);
                }));

                function search(idx, currentCover, coveredCells) {
                if (coveredCells.size === targetSet.size) {
                    if (currentCover.length < bestCover.length) {
                    bestCover = [...currentCover];
                    }
                    return;
                }
                if (idx >= remainingPIs.length) return;
                if (currentCover.length >= bestCover.length) return;

                let newCovered = new Set(coveredCells);
                let addedAny = false;
                remainingPIs[idx].forEach(cell => {
                    if (targetSet.has(cell) && !newCovered.has(cell)) {
                    newCovered.add(cell);
                    addedAny = true;
                    }
                });

                if (addedAny) {
                    search(idx + 1, [...currentCover, remainingPIs[idx]], newCovered);
                }
                search(idx + 1, currentCover, coveredCells);
                }

                bestCover = [...essentialPIs, ...remainingPIs];
                search(0, essentialPIs, initialCovered);
                return bestCover;
            }

            const solutionGroups = getMinCover(primeImplicants, ones);

            return solutionGroups.map(groupSet => {
                let rowGray = H === 4 ? getGrayCode(2) : getGrayCode(1);
                let colGray = W === 4 ? getGrayCode(2) : (W === 2 ? getGrayCode(1) : getGrayCode(1));
                let vars = numVars === 4 ? ['A','B','C','D'] : (numVars === 3 ? ['A','B','C'] : ['A','B']);

                let bitStrings = [];
                for (let cell of groupSet) {
                let [r, c] = cell.split(',').map(Number);
                bitStrings.push(rowGray[r] + colGray[c]);
                }

                let term = "";
                for (let i = 0; i < numVars; i++) {
                let firstBit = bitStrings[0][i];
                let allSame = bitStrings.every(bits => bits[i] === firstBit);
                if (allSame) {
                    term += vars[i] + (firstBit === '0' ? "'" : "");
                }
                }
                return { term: term || "1", cells: [...groupSet] };
            });
        }

        // --- UI COMPONENTS ---
        const MiniGridExample = ({ title, isValid, checkActive }) => (

                </span>
                <div className={`grid grid-cols-4 gap-0 border-2 w-24 h-24 bg-white ${isValid ? 'border-emerald-300' : 'border-red-300'}`}>

                    const r = Math.floor(i/4), c = i%4;

                    <div key={i} className={`border flex items-center justify-center text-xs font-bold transition-all ${

                    }`}>
                        {active ? '1' : '0'}
                    </div>
                    )
                })}

        );

        const TheoryTab = () => (
            <div className="space-y-6 text-slate-800 animate-fadeIn">
                <div className="bg-blue-50 border-l-4 border-blue-500 p-6 rounded shadow-sm">
                <h2 className="text-2xl font-bold mb-3 flex items-center gap-2"><BookOpen className="text-blue-500" /> What is a Karnaugh Map?</h2>
                <p className="mb-4 text-lg">
                    A Karnaugh Map (K-map) is a visual method used to simplify Boolean algebra expressions. Instead of using complex algebraic rules, K-maps use pattern matching to find the simplest possible logic circuit.
                </p>
                </div>

                <div className="flex flex-col gap-6">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                    <h3 className="text-xl font-bold mb-3 text-slate-900">1. The Gray Code Grid</h3>
                    <p className="text-slate-600 mb-3">
                    Notice the column and row headers (e.g., 00, 01, 11, 10). This is called <strong>Gray Code</strong>. 
                    </p>
                    <p className="text-slate-600">
                    Unlike standard binary (00, 01, 10, 11), Gray code ensures that <strong>only one bit changes</strong> between any adjacent columns or rows. This property is what makes the K-map visually cluster identical variables together!
                    </p>
                </div>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-emerald-100 relative overflow-hidden">
                    <div className="absolute -right-10 -top-10 opacity-5 text-emerald-500 pointer-events-none">
                    <RotateCcw size={200} />
                    </div>
                    <h3 className="text-xl font-bold mb-4 text-slate-900">2. The Wrapping Rule (It's a Donut!)</h3>
                    <div className="flex flex-col md:flex-row gap-8 items-center relative z-10">
                    <div className="flex-1">
                        <p className="text-slate-600 mb-3">
                        A K-map is not a flat square; its edges conceptually wrap around to connect with the opposite side, like a <strong>torus (donut)</strong>. 
                        </p>
                        <ul className="list-disc pl-5 space-y-2 text-slate-600 mb-4">
                        <li>The <strong>far-left column</strong> is directly adjacent to the <strong>far-right column</strong>.</li>
                        <li>The <strong>top row</strong> is directly adjacent to the <strong>bottom row</strong>.</li>
                        <li>Because of this, the <strong>four corners</strong> of a 4x4 map are all technically touching each other and form a valid group of 4!</li>
                        </ul>
                    </div>
                    
                    <div className="flex-none bg-slate-50 p-6 rounded-xl border border-slate-200 shadow-inner relative mt-4 md:mt-0">
                        
                        <div className="absolute top-1/2 -left-4 -translate-y-1/2 bg-emerald-100 text-emerald-600 rounded-full p-1.5 shadow-md border border-emerald-200 z-10"><MoveHorizontal size={18}/></div>
                        <div className="absolute top-1/2 -right-4 -translate-y-1/2 bg-emerald-100 text-emerald-600 rounded-full p-1.5 shadow-md border border-emerald-200 z-10"><MoveHorizontal size={18}/></div>
                        <div className="absolute -top-4 left-1/2 -translate-x-1/2 bg-emerald-100 text-emerald-600 rounded-full p-1.5 shadow-md border border-emerald-200 z-10"><MoveVertical size={18}/></div>
                        <div className="absolute -bottom-4 left-1/2 -translate-x-1/2 bg-emerald-100 text-emerald-600 rounded-full p-1.5 shadow-md border border-emerald-200 z-10"><MoveVertical size={18}/></div>

                        <div className="absolute top-1/2 left-0 -translate-x-full w-4 border-b-2 border-dashed border-emerald-300"></div>
                        <div className="absolute top-1/2 right-0 translate-x-full w-4 border-b-2 border-dashed border-emerald-300"></div>
                        <div className="absolute top-0 left-1/2 -translate-y-full h-4 border-l-2 border-dashed border-emerald-300"></div>
                        <div className="absolute bottom-0 left-1/2 translate-y-full h-4 border-l-2 border-dashed border-emerald-300"></div>

                        <table className="border-collapse select-none bg-white shadow-sm relative z-0">
                        <thead>
                            <tr>
                            <th className="w-10 h-10 bg-slate-100"></th>
                            <th className="w-12 h-10 border-2 border-slate-300 bg-slate-100 text-xs font-bold text-slate-500">00</th>
                            <th className="w-12 h-10 border-2 border-slate-300 bg-slate-100 text-xs font-bold text-slate-500">01</th>
                            <th className="w-12 h-10 border-2 border-slate-300 bg-slate-100 text-xs font-bold text-slate-500">11</th>
                            <th className="w-12 h-10 border-2 border-slate-300 bg-slate-100 text-xs font-bold text-slate-500">10</th>
                            </tr>
                        </thead>
                        <tbody>
                            {[
                            ['00', 1, 0, 0, 1],
                            ['01', 0, 0, 0, 0],
                            ['11', 0, 0, 0, 0],
                            ['10', 1, 0, 0, 1]
                            ].map((row, r) => (
                            <tr key={r}>
                                <th className="w-10 h-12 border-2 border-slate-300 bg-slate-100 text-xs font-bold text-slate-500">{row[0]}</th>
                                {row.slice(1).map((val, c) => {
                                const isCorner = val === 1;
                                let shadow = '';
                                if (r===0 && c===0) shadow = 'inset -4px 0 0 0 #10b981, inset 0 -4px 0 0 #10b981';
                                else if (r===0 && c===3) shadow = 'inset 4px 0 0 0 #10b981, inset 0 -4px 0 0 #10b981';
                                else if (r===3 && c===0) shadow = 'inset -4px 0 0 0 #10b981, inset 0 4px 0 0 #10b981';
                                else if (r===3 && c===3) shadow = 'inset 4px 0 0 0 #10b981, inset 0 4px 0 0 #10b981';

                                return (
                                    <td 
                                    key={c} 
                                    className={`w-12 h-12 border-2 border-slate-300 text-center font-bold text-xl 
                                        ${isCorner ? 'bg-emerald-100 text-emerald-700' : 'text-slate-300'}`}
                                    style={{ boxShadow: shadow }}
                                    >
                                    {val}
                                    </td>
                                );
                                })}
                            </tr>
                            ))}
                        </tbody>
                        </table>
                    </div>
                    </div>
                </div>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                    <h3 className="text-xl font-bold mb-3 text-slate-900">3. How to Group</h3>
                    <div className="flex flex-col md:flex-row gap-6">
                    <div className="flex-1">
                        <p className="text-slate-600 mb-2">To solve a K-map, you must encircle the 1s based on these strict rules:</p>
                        <ul className="list-decimal pl-5 space-y-2 text-slate-600">
                        <li>Groups must contain 2<sup>n</sup> cells (1, 2, 4, 8, 16). <em>(No groups of 3 or 5!)</em></li>
                        <li>Groups must be rectangles or squares. <em>(No L-shapes or diagonals!)</em></li>
                        <li>Make the groups <strong>as large as possible</strong>.</li>
                        <li>Make <strong>as few groups as possible</strong> to cover all 1s.</li>
                        <li>Groups can overlap if it helps cover a 1 that would otherwise need a smaller group.</li>
                        </ul>
                    </div>
                    <div className="flex-1 bg-slate-50 p-4 rounded-xl border border-slate-200">
                        <p className="text-sm text-slate-700 font-semibold mb-3 text-center border-b border-slate-200 pb-2">Visual Grouping Rules</p>
                        
                        <div className="flex justify-around items-center mb-4">
                        <MiniGridExample 
                            title="Valid: Quad (4)" 
                            isValid={true} 
                            checkActive={(r,c) => (r===1 || r===2) && (c===1 || c===2)} 
                        />
                        <MiniGridExample 
                            title="Valid: Octet wrap" 
                            isValid={true} 
                            checkActive={(r,c) => (c===0 || c===3)} 
                        />
                        </div>
                        
                        <div className="flex justify-around items-center">
                        <MiniGridExample 
                            title="Invalid: L-Shape" 
                            isValid={false} 
                            checkActive={(r,c) => (r===1 && c===1) || (r===1 && c===2) || (r===2 && c===1)} 
                        />
                        <MiniGridExample 
                            title="Invalid: Diagonal" 
                            isValid={false} 
                            checkActive={(r,c) => (r===1 && c===1) || (r===2 && c===2) || (r===3 && c===3)} 
                        />
                        </div>
                    </div>
                    </div>
                </div>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-blue-100 relative overflow-hidden">
                    <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none">
                    <Zap size={100} />
                    </div>
                    <h3 className="text-xl font-bold mb-6 text-slate-900 flex items-center gap-2">
                    <Play className="text-blue-500" size={20} fill="currentColor" /> 
                    4. A Working Example
                    </h3>
                    <div className="flex flex-col md:flex-row gap-8 items-center">
                    <div className="flex-1 space-y-4">
                        <p className="text-slate-700"><strong>Goal:</strong> Simplify the unoptimized Boolean expression: <code className="bg-slate-100 px-2 py-1 rounded text-pink-600 font-mono font-bold">Y = A'B + AB</code></p>
                        <ol className="list-decimal pl-5 space-y-3 text-slate-600">
                        <li><strong>Plot the 1s:</strong> We place a 1 in the cell where <code className="text-xs bg-slate-100 px-1 rounded">A=0, B=1</code> (for A'B) and where <code className="text-xs bg-slate-100 px-1 rounded">A=1, B=1</code> (for AB). Fill the rest with 0s.</li>
                        <li><strong>Group them:</strong> We can circle both 1s together because they form a valid, adjacent group of two (which is 2<sup>1</sup>).</li>
                        <li><strong>Simplify:</strong> Look at the blue group. As we move between the cells, the variable <strong>A</strong> changes from 0 to 1, meaning it is irrelevant and cancels out. The variable <strong>B</strong> stays exactly 1 for the whole group.</li>
                        </ol>
                        <div className="mt-4 inline-flex items-center gap-4 bg-blue-50 border border-blue-200 px-5 py-3 rounded-lg shadow-sm">
                        <span className="text-slate-700 font-semibold uppercase tracking-wide text-sm">Simplified Result:</span>
                        <span className="text-3xl font-mono font-bold text-blue-600">Y = B</span>
                        </div>
                    </div>
                    
                    <div className="flex-none bg-slate-50 p-6 rounded-xl border border-slate-200 shadow-inner">
                        <table className="border-collapse select-none bg-white shadow-sm">
                        <thead>
                            <tr>
                            <th className="w-14 h-14 border-2 border-slate-800 bg-slate-100 p-1 text-xs relative">
                                <div className="absolute top-1 right-2 text-slate-500 font-bold">B</div>
                                <div className="absolute bottom-1 left-2 text-slate-500 font-bold">A</div>
                                <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                                <line x1="0" y1="0" x2="100%" y2="100%" stroke="currentColor" strokeWidth="1" className="text-slate-300" />
                                </svg>
                            </th>
                            <th className="w-16 h-14 border-2 border-slate-800 bg-slate-100 text-center font-bold text-slate-600 text-lg">0</th>
                            <th className="w-16 h-14 border-2 border-slate-800 bg-slate-100 text-center font-bold text-blue-600 text-lg">1</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                            <th className="w-14 h-16 border-2 border-slate-800 bg-slate-100 text-center font-bold text-slate-600 text-lg">0</th>
                            <td className="w-16 h-16 border-2 border-slate-800 text-center text-xl text-slate-300">0</td>
                            <td className="w-16 h-16 border-2 border-slate-800 text-center text-2xl font-bold bg-blue-100 text-blue-700 shadow-[inset_0_4px_0_0_#3b82f6,inset_4px_0_0_0_#3b82f6,inset_-4px_0_0_0_#3b82f6]">1</td>
                            </tr>
                            <tr>
                            <th className="w-14 h-16 border-2 border-slate-800 bg-slate-100 text-center font-bold text-slate-600 text-lg">1</th>
                            <td className="w-16 h-16 border-2 border-slate-800 text-center text-xl text-slate-300">0</td>
                            <td className="w-16 h-16 border-2 border-slate-800 text-center text-2xl font-bold bg-blue-100 text-blue-700 shadow-[inset_0_-4px_0_0_#3b82f6,inset_4px_0_0_0_#3b82f6,inset_-4px_0_0_0_#3b82f6]">1</td>
                            </tr>
                        </tbody>
                        </table>
                    </div>
                    </div>
                </div>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-purple-100 relative overflow-hidden">
                    <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none">
                    <Zap size={100} />
                    </div>
                    <h3 className="text-xl font-bold mb-6 text-slate-900 flex items-center gap-2">
                    <Play className="text-purple-500" size={20} fill="currentColor" /> 
                    5. Advanced Example: Overlapping Groups
                    </h3>
                    <div className="flex flex-col md:flex-row gap-8 items-center">
                    <div className="flex-1 space-y-4">
                        <p className="text-slate-700"><strong>Goal:</strong> Simplify the 3-variable expression: <code className="bg-slate-100 px-2 py-1 rounded text-pink-600 font-mono font-bold">Y = A'BC + ABC + AB'C</code></p>

            }, [numVars, H, W]);

            const fillGrid = () => setGrid(Array(H).fill().map(() => Array(W).fill(1)));

                const sanitized = exprInput.toUpperCase()
                .replace(/\s+/g, '')     
                .replace(/!/g, "'")       
                .replace(/AND/g, '')      
                .replace(/OR/g, '+')      
                .replace(/[.*&]/g, '');   
                
                const maxChar = String.fromCharCode(64 + numVars);
                const validRegex = new RegExp(`^[A-${maxChar}0-1+']+$`);
                
                if (!validRegex.test(sanitized)) {
                setParseError(`Invalid syntax. Please use standard SoP format with variables A to ${maxChar}, 0, 1, +, and '`);
                return;
                }

                const terms = sanitized.split('+').filter(t => t.length > 0);
                const newGrid = Array(H).fill().map(() => Array(W).fill(0));
                const vars = numVars === 4 ? ['A','B','C','D'] : (numVars === 3 ? ['A','B','C'] : ['A','B']);

                for (let r = 0; r < H; r++) {
                for (let c = 0; c < W; c++) {
                    let bitString = rowGray[r] + colGray[c];
                    
                    let valMap = {};
                    for(let i = 0; i < numVars; i++) valMap[vars[i]] = bitString[i] === '1';

                    let cellValue = 0;
                    
                    for (let term of terms) {
                        if (term === '0') continue;
                        if (term === '1') { cellValue = 1; break; }
                        
                        const tokenRegex = new RegExp(`[A-${maxChar}]'?`, 'g');
                        const tokens = term.match(tokenRegex) || [];
                        let termMatch = true;
                        
                        for (let token of tokens) {
                        const v = token[0];
                        const isNeg = token.length > 1;
                        
                        if (isNeg && valMap[v]) termMatch = false;
                        if (!isNeg && !valMap[v]) termMatch = false;
                        }

                        break;

                    newGrid[r][c] = cellValue;

                    {parseError && <p className="text-red-500 text-xs mt-2">{parseError}</p>}
                    </div>

                    <div className="flex gap-2 mb-6 flex-wrap">
                    <span className="text-sm font-semibold text-slate-500 py-1">Examples:</span>
                    {numVars === 4 && (
                        <Fragment>
                        <button onClick={() => loadPreset('corners')} className="px-3 py-1 text-sm bg-blue-50 text-blue-600 rounded-full hover:bg-blue-100 transition">Four Corners</button>
                        <button onClick={() => loadPreset('donut')} className="px-3 py-1 text-sm bg-blue-50 text-blue-600 rounded-full hover:bg-blue-100 transition">Center Column Wrap</button>
                        <button onClick={() => loadPreset('checkerboard')} className="px-3 py-1 text-sm bg-blue-50 text-blue-600 rounded-full hover:bg-blue-100 transition">XOR (Checkerboard)</button>
                        </Fragment>
                    )}
                    {numVars === 3 && (
                        <button onClick={() => loadPreset('edges')} className="px-3 py-1 text-sm bg-blue-50 text-blue-600 rounded-full hover:bg-blue-100 transition">Outer Edges Wrap</button>
                    )}
                    </div>

                    <div className="overflow-x-auto flex justify-center pb-4">
                    <table className="border-collapse select-none">
                        <thead>
                        <tr>
                            <th className="relative w-16 h-16 border-2 border-slate-800 bg-slate-100 p-2 text-xs font-bold text-slate-600">
                            <div className="absolute top-1 right-2">{colVarName}</div>
                            <div className="absolute bottom-1 left-2">{rowVarName}</div>
                            <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                                <line x1="0" y1="0" x2="100%" y2="100%" stroke="currentColor" strokeWidth="1" className="text-slate-300" />
                            </svg>
                            </th>
                            {colGray.map((cCode, i) => (
                            <th key={i} className="w-16 h-12 border-2 border-slate-800 bg-slate-100 text-center font-bold text-slate-800 text-lg">
                                {cCode}
                            </th>
                            ))}
                        </tr>
                        </thead>
                        <tbody>
                        {grid.map((row, r) => (
                            <tr key={r}>
                            <th className="w-12 h-16 border-2 border-slate-800 bg-slate-100 text-center font-bold text-slate-800 text-lg">
                                {rowGray[r]}
                            </th>
                            {row.map((val, c) => {
                                const isHovered = hoveredTermIndex !== null && solution[hoveredTermIndex]?.cells.includes(`${r},${c}`);
                                const groupColor = hoveredTermIndex !== null ? SOLVER_COLORS[hoveredTermIndex % SOLVER_COLORS.length] : null;

                                return (
                                <td 
                                    key={c}
                                    onClick={() => toggleCell(r, c)}
                                    className={`w-16 h-16 border-2 border-slate-800 text-center text-2xl font-bold cursor-pointer transition-all duration-200 hover:brightness-95`}
                                    style={{
                                    backgroundColor: isHovered ? `${groupColor}40` : (val ? '#bfdbfe' : '#ffffff'),
                                    color: isHovered ? groupColor : (val ? '#1e3a8a' : '#94a3b8'),
                                    boxShadow: isHovered ? `inset 0 0 0 4px ${groupColor}` : 'none'
                                    }}
                                >
                                    {val}
                                </td>
                                );
                            })}
                            </tr>
                        ))}
                        </tbody>
                    </table>
                    </div>
                </div>

                <div className="flex-1 bg-slate-900 p-8 rounded-xl shadow-xl flex flex-col justify-center text-white relative overflow-hidden">
                    <div className="absolute top-0 right-0 p-4 opacity-10 pointer-events-none">
                    <Zap size={120} />
                    </div>
                    
                    <div className="relative z-10 flex flex-col h-full justify-center">
                    <div className="mb-4">
                        <h3 className="text-sm text-slate-400 font-semibold mb-2 uppercase tracking-wider">Original Expression (Unsimplified)</h3>
                        <div className="bg-slate-800/80 p-4 rounded-lg border border-slate-700 max-h-32 overflow-y-auto">
                        <div className="text-lg font-mono text-slate-300 break-words leading-relaxed">
                            <span className="mr-2 text-slate-500">Y =</span>
                            {originalExpr}
                        </div>
                        </div>
                    </div>

                    <div className="flex justify-center mb-4 relative">
                        <div className="absolute inset-0 flex items-center">
                        <div className="w-full border-t border-slate-700"></div>
                        </div>
                        <div className="relative bg-slate-900 px-4 flex items-center justify-center">
                        <div className="bg-slate-800 p-2 rounded-full border border-slate-600 shadow-sm">
                            <ArrowDown className="text-slate-400" size={18} />
                        </div>
                        </div>
                    </div>

                    <h3 className="text-lg text-blue-400 font-bold mb-2 uppercase tracking-wider">Simplified Expression</h3>
                    
                    <div className="bg-slate-800/50 p-6 rounded-lg border border-slate-700 min-h-[120px] flex items-center justify-center mb-6">
                        <div className="text-3xl font-mono flex flex-wrap justify-center gap-y-4">
                        <span className="mr-4 text-white">Y =</span>
                        {solution.length === 0 ? (
                            <span className="text-slate-500">0</span>
                        ) : (
                            solution.map((group, idx) => (
                            <Fragment key={idx}>
                                <span 
                                onMouseEnter={() => setHoveredTermIndex(idx)}
                                onMouseLeave={() => setHoveredTermIndex(null)}
                                className="px-3 py-1 rounded cursor-pointer transition-all hover:scale-110"
                                style={{ 
                                    color: SOLVER_COLORS[idx % SOLVER_COLORS.length],
                                    backgroundColor: hoveredTermIndex === idx ? `${SOLVER_COLORS[idx % SOLVER_COLORS.length]}20` : 'transparent',
                                    textShadow: hoveredTermIndex === idx ? `0 0 10px ${SOLVER_COLORS[idx % SOLVER_COLORS.length]}80` : 'none'
                                }}
                                >
                                {group.term}
                                </span>
                                {idx < solution.length - 1 && <span className="text-slate-500 mx-2 flex items-center">+</span>}
                            </Fragment>
                            ))
                        )}
                        </div>
                    </div>

                    <div className="bg-blue-900/30 border border-blue-500/30 p-4 rounded-lg flex items-start gap-3 mt-auto">
                        <Info className="text-blue-400 shrink-0 mt-0.5" size={20} />
                        <p className="text-sm text-blue-200">
                        <strong>Interactive Guide:</strong> Hover over any colored term in the simplified equation above to see exactly which cells in the grid form that logical group.
                        </p>
                    </div>
                    </div>
                </div>
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('intro');

            return (
                <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
                <div className="max-w-6xl mx-auto">
                    <header className="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
                    <div>
                        <h1 className="text-3xl md:text-4xl font-extrabold text-slate-900 flex items-center gap-3">
                        <div className="bg-blue-600 p-2 rounded-lg"><Play className="text-white" size={28}/></div>
                        Karnaugh Map Lab
                        </h1>
                        <p className="text-slate-500 mt-2 text-lg">Interactive digital logic simplifier and tutorial.</p>
                    </div>
                    </header>

                    <nav className="flex flex-wrap gap-2 mb-8 bg-white p-2 rounded-xl shadow-sm border border-slate-200">
                    {[
                        { id: 'intro', label: 'Theory & Rules', icon: BookOpen },
                        { id: 'example', label: 'Worked Example', icon: GraduationCap },
                        { id: 'practice', label: 'Practice Tests', icon: ClipboardList },
                        { id: '2var', label: '2-Variable Map', icon: Zap },
                        { id: '3var', label: '3-Variable Map', icon: Zap },
                        { id: '4var', label: '4-Variable Map', icon: Zap }
                    ].map(tab => {
                        const Icon = tab.icon;
                        const isActive = activeTab === tab.id;
                        return (
                        <button
                            key={tab.id}
                            onClick={() => setActiveTab(tab.id)}
                            className={`flex items-center gap-2 px-5 py-3 rounded-lg font-medium transition-all ${
                            isActive 
                                ? 'bg-blue-600 text-white shadow-md' 
                                : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'
                            }`}
                        >
                            <Icon size={18} className={isActive ? "text-blue-100" : "text-slate-400"} />
                            {tab.label}
                        </button>
                        )
                    })}
                    </nav>

                    <main>
                    {activeTab === 'intro' && <TheoryTab />}
                    {activeTab === 'example' && <WorkedExampleTab />}
                    {activeTab === 'practice' && <PracticeTab />}
                    {activeTab === '2var' && <InteractiveLab numVars={2} />}
                    {activeTab === '3var' && <InteractiveLab numVars={3} />}
                    {activeTab === '4var' && <InteractiveLab numVars={4} />}
                    </main>
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
