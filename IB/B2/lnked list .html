<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linked List Tour Animation</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Use Inter font -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }

        /* This is the container for a node AND its arrow.
          We animate this container for insertions and deletions.
        */
        .node-container {
            display: flex;
            align-items: center;
            /* Animation transitions */
            transition: all 0.5s ease-out;
            position: relative; /* Needed for highlighting */
        }

        /* Initial state for a node that is being added */
        .node-container.entering {
            opacity: 0;
            transform: translateY(-30px) scale(0.5);
        }

        /* Final state for a node that is being removed */
        .node-container.exiting {
            opacity: 0;
            transform: translateY(30px) scale(0.5);
        }

        /* Base style for data/null/head boxes */
        .list-box {
            padding: 1rem; /* p-4 */
            border-radius: 0.5rem; /* rounded-lg */
            font-family: monospace;
            font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); /* shadow-md */
            text-align: center;
            transition: all 0.3s ease-in-out;
        }

        /* Style for the 'HEAD' pointer box */
        .head-pointer-box {
            background-color: #dbeafe; /* bg-blue-100 */
            color: #2563eb; /* text-blue-700 */
            border: 2px solid #93c5fd; /* border-blue-300 */
        }

        /* Style for the 'null' box */
        .null-box {
            background-color: #e5e7eb; /* bg-gray-200 */
            color: #4b5563; /* text-gray-600 */
            font-style: italic;
        }

        /* Style for the data node box */
        .data-box {
            background-color: #3b82f6; /* bg-blue-500 */
            color: white;
        }
        
        /* New highlight style */
        .highlight-active {
            box-shadow: 0 0 15px 5px rgba(59, 130, 246, 0.7); /* blue-500 glow */
            transform: scale(1.05);
        }
        .highlight-arrow {
            box-shadow: 0 0 15px 5px rgba(234, 179, 8, 0.7); /* yellow-500 glow */
            background-color: #eab308; /* yellow-500 */
        }
        .highlight-arrow::after {
            border-left-color: #eab308; /* yellow-500 */
        }


        /* The arrow pointing to the next node */
        .arrow {
            width: 4rem; /* w-16 */
            height: 2px;
            background-color: #9ca3af; /* bg-gray-400 */
            position: relative;
            margin-left: 0.5rem; /* ml-2 */
            margin-right: 0.5rem; /* mr-2 */
            transition: all 0.3s ease-in-out;
        }

        /* The arrowhead */
        .arrow::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 8px solid #9ca3af; /* border-l-gray-400 */
            transition: all 0.3s ease-in-out;
        }

        /* Style for the step log */
        #stepLogArea {
            background-color: #f3f4f6; /* bg-gray-100 */
            border: 1px solid #d1d5db; /* border-gray-300 */
            height: 150px;
            overflow-y: auto;
            padding: 0.75rem; /* p-3 */
            border-radius: 0.5rem; /* rounded-lg */
            margin-top: 1rem; /* mt-4 */
        }

        #stepLogArea p {
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem; /* text-sm */
            color: #1f2937; /* text-gray-800 */
            margin-bottom: 0.25rem; /* mb-1 */
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-xl w-full max-w-5xl">
        <h1 class="text-3xl font-bold text-center mb-6 text-blue-600">My Travel Tour (Linked List)</h1>

        <!-- Controls Section -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            
            <!-- Add Node Card -->
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                <h2 class="text-lg font-semibold mb-3">Add a Place</h2>
                <input type="text" id="addPlaceInput" placeholder="E.g., 'Paris'" class="w-full p-2 border rounded-md mb-3">
                <div class="flex gap-2">
                    <button id="addHeadBtn" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white p-2 rounded-md font-medium transition-colors">Add to Start</button>
                    <button id="addTailBtn" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white p-2 rounded-md font-medium transition-colors">Add to End</button>
                </div>
            </div>

            <!-- Insert After Card -->
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                <h2 class="text-lg font-semibold mb-3">Insert After</h2>
                <input type="text" id="newPlaceInput" placeholder="New: 'Rome'" class="w-full p-2 border rounded-md mb-2">
                <input type="text" id="afterPlaceInput" placeholder="After: 'Paris'" class="w-full p-2 border rounded-md mb-3">
                <button id="insertBtn" class="w-full bg-green-500 hover:bg-green-600 text-white p-2 rounded-md font-medium transition-colors">Insert</button>
            </div>

            <!-- Remove Node Card -->
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                <h2 class="text-lg font-semibold mb-3">Remove a Place</h2>
                <input type="text" id="removePlaceInput" placeholder="E.g., 'Paris'" class="w-full p-2 border rounded-md mb-3">
                <button id="removeBtn" class="w-full bg-red-500 hover:bg-red-600 text-white p-2 rounded-md font-medium transition-colors">Remove</button>
            </div>

            <!-- Find Node Card (NEW) -->
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                <h2 class="text-lg font-semibold mb-3">Find a Place</h2>
                <input type="text" id="findPlaceInput" placeholder="E.g., 'Kyoto'" class="w-full p-2 border rounded-md mb-3">
                <button id="findBtn" class="w-full bg-purple-500 hover:bg-purple-600 text-white p-2 rounded-md font-medium transition-colors">Find</button>
            </div>
        </div>

        <!-- Message Bar -->
        <div id="messageArea" class="text-center mb-4 h-6 font-medium"></div>

        <!-- Visualization Area -->
        <h3 class="text-xl font-semibold mb-4 text-gray-700">Tour Itinerary:</h3>
        <div class="bg-gray-100 border-2 border-dashed border-gray-300 rounded-lg p-6 min-h-[150px] overflow-x-auto">
            <div id="visualizationArea" class="flex flex-wrap items-center gap-y-4">
                <!-- Linked list nodes will be dynamically inserted here -->
            </div>
        </div>

        <!-- Step-by-Step Log -->
        <h3 class="text-xl font-semibold mt-6 mb-2 text-gray-700">Step-by-Step Log:</h3>
        <div id="stepLogArea">
            <p class="text-gray-500 italic">Operations will be logged here...</p>
        </div>
    </div>

    <script>
        // --- Data Structure ---
        // (Node and LinkedList classes are unchanged)

        /**
         * Represents a single node in the linked list.
         * Contains a value and a pointer to the next node.
         * Also holds a unique ID for DOM animation.
         */
        class Node {
            constructor(value) {
                this.value = value;
                this.next = null;
                // Unique ID to track the DOM element for animation
                this.id = 'node-' + Date.now() + Math.random().toString(36).substring(2, 9);
            }
        }

        /**
         * Represents the linked list.
         * Manages adding, removing, and finding nodes.
         */
        class LinkedList {
            constructor() {
                this.head = null;
            }

            // --- Insertion ---

            // Adds a new node to the start (head) of the list
            addHead(value) {
                const newNode = new Node(value);
                newNode.next = this.head;
                this.head = newNode;
                return newNode; // Return the new node for animation
            }

            // Adds a new node to the end (tail) of the list
            addTail(value) {
                const newNode = new Node(value);
                if (!this.head) {
                    this.head = newNode;
                    return newNode;
                }
                let current = this.head;
                while (current.next) {
                    current = current.next;
                }
                current.next = newNode;
                return newNode; // Return the new node for animation
            }

            // Inserts a new node after a node with a specific value
            insertAfter(newValue, afterValue) {
                const afterNode = this.find(afterValue);
                if (!afterNode) {
                    return null; // Node to insert after not found
                }
                const newNode = new Node(newValue);
                newNode.next = afterNode.next;
                afterNode.next = newNode;
                return newNode; // Return the new node for animation
            }

            // --- Deletion ---

            // Removes a node by its value
            remove(value) {
                if (!this.head) {
                    return false;
                }

                // Case 1: Remove the head
                if (this.head.value === value) {
                    this.head = this.head.next;
                    return true;
                }

                // Case 2: Remove a node in the middle or end
                let current = this.head;
                while (current.next && current.next.value !== value) {
                    current = current.next;
                }

                if (current.next) {
                    current.next = current.next.next;
                    return true;
                }

                return false; // Node not found
            }

            // --- Utility ---

            // Finds a node by its value
            find(value) {
                let current = this.head;
                while (current) {
                    if (current.value === value) {
                        return current;
                    }
                    current = current.next;
                }
                return null;
            }
        }

        // --- DOM & Visualization ---

        const list = new LinkedList();
        const visualizationArea = document.getElementById('visualizationArea');
        const messageArea = document.getElementById('messageArea');
        const stepLogArea = document.getElementById('stepLogArea');

        // Input fields
        const addPlaceInput = document.getElementById('addPlaceInput');
        const newPlaceInput = document.getElementById('newPlaceInput');
        const afterPlaceInput = document.getElementById('afterPlaceInput');
        const removePlaceInput = document.getElementById('removePlaceInput');
        const findPlaceInput = document.getElementById('findPlaceInput'); // New

        // Buttons
        const addHeadBtn = document.getElementById('addHeadBtn');
        const addTailBtn = document.getElementById('addTailBtn');
        const insertBtn = document.getElementById('insertBtn');
        const removeBtn = document.getElementById('removeBtn');
        const findBtn = document.getElementById('findBtn'); // New

        let isAnimating = false; // Prevent multiple animations at once

        // --- Step-by-Step & Animation Helpers ---

        /**
         * Pauses execution for a given time.
         * @param {number} ms - Milliseconds to sleep.
         */
        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        /**
         * Clears the step-by-step log.
         */
        function clearLog() {
            stepLogArea.innerHTML = '';
        }

        /**
         * Adds a message to the step-by-step log.
         * @param {string} msg - The message to log.
         */
        function logStep(msg) {
            const p = document.createElement('p');
            p.textContent = `> ${msg}`;
            stepLogArea.appendChild(p);
            stepLogArea.scrollTop = stepLogArea.scrollHeight; // Auto-scroll
        }

        /**
         * Highlights a DOM element (node, pointer, or arrow).
         * @param {string} id - The ID of the element to highlight.
         * @param {string} styleClass - 'highlight-active' or 'highlight-arrow'.
         * @param {number} duration - How long to highlight.
         */
        async function highlightElement(id, styleClass = 'highlight-active', duration = 1200) {
            const element = document.getElementById(id);
            if (!element) return;
            
            element.classList.add(styleClass);
            await sleep(duration);
            element.classList.remove(styleClass);
        }

        /**
         * Creates a DOM element for a node (data box + arrow).
         * @param {Node} node - The data node.
         * @param {boolean} hasArrow - Whether to append an arrow.
         */
        function createNodeElement(node, hasArrow) {
            const container = document.createElement('div');
            container.id = node.id;
            container.className = 'node-container';

            // Create the data box
            const nodeElement = document.createElement('div');
            nodeElement.className = 'list-box data-box';
            nodeElement.id = `box-${node.id}`; // ID for highlighting the box
            nodeElement.textContent = node.value;
            container.appendChild(nodeElement);

            // If there's a next node, create an arrow
            if (hasArrow) {
                const arrowElement = document.createElement('div');
                arrowElement.className = 'arrow';
                arrowElement.id = `arrow-${node.id}`; // ID for highlighting the arrow
                container.appendChild(arrowElement);
            }

            return container;
        }

        /**
         * Renders the entire linked list in the visualizationArea.
         */
        function renderList() {
            visualizationArea.innerHTML = ''; // Clear the list
            
            // 1. Create and add the HEAD pointer
            const headContainer = document.createElement('div');
            headContainer.id = 'head-pointer-container';
            headContainer.className = 'node-container';
            
            const headElement = document.createElement('div');
            headElement.id = 'head-pointer';
            headElement.className = 'list-box head-pointer-box';
            headElement.textContent = 'HEAD';
            headContainer.appendChild(headElement);
            
            const headArrow = document.createElement('div');
            headArrow.className = 'arrow';
            headArrow.id = 'head-arrow';
            headContainer.appendChild(headArrow);
            
            visualizationArea.appendChild(headContainer);

            // 2. Render all nodes in the list
            let current = list.head;
            while (current) {
                const container = createNodeElement(current, !!current.next);
                visualizationArea.appendChild(container);
                current = current.next;
            }

            // 3. Add the final 'null' box
            const nullContainer = document.createElement('div');
            nullContainer.className = 'node-container';
            const nullElement = document.createElement('div');
            nullElement.id = 'node-null';
            nullElement.className = 'list-box null-box';
            nullElement.textContent = 'null';
            nullContainer.appendChild(nullElement);
            visualizationArea.appendChild(nullContainer);
        }

        /**
         * Displays a temporary success/error message.
         */
        function showMessage(text, isError = false) {
            messageArea.textContent = text;
            messageArea.className = isError 
                ? 'text-center mb-4 h-6 font-medium text-red-500' 
                : 'text-center mb-4 h-6 font-medium text-green-600';
            
            setTimeout(() => {
                messageArea.textContent = '';
            }, 3000); // Clear message after 3 seconds
        }
        
        // --- Event Handlers (Now with Step-by-Step) ---

        /**
         * Toggles the disabled state of all buttons.
         * @param {boolean} disabled - True to disable, false to enable.
         */
        function setControlsDisabled(disabled) {
            isAnimating = disabled;
            addHeadBtn.disabled = disabled;
            addTailBtn.disabled = disabled;
            insertBtn.disabled = disabled;
            removeBtn.disabled = disabled;
            findBtn.disabled = disabled; // New
            addHeadBtn.classList.toggle('opacity-50', disabled);
            addTailBtn.classList.toggle('opacity-50', disabled);
            insertBtn.classList.toggle('opacity-50', disabled);
            removeBtn.classList.toggle('opacity-50', disabled);
            findBtn.classList.toggle('opacity-50', disabled); // New
        }

        addHeadBtn.onclick = async () => {
            if (isAnimating) return;
            const value = addPlaceInput.value.trim();
            if (!value) {
                showMessage('Please enter a place name.', true);
                return;
            }
            if (list.find(value)) {
                showMessage(`'${value}' is already in the tour.`, true);
                return;
            }

            setControlsDisabled(true);
            clearLog();
            
            logStep(`1. Creating new node with value: '${value}'.`);
            
            // --- REFACTOR START ---
            // Now, do the actual data operation first
            const newNode = list.addHead(value);
            
            // Re-render the whole list to show the final state
            renderList(); 
            
            // Animate the *real* new node entering
            const finalNewNodeEl = document.getElementById(newNode.id);
            finalNewNodeEl.classList.add('entering');
            // Use setTimeout to trigger the transition
            setTimeout(() => finalNewNodeEl.classList.remove('entering'), 10);
            
            await sleep(500); // Wait for entry animation

            logStep(`2. Setting new node's .next pointer to current head ('${newNode.next ? newNode.next.value : 'null'}').`);
            await highlightElement(`arrow-${newNode.id}`, 'highlight-arrow');
            if (newNode.next) {
                await highlightElement(`box-${newNode.next.id}`);
            } else {
                await highlightElement('node-null');
            }

            logStep("3. Setting list 'HEAD' pointer to the new node.");
            await highlightElement('head-arrow', 'highlight-arrow');
            await highlightElement(`box-${newNode.id}`);
            // --- REFACTOR END ---
            
            logStep("4. Operation complete.");
            showMessage(`Added '${value}' to the start!`, false);
            addPlaceInput.value = '';
            setControlsDisabled(false);
        };

        addTailBtn.onclick = async () => {
            if (isAnimating) return;
            const value = addPlaceInput.value.trim();
            if (!value) {
                showMessage('Please enter a place name.', true);
                return;
            }
            if (list.find(value)) {
                showMessage(`'${value}' is already in the tour.`, true);
                return;
            }

            setControlsDisabled(true);
            clearLog();

            logStep(`1. Creating new node with value: '${value}'.`);
            const newNode = list.addTail(value); // Add data first
            
            // Find the node *before* the new tail
            let prevNode = list.head;
            if (prevNode.id === newNode.id) { // It's the only node
                prevNode = null;
            } else {
                while (prevNode.next && prevNode.next.id !== newNode.id) {
                    prevNode = prevNode.next;
                }
            }

            // Re-render list to show new node (it will be animated in)
            renderList();
            const newNodeEl = document.getElementById(newNode.id);
            newNodeEl.classList.add('entering');
            // FIX: Add this line to remove the class and trigger animation
            setTimeout(() => newNodeEl.classList.remove('entering'), 10);
            await sleep(500); // Wait for entry

            if (prevNode) {
                logStep(`2. Finding last node ('${prevNode.value}') and setting its .next pointer.`);
                await highlightElement(`arrow-${prevNode.id}`, 'highlight-arrow');
                await highlightElement(`box-${newNode.id}`);
            } else {
                logStep("2. List was empty. Setting 'HEAD' to point to new node.");
                await highlightElement('head-arrow', 'highlight-arrow');
                await highlightElement(`box-${newNode.id}`);
            }

            logStep(`3. Setting new node's .next pointer to 'null'.`);
            await highlightElement('node-null');
            
            logStep("4. Operation complete.");
            showMessage(`Added '${value}' to the end!`, false);
            addPlaceInput.value = '';
            setControlsDisabled(false);
        };

        insertBtn.onclick = async () => {
            if (isAnimating) return;
            const newValue = newPlaceInput.value.trim();
            const afterValue = afterPlaceInput.value.trim();

            if (!newValue || !afterValue) {
                showMessage('Please enter both a new place and the place to insert after.', true);
                return;
            }
            if (list.find(newValue)) {
                showMessage(`'${newValue}' is already in the tour.`, true);
                return;
            }

            const afterNode = list.find(afterValue);
            if (!afterNode) {
                showMessage(`Could not find '${afterValue}' to insert after.`, true);
                return;
            }
            
            setControlsDisabled(true);
            clearLog();

            logStep(`1. Creating new node with value: '${newValue}'.`);
            const newNode = list.insertAfter(newValue, afterValue); // Add data
            
            // Re-render and animate in
            renderList();
            const newNodeEl = document.getElementById(newNode.id);
            newNodeEl.classList.add('entering');
            // FIX: Add this line to remove the class and trigger animation
            setTimeout(() => newNodeEl.classList.remove('entering'), 10);
            await sleep(500);

            // --- THIS SECTION IS FIX ---
            // Was: logStep(`2. Setting new node's .next pointer to '${afterNode.next.next ? afterNode.next.next.value : 'null'}'.`);
            logStep(`2. Setting new node's .next pointer to '${newNode.next ? newNode.next.value : 'null'}'.`);
            
            await highlightElement(`arrow-${newNode.id}`, 'highlight-arrow');
            
            // Was: if (afterNode.next.next) {
            if (newNode.next) {
                // Was: await highlightElement(`box-${afterNode.next.next.id}`);
                await highlightElement(`box-${newNode.next.id}`);
            } else {
                await highlightElement('node-null');
            }
            // --- END OF FIX ---

            logStep(`3. Setting '${afterValue}'s .next pointer to the new node.`);
            await highlightElement(`arrow-${afterNode.id}`, 'highlight-arrow');
            await highlightElement(`box-${newNode.id}`);
            
            logStep("4. Operation complete.");
            showMessage(`Inserted '${newValue}' after '${afterValue}'!`, false);
            newPlaceInput.value = '';
            afterPlaceInput.value = '';
            setControlsDisabled(false);
        };

        removeBtn.onclick = async () => {
            if (isAnimating) return;
            const value = removePlaceInput.value.trim();
            if (!value) {
                showMessage('Please enter a place name to remove.', true);
                return;
            }

            const nodeToRemove = list.find(value);
            if (!nodeToRemove) {
                showMessage(`Could not find '${value}' in the tour.`, true);
                return;
            }

            setControlsDisabled(true);
            clearLog();
            
            const nodeElement = document.getElementById(nodeToRemove.id);

            // Case 1: Removing the head
            if (list.head.id === nodeToRemove.id) {
                logStep(`1. Target node ('${value}') is the HEAD.`);
                await highlightElement(`box-${nodeToRemove.id}`);

                logStep(`2. Setting 'HEAD' to point to the next node ('${nodeToRemove.next ? nodeToRemove.next.value : 'null'}').`);
                await highlightElement('head-arrow', 'highlight-arrow');
                if (nodeToRemove.next) {
                    await highlightElement(`box-${nodeToRemove.next.id}`);
                } else {
                    await highlightElement('node-null');
                }
            } 
            // Case 2: Removing from middle/end
            else {
                logStep(`1. Starting search for node *before* '${value}'...`);
                await highlightElement('head-arrow', 'highlight-arrow', 800);

                let prev = list.head;
                logStep(`Checking node: '${prev.value}'`);
                await highlightElement(`box-${prev.id}`, 'highlight-active', 1000);

                // Animate the traversal to find the *previous* node
                while (prev.next && prev.next.id !== nodeToRemove.id) {
                    logStep(`...not a match. Following next pointer.`);
                    await highlightElement(`arrow-${prev.id}`, 'highlight-arrow', 800);
                    prev = prev.next;
                    logStep(`Checking node: '${prev.value}'`);
                    await highlightElement(`box-${prev.id}`, 'highlight-active', 1000);
                }
                
                logStep(`2. Found node ('${prev.value}') before target.`);
                await highlightElement(`box-${prev.id}`);
                
                logStep(`3. Found target node ('${value}').`);
                await highlightElement(`box-${nodeToRemove.id}`);

                logStep(`4. Setting '${prev.value}'.next to point to '${nodeToRemove.next ? nodeToRemove.next.value : 'null'}'.`);
                await highlightElement(`arrow-${prev.id}`, 'highlight-arrow');
                if (nodeToRemove.next) {
                    await highlightElement(`box-${nodeToRemove.next.id}`);
                } else {
                    await highlightElement('node-null');
                }
            }
            
            // Animate the node disappearing
            logStep("4. Removing node from list...");
            nodeElement.classList.add('exiting');

            await sleep(500); // Wait for animation

            // Now, *actually* remove data and re-render
            list.remove(value);
            renderList();
            logStep("5. Operation complete.");
            showMessage(`Removed '${value}' from the tour.`, false);
            removePlaceInput.value = '';
            setControlsDisabled(false);
        };

        // NEW: Find Button Handler
        findBtn.onclick = async () => {
            if (isAnimating) return;
            const value = findPlaceInput.value.trim();
            if (!value) {
                showMessage('Please enter a place name to find.', true);
                return;
            }

            if (!list.find(value)) {
                showMessage(`Could not find '${value}' in the tour.`, true);
                return;
            }

            setControlsDisabled(true);
            clearLog();

            logStep(`Starting search from HEAD for '${value}'...`);
            await highlightElement('head-arrow', 'highlight-arrow', 800);

            let current = list.head;
            let found = false;

            while (current) {
                logStep(`Checking node: '${current.value}'`);
                await highlightElement(`box-${current.id}`, 'highlight-active', 1000);

                if (current.value === value) {
                    logStep(`Found '${value}'!`);
                    showMessage(`Found '${value}'!`, false);
                    found = true;
                    break;
                }

                if (current.next) {
                    logStep("...not a match. Following next pointer.");
                    await highlightElement(`arrow-${current.id}`, 'highlight-arrow', 800);
                    current = current.next;
                } else {
                    break; // End of list
                }
            }

            if (!found) {
                // This case should be caught by the initial list.find(), but good to have
                logStep(`'${value}' not found in the list.`);
                showMessage(`'${value}' not found.`, true);
            }

            findPlaceInput.value = '';
            setControlsDisabled(false);
        };

        // --- Initial Render ---
        
        // Add some initial data to make it interesting
        list.addTail('Tokyo');
        list.addTail('Kyoto');
        list.addTail('Osaka');
        renderList();
        
        // On initial load, animate all existing nodes
        document.querySelectorAll('.node-container').forEach((el, index) => {
            el.classList.add('entering');
            setTimeout(() => {
                el.classList.remove('entering');
            }, 10 + index * 100); // Stagger the initial animation
        });


    </script>
</body>
</html>
