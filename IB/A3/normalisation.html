        const StageInfo = ({ title, description, anomaly, rule, formalDefinition, onNext, nextLabel, isCompleted }) => (

        // --- KEY VOCABULARY COMPONENT ---

        const VocabularyMode = () => {
            const vocabTerms = [
                {
                    term: "Normalization",
                    definition: "The process of organizing data in a database. This involves creating tables and establishing relationships between those tables according to rules designed both to protect the data and to make the database more flexible by eliminating redundancy and inconsistent dependency."
                },
                {
                    term: "Entity",
                    definition: "A person, place, thing, or event about which data is stored. In a relational database, an entity corresponds to a table."
                },
                {
                    term: "Attribute",
                    definition: "A characteristic or property of an entity. In a relational database, an attribute corresponds to a column in a table."
                },
                {
                    term: "Primary Key",
                    definition: "A unique identifier for each record (row) in a table. It cannot contain null values."
                },
                {
                    term: "Foreign Key",
                    definition: "A field (or collection of fields) in one table that refers to the primary key in another table. It establishes a link between data in the two tables."
                },
                {
                    term: "Composite Key",
                    definition: "A primary key that consists of two or more attributes (columns) that uniquely identify a record."
                },
                {
                    term: "Redundancy",
                    definition: "The unnecessary repetition of data within a database. Normalization aims to minimize redundancy."
                },
                {
                    term: "Atomic Value",
                    definition: "A value that cannot be divided further. In 1NF, every cell in a table must contain a single, atomic value."
                },
                {
                    term: "Partial Dependency",
                    definition: "A situation where a non-key attribute depends on only a part of a composite primary key. 2NF removes partial dependencies."
                },
                {
                    term: "Transitive Dependency",
                    definition: "A situation where a non-key attribute depends on another non-key attribute. 3NF removes transitive dependencies."
                },
                {
                    term: "Schema",
                    definition: "The structure or design of a database, which defines the tables, fields, relationships, views, indexes, etc."
                },
                {
                    term: "Referential Integrity",
                    definition: "A property of data which, when satisfied, requires every value of one attribute (column) of a relation (table) to exist as a value of another attribute in a different (or the same) relation."
                },
                 {
                    term: "ACID Properties",
                    definition: "A set of properties (Atomicity, Consistency, Isolation, Durability) that guarantee that database transactions are processed reliably."
                },
                {
                    term: "Database Transaction",
                    definition: "A logical unit of work that must be either entirely completed or entirely aborted; no intermediate states are acceptable."
                },
                {
                    term: "Durability",
                    definition: "A property of database transactions ensuring that once a transaction has been committed, it will remain so, even in the event of power loss, crashes, or errors."
                },
                {
                    term: "Data Dictionary",
                    definition: "A centralized repository of information about data such as meaning, relationships to other data, origin, usage, and format."
                },
                {
                    term: "Database Administrator (DBA)",
                    definition: "A person responsible for the installation, configuration, upgrade, administration, monitoring, and maintenance of databases."
                },
                {
                    term: "Data Validation",
                    definition: "The process of ensuring that data entered into a system meets specific criteria or rules to ensure its accuracy and quality."
                },
                {
                    term: "Data Verification",
                    definition: "The process of checking data for accuracy and inconsistencies after data migration or entry."
                },
                {
                    term: "Atomicity",
                    definition: "A property of database transactions where a transaction is treated as a single unit, which either succeeds completely or fails completely."
                },
                {
                    term: "Consistency",
                    definition: "Ensures that a transaction can only bring the database from one valid state to another, maintaining database invariants."
                },
                {
                    term: "Isolation",
                    definition: "Ensures that concurrent execution of transactions leaves the database in the same state that would have been obtained if the transactions were executed sequentially."
                }
            ];

            const [searchTerm, setSearchTerm] = useState("");

            const filteredVocab = vocabTerms.filter(item =>
                item.term.toLowerCase().includes(searchTerm.toLowerCase()) ||
                item.definition.toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <div className="max-w-4xl mx-auto space-y-8">
                    <div className="mb-6">
                        <h2 className="text-3xl font-bold text-slate-800 mb-2">Key Vocabulary</h2>

                        </p>

                    <div className="grid gap-4 md:grid-cols-2">
                        {filteredVocab.map((item, index) => (

        // --- PAST PAPER QUESTIONS COMPONENT ---

                {

                {

                    tableHeaders: ["School_Name", "Code", "Address", "Date", "Num_Volunteers"],
                    tableData: [
                        ["Riverbank HS", "AB1234", "Goldmar Dr 15", "10/07/2017", "32"],

                        ["East High", "EE1324", "East Street 20", "20/10/2017", "19"],
                        ["Oceanview HS", "BG3445", "Long Road 123", "10/07/2017", "14"]
                    ],
                    questions: [
                        "(a) Identify three characteristics of the 1st Normal Form (1NF) which are evident in this relation. [3 marks]",
                        "(b) The table is normalized into SCHOOLS (Code, Name, Address) and VOLUNTEERS (Code, Date, Num). Discuss whether these relations are in 3NF. [5 marks]"
                    ]
                }
            ];

            return (
                <div className="max-w-5xl mx-auto space-y-8">
                    <div className="mb-6">
                        <h2 className="text-3xl font-bold text-slate-800 mb-2">Past Paper Questions</h2>
                        <p className="text-slate-600">
                            Practice with real IB Computer Science exam questions related to database normalization.
                        </p>
                    </div>

                    <div className="grid gap-8">
                        {questions.map((q, idx) => (
                            <Card key={idx} className="overflow-hidden">
                                <div className="bg-indigo-600 p-4 text-white flex justify-between items-center">
                                    <h3 className="font-bold text-lg">{q.year} - {q.paper}</h3>
                                    <Badge color="white" className="text-indigo-600 bg-white">Exam Practice</Badge>
                                </div>
                                <div className="p-6">
                                    <div className="mb-6">
                                        <h4 className="font-bold text-slate-800 mb-2">Scenario:</h4>

                                            <table className="w-full text-sm text-left">

                                                    <tr>
                                                        {q.tableHeaders.map((h, i) => (

                                                    {q.tableData.map((row, r) => (
                                                        <tr key={r} className="hover:bg-slate-50">

                                    <div className="space-y-4 bg-slate-50 p-5 rounded-lg border border-slate-200">

                                        <ul className="space-y-3">

        };

        // --- MODELLING MODE COMPONENT ---

        const ModellingMode = () => {
        const [step, setStep] = useState(0); // 0: Brainstorm, 1: Build Tables, 2: Review
        const [fieldInput, setFieldInput] = useState("");
        const [discoveredFields, setDiscoveredFields] = useState([]);
        
        // Table Building State
        const [tables, setTables] = useState([]);
        const [tableNameInput, setTableNameInput] = useState("");
        const [selectedFieldsForTable, setSelectedFieldsForTable] = useState([]);
        const [selectedPK, setSelectedPK] = useState("");

        const addField = () => {
            if (fieldInput.trim() && !discoveredFields.includes(fieldInput.trim())) {
            setDiscoveredFields([...discoveredFields, fieldInput.trim()]);
            setFieldInput("");
            }
        };

        const toggleFieldSelection = (field) => {
            if (selectedFieldsForTable.includes(field)) {
            setSelectedFieldsForTable(selectedFieldsForTable.filter(f => f !== field));
            if (selectedPK === field) setSelectedPK("");
            } else {
            setSelectedFieldsForTable([...selectedFieldsForTable, field]);
            }
        };

        const saveTable = () => {
            if (tableNameInput.trim() && selectedFieldsForTable.length > 0 && selectedPK) {
            setTables([
                ...tables, 
                { 
                id: Date.now(), 
                name: tableNameInput.trim(), 
                fields: selectedFieldsForTable, 
                pk: selectedPK 
                }
            ]);
            // Reset form but keep discovered fields available
            setTableNameInput("");
            setSelectedFieldsForTable([]);
            setSelectedPK("");
            }
        };

        const deleteTable = (id) => {
            setTables(tables.filter(t => t.id !== id));
        };

        // Pre-load helpful fields if they get stuck
        const loadHintFields = () => {
            const hints = ["ISBN", "Book_Title", "Author", "Publisher", "Member_ID", "Member_Name", "Member_Email", "Loan_Date", "Return_Date"];
            const newFields = hints.filter(h => !discoveredFields.includes(h));
            setDiscoveredFields([...discoveredFields, ...newFields]);
        };

        return (
            <div className="max-w-5xl mx-auto space-y-8">
            
            {/* Step Indicator */}

                    <em>Example: Deleting the last student in a "Physics" class also deletes the class details entirely.</em>
                    </p>
                </Card>
                <Card className="p-4 bg-rose-50 border-rose-100">
                    <h4 className="font-bold text-rose-800 mb-2">Update Anomaly</h4>
                    <p className="text-sm text-rose-700">
                    Occurs when data is redundant (repeated). Updating one instance requires updating all others to prevent inconsistency.
                    <br/><br/>
                    <em>Example: Updating a teacher's office requires finding every single row where that teacher appears.</em>
                    </p>
                </Card>
                </div>
            </section>

            {/* The Steps */}
            <section className="space-y-6">
                <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                <Layers className="w-6 h-6 text-indigo-600" />
                The Normal Forms
                </h3>

                {/* 1NF */}
                <div className="flex gap-4">
                <div className="flex-none w-12 h-12 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-xl">1</div>
                <Card className="flex-1 p-5">
                    <h4 className="text-lg font-bold text-slate-800 mb-2">First Normal Form (1NF)</h4>
                    <div className="bg-slate-50 p-3 border-l-4 border-indigo-400 mb-3 text-sm italic text-slate-600">
                    "A relation is in first normal form if every attribute in that relation is a single-valued attribute."
                    </div>
                    <ul className="list-disc list-inside text-slate-700 space-y-1 text-sm">
                    <li>Eliminate repeating groups in individual tables.</li>
                    <li>Create a separate table for each set of related data.</li>
                    <li>Identify each set of related data with a primary key.</li>
                    </ul>
                </Card>
                </div>

                {/* 2NF */}
                <div className="flex gap-4">
                <div className="flex-none w-12 h-12 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-xl">2</div>
                <Card className="flex-1 p-5">
                    <h4 className="text-lg font-bold text-slate-800 mb-2">Second Normal Form (2NF)</h4>
                    <div className="bg-slate-50 p-3 border-l-4 border-indigo-400 mb-3 text-sm italic text-slate-600">
                    "A relation is in 2NF if it is in 1NF and every non-primary-key attribute is fully functionally dependent on the primary key."
                    </div>
                    <ul className="list-disc list-inside text-slate-700 space-y-1 text-sm">
                    <li>Create separate tables for sets of values that apply to multiple records.</li>
                    <li>Relate these tables with a foreign key.</li>
                    <li><strong>Goal:</strong> Remove Partial Dependencies (where a column depends on only <em>part</em> of a composite primary key).</li>
                    </ul>
                </Card>
                </div>

                {/* 3NF */}
                <div className="flex gap-4">
                <div className="flex-none w-12 h-12 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-xl">3</div>
                <Card className="flex-1 p-5">
                    <h4 className="text-lg font-bold text-slate-800 mb-2">Third Normal Form (3NF)</h4>
                    <div className="bg-slate-50 p-3 border-l-4 border-indigo-400 mb-3 text-sm italic text-slate-600">
                    "A relation is in 3NF if it is in 2NF and has no transitive dependency for non-prime attributes."
                    </div>
                    <ul className="list-disc list-inside text-slate-700 space-y-1 text-sm">
                    <li>Eliminate fields that do not depend on the key.</li>
                    <li><strong>Goal:</strong> Remove Transitive Dependencies (where Column A depends on Column B, and Column B depends on the Key).</li>
                    <li><em>"Every non-key attribute must provide a fact about the key, the whole key, and nothing but the key."</em></li>
                    </ul>
                </Card>
                </div>

            </section>

            <NormalizationExample />
            </div>
        );
        };
