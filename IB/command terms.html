<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB CS Command Term Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .command-btn {
            transition: all 0.2s ease-in-out;
        }
        .command-btn.active {
            background-color: #3b82f6; /* bg-blue-600 */
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
         .command-btn:hover:not(.active) {
            background-color: #eff6ff; /* bg-blue-50 */
        }
        /* Custom scrollbar for better aesthetics */
        .sidebar-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar-scroll::-webkit-scrollbar-track {
            background: #f1f5f9; /* slate-100 */
            border-radius: 10px;
        }
        .sidebar-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1; /* slate-300 */
            border-radius: 10px;
        }
        .sidebar-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; /* slate-400 */
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div class="container mx-auto p-4 md:p-8">
        <!-- Header Section -->
        <header class="text-center mb-8 md:mb-12">
            <h1 class="text-4xl md:text-5xl font-bold text-slate-900">IB CS Command Term Simulator</h1>
            <p class="mt-3 text-lg text-slate-600 max-w-3xl mx-auto">Click a command term to see its definition, a sample question, and a model answer in the context of sorting algorithms.</p>
        </header>

        <!-- Main Content Area -->
        <div class="flex flex-col md:flex-row gap-8">

            <!-- Sidebar with Command Term Buttons -->
            <aside class="w-full md:w-1/3 lg:w-1/4">
                <div id="command-term-list" class="bg-white p-4 rounded-xl shadow-md max-h-[80vh] md:max-h-[calc(100vh-10rem)] overflow-y-auto sidebar-scroll">
                    <!-- Categories will be dynamically inserted here -->
                </div>
            </aside>

            <!-- Main Display Area -->
            <main class="w-full md:w-2/3 lg:w-3/4">
                <div id="display-area" class="bg-white p-6 md:p-8 rounded-xl shadow-md min-h-[300px]">
                    <!-- Selected term's content will be dynamically inserted here -->
                     <div class="text-center p-8">
                        <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                          <path vector-effect="non-scaling-stroke" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-5-5m5 5l5-5m-7.5-3l-2-2m2 2l2-2m-2 2v6m-4-6h.01M15 8h.01M9 16h.01" />
                        </svg>
                        <h3 class="mt-2 text-xl font-semibold text-gray-900">Select a Command Term</h3>
                        <p class="mt-1 text-base text-gray-500">Choose a term from the left to get started.</p>
                      </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const commandTermsData = [
            {
                category: '1: Know and Understand',
                terms: [
                    { term: 'Define', definition: 'Give the precise meaning of a word, phrase, concept or physical quantity.', question: '<em>Define</em> the term "sorting algorithm".', answer: 'A sorting algorithm is a method for reorganizing a collection of items into a specific order, most commonly numerical or lexicographical order. It takes a list or array as input, performs specified operations on it, and returns a sorted permutation of that list.' },
                    { term: 'Describe', definition: 'Give a detailed account.', question: '<em>Describe</em> the process of Selection Sort.', answer: 'Selection Sort divides an array into two parts: a sorted sub-array at the beginning and an unsorted sub-array at the end. In each pass, the algorithm finds the smallest element in the unsorted sub-array and swaps it with the leftmost element of that unsorted part. This leftmost element then becomes part of the sorted sub-array, and the process is repeated until the entire array is sorted.' },
                    { term: 'List', definition: 'Give a sequence of brief answers with no explanation.', question: '<em>List</em> three quadratic time (O(n²)) sorting algorithms.', answer: '1. Bubble Sort<br>2. Selection Sort<br>3. Insertion Sort' },
                    { term: 'Outline', definition: 'Give a brief account or summary.', question: '<em>Outline</em> the steps of Bubble Sort.', answer: 'Bubble Sort repeatedly steps through the list, compares adjacent pairs of elements, and swaps them if they are in the wrong order. These passes through the list are repeated until the list is sorted, which is confirmed when a pass completes with no swaps.' },
                    { term: 'State', definition: 'Give a specific name, value or other brief answer without explanation or calculation.', question: '<em>State</em> the average-case time complexity of Merge Sort.', answer: 'O(n log n).' },
                ]
            },
            {
                category: '2: Apply and Use',
                terms: [
                    { term: 'Distinguish', definition: 'Make clear the differences between two or more concepts or items.', question: '<em>Distinguish</em> between Bubble Sort and Selection Sort based on the number of swaps performed.', answer: 'The primary difference is that Bubble Sort may perform multiple swaps in each pass as it compares adjacent elements. In contrast, Selection Sort performs only one swap per pass after finding the minimum element in the unsorted portion. Therefore, Selection Sort will almost always perform significantly fewer swaps than Bubble Sort.' },
                    { term: 'Explain', definition: 'Give a detailed account including reasons or causes.', question: '<em>Explain</em> why Bubble Sort is considered an inefficient algorithm for large datasets.', answer: 'Bubble Sort is inefficient for large datasets because its time complexity in the average and worst case is O(n²). This is caused by the nested loop structure where every element must be compared to nearly every other element. As the number of items (n) in the dataset grows, the number of comparisons grows quadratically, leading to a dramatic increase in execution time, making it impractical for sorting large lists.' },
                    { term: 'Trace', definition: 'Follow and record the action of an algorithm.', question: '<em>Trace</em> the Bubble Sort algorithm on the array <code>[5, 1, 4]</code>.', answer: '<b>Initial Array:</b> <code>[5, 1, 4]</code><br><br><b>Pass 1:</b><br>• Compare 5 and 1. Swap. -> <code>[1, 5, 4]</code><br>• Compare 5 and 4. Swap. -> <code>[1, 4, 5]</code><br><i>End of Pass 1.</i><br><br><b>Pass 2:</b><br>• Compare 1 and 4. No swap. -> <code>[1, 4, 5]</code><br><i>End of Pass 2. The array is sorted.</i><br><br><b>Final Sorted Array:</b> <code>[1, 4, 5]</code>' },
                    { term: 'Construct', definition: 'Display information in a diagrammatic or logical form.', question: '<em>Construct</em> a table to show the state of the array <code>[4, 2, 1]</code> after each pass of Selection Sort.', 
                      answer: `
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr>
                                        <th class="border-b-2 p-2 bg-slate-100">Pass</th>
                                        <th class="border-b-2 p-2 bg-slate-100">Array State</th>
                                        <th class="border-b-2 p-2 bg-slate-100">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr><td class="border-b p-2">Initial</td><td class="border-b p-2"><code>[4, 2, 1]</code></td><td class="border-b p-2">-</td></tr>
                                    <tr><td class="border-b p-2">1</td><td class="border-b p-2"><code>[1, 2, 4]</code></td><td class="border-b p-2">Find min (1), swap with 4.</td></tr>
                                    <tr><td class="border-b p-2">2</td><td class="border-b p-2"><code>[1, 2, 4]</code></td><td class="border-b p-2">Find min (2), already in place.</td></tr>
                                </tbody>
                            </table>
                        </div>
                      `
                    },
                ]
            },
            {
                category: '3: Synthesis and Evaluation',
                terms: [
                    { term: 'Compare & Contrast', definition: 'Give an account of similarities and differences between two (or more) items or situations, referring to both (all) of them throughout.', question: '<em>Compare and contrast</em> the space complexity of Bubble Sort and Selection Sort.', answer: '<b>Similarity:</b> Both Bubble Sort and Selection Sort are considered in-place sorting algorithms. This means that for both algorithms, the amount of extra memory required does not grow with the size of the input array. Both primarily modify the array directly without needing significant auxiliary data structures.<br><br><b>Difference:</b> While both are O(1) in terms of space complexity, their operational mechanism differs. Bubble Sort operates on adjacent elements, while Selection Sort needs to keep track of the index of the minimum element found so far in the unsorted portion. However, this difference in operation does not alter the fact that their auxiliary memory usage is constant, distinguishing them from algorithms like Merge Sort which requires O(n) extra space.' },
                    { term: 'Discuss', definition: 'Offer a considered and balanced review that includes a range of arguments, factors or hypotheses. Opinions or conclusions should be presented clearly and supported by appropriate evidence.', question: '<em>Discuss</em> the suitability of using Selection Sort in a system with limited write memory.', answer: 'Selection Sort could be a suitable choice for a system where memory writes are expensive, such as with certain types of flash memory. The algorithm\'s primary characteristic is that it minimizes the number of swaps to at most n-1. This is a significant advantage over algorithms like Bubble Sort or Insertion Sort, which can perform a much larger number of swaps.<br><br>However, this must be balanced against its O(n²) time complexity. The algorithm still performs a large number of comparisons. If the system is also CPU-constrained, the time taken to find the minimum element in each pass might be prohibitive for large datasets.<br><br>In conclusion, for small to medium-sized datasets where minimizing write operations is the most critical factor, Selection Sort presents a compelling argument. For larger datasets or when read/comparison operations are the main bottleneck, other algorithms would likely be a better choice despite their higher swap counts.' },
                    { term: 'Evaluate', definition: 'Make an appraisal by weighing up the strengths and limitations.', question: '<em>Evaluate</em> the use of Bubble Sort in a production environment.', answer: '<b>Strengths:</b> The primary strength of Bubble Sort is its simplicity. It is very easy to understand and implement, which makes it a useful educational tool. Additionally, it can be optimized to detect an already sorted list (by checking if any swaps were made in a pass), in which case its best-case time complexity is O(n).<br><br><b>Limitations:</b> Its main limitation is its poor performance. With an average and worst-case time complexity of O(n²), it is one of the most inefficient sorting algorithms for any non-trivial dataset. It is significantly outperformed by algorithms like Quicksort, Merge Sort, and even Insertion Sort in most scenarios.<br><br><b>Appraisal:</b> Due to its severe performance limitations, Bubble Sort is almost never a suitable choice for a production environment. The benefits of its simplicity are far outweighed by its inefficiency. Any professional application would use a more optimized algorithm to ensure acceptable performance.' },
                    { term: 'Justify', definition: 'Give valid reasons or evidence to support an answer or conclusion.', question: 'A developer chose Selection Sort over Bubble Sort for an application. <em>Justify</em> this decision.', answer: 'The developer\'s decision can be justified by the fact that Selection Sort always performs fewer swaps than Bubble Sort. For every pass through the unsorted portion of the list, Selection Sort makes only one swap. In contrast, Bubble Sort may perform a swap for nearly every comparison in a pass. If the cost of swapping elements is high (for example, if the elements are large objects), minimizing swaps is critical for performance. Therefore, by choosing Selection Sort, the developer prioritized minimizing data movement, which is a valid and evidence-based reason for this choice.' },
                ]
            }
        ];

        const commandListContainer = document.getElementById('command-term-list');
        const displayArea = document.getElementById('display-area');

        function renderButtons() {
            let html = '';
            commandTermsData.forEach(category => {
                html += `<h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mt-4 mb-2 px-2">${category.category}</h3>`;
                category.terms.forEach(term => {
                    html += `<button data-term="${term.term}" class="command-btn w-full text-left p-2 rounded-lg font-medium text-slate-700">${term.term}</button>`;
                });
            });
            commandListContainer.innerHTML = html;
        }

        function displayTermInfo(termName) {
            let termData = null;
            for (const category of commandTermsData) {
                const found = category.terms.find(t => t.term === termName);
                if (found) {
                    termData = found;
                    break;
                }
            }
            
            if (!termData) return;

            const html = `
                <h2 class="text-3xl font-bold text-slate-900 mb-2">${termData.term}</h2>
                <p class="text-base text-slate-500 italic mb-6">${termData.definition}</p>

                <div class="space-y-6">
                    <div>
                        <h4 class="text-xl font-semibold text-blue-600 mb-2">Sample Question</h4>
                        <div class="prose max-w-none text-slate-800">${termData.question}</div>
                    </div>
                    <div>
                        <h4 class="text-xl font-semibold text-blue-600 mb-2">Model Answer</h4>
                        <div class="prose max-w-none text-slate-800 bg-slate-50 p-4 rounded-md">${termData.answer}</div>
                    </div>
                </div>
            `;
            displayArea.innerHTML = html;
        }

        commandListContainer.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                const term = e.target.dataset.term;
                
                // Update active button state
                const currentActive = commandListContainer.querySelector('.active');
                if (currentActive) {
                    currentActive.classList.remove('active');
                }
                e.target.classList.add('active');
                
                displayTermInfo(term);
            }
        });

        // Initial render
        renderButtons();
    </script>

</body>
</html>
