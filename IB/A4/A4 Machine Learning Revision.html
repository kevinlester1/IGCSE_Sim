                    <p class="mb-4">Machine learning is broadly categorized based on the nature of the learning signal or feedback available to the learning system.</p>
                    <ul class="list-disc space-y-4">
                        <li><strong>Supervised Learning:</strong> The algorithm learns from a labeled dataset, where each data point is tagged with a known, correct output or "ground truth". The goal is to learn a mapping function that can predict the output for new, unseen data.
                            <ul class="list-['-_'] list-inside ml-6 mt-2 space-y-2">
                                <li><strong>Classification:</strong> Predicts a discrete category. Examples include email spam filtering (spam/not spam), medical diagnosis (malignant/benign), or image recognition (cat/dog).</li>
                                <li><strong>Regression:</strong> Predicts a continuous, numerical value. Examples include predicting house prices based on features, forecasting stock prices, or estimating a student's exam score based on hours studied.</li>
                            </ul>
                        </li>
                        <li><strong>Unsupervised Learning:</strong> The algorithm is given unlabeled data and must find patterns or intrinsic structures on its own. There is no "teacher" or correct output.
                            <ul class="list-['-_'] list-inside ml-6 mt-2 space-y-2">
                                 <li><strong>Clustering:</strong> The most common task, it groups similar data points together. For example, segmenting customers into different purchasing groups or grouping similar news articles.</li>
                                 <li><strong>Anomaly Detection:</strong> Identifying rare items, events, or observations which deviate significantly from the majority of the data, such as credit card fraud detection.</li>
                                 <li><strong>Association Rule Learning:</strong> Discovers interesting relationships or "association rules" among variables in large datasets. A famous example is "market basket analysis," which finds relationships between items bought together in a supermarket (e.g., "Customers who buy diapers also tend to buy beer.").</li>
                            </ul>
                        </li>
                        <li><strong>Reinforcement Learning:</strong> An <strong>agent</strong> learns to make a sequence of decisions by interacting with an <strong>environment</strong>. The agent starts in a particular <strong>state</strong>, performs an <strong>action</strong>, and receives a numerical <strong>reward</strong> (or penalty). The goal is to learn a policy (a strategy) that maximizes the total cumulative reward over time. It's the basis for training AI in games like chess or Go, and in robotics.
                        </li>
                        <li><strong>Transfer Learning:</strong> A technique where a model developed for a task is reused as the starting point for a model on a second, related task. This is highly efficient as it saves significant training time and computational resources.</li>
                    </ul>

                    <p class="mb-4">Data preprocessing transforms raw data into a clean, understandable format. It is arguably the most important step in the machine learning pipeline, as model performance is highly dependent on data quality.</p>
                    <ul class="list-disc space-y-4">
                        <li><strong>Data Cleaning:</strong> Identifying and correcting or removing errors and inconsistencies. This includes handling missing values (e.g., by imputing the mean/median or removing the row) and managing outliers that can skew the model.</li>

                            <ul class="list-['-_'] list-inside ml-6 mt-2 space-y-2">
                                <li><strong>Normalization/Standardization:</strong> Scaling numeric features to a common range (e.g., 0 to 1 for normalization) or to have a mean of 0 and standard deviation of 1 (standardization). This is crucial for algorithms sensitive to the scale of input data. </li>

                        <li><strong>Decision Trees:</strong> A supervised model that uses a tree-like structure of decisions. It splits the data into smaller subsets based on feature values, starting from a root node and ending in leaf nodes that represent the final classification. They are highly interpretable but can easily overfit the training data. </li>

                        <li><strong>K-Means Clustering:</strong> An unsupervised algorithm that partitions data into 'k' distinct, non-overlapping clusters. It works iteratively: 1) Initialize 'k' centroids randomly. 2) Assign each data point to its nearest centroid. 3) Re-calculate the centroids as the mean of all points in the cluster. 4) Repeat steps 2-3 until the centroids no longer move. </li>
                    </ul>

            'ga-ann': {
                title: 'Genetic Algorithms & ANNs (HL)',
                summary: `
                    <p class="mb-4">These advanced topics cover models inspired by natural processes: evolution and the human brain.</p>
                    <ul class="list-disc space-y-4">
                        <li><strong>Genetic Algorithms (GAs):</strong> An optimization technique inspired by natural selection. GAs are used to find approximate solutions to difficult search problems, like the Traveling Salesperson Problem. The process involves a cycle of evaluation, selection, crossover, and mutation. 
                            <ul class="list-['-_'] list-inside ml-6 mt-2 space-y-2">
                                <li><strong>Population:</strong> An initial set of potential solutions (called individuals or chromosomes).</li>
                                <li><strong>Fitness Function:</strong> A function that evaluates how good a solution is. In the TSP, this would be the total length of the route.</li>
                                <li><strong>Selection:</strong> Fitter individuals are more likely to be selected for reproduction.</li>
                                <li><strong>Crossover:</strong> Combines parts of two parent solutions to create new offspring, inheriting traits from both.</li>
                                <li><strong>Mutation:</strong> Introduces small random changes into an individual's chromosome to ensure genetic diversity.</li>
                            </ul>
                        </li>
                         <li><strong>Artificial Neural Networks (ANNs):</strong> Models inspired by the brain, consisting of interconnected nodes (neurons) organized in layers (input, hidden, and output). Neurons process signals and pass them to subsequent neurons.

                                <li><strong>Neurons, Weights, and Biases:</strong> Each connection between neurons has a 'weight', which determines the strength of the signal. Each neuron has a 'bias' which is an extra parameter that can be tweaked. The network "learns" by adjusting these weights and biases.</li>
                                <li><strong>Activation functions</strong> (like Sigmoid or ReLU) within neurons introduce non-linearity, allowing ANNs to learn incredibly complex patterns that a linear model cannot.</li>

                    <p class="mb-4">The computational demands of ML tasks determine the necessary hardware, ranging from everyday devices to massive data centers.</p>

                        <li><strong>CPU (Central Processing Unit):</strong> A general-purpose processor excellent at handling a few complex operations sequentially. Suitable for traditional data analysis, preprocessing, and running simpler ML models, but inefficient for training large neural networks.</li>
                        <li><strong>GPU (Graphics Processing Unit):</strong> A specialized processor with thousands of cores designed to handle many simple operations in parallel. This architecture is perfectly suited for the matrix and vector calculations that are fundamental to training deep neural networks, making the process dramatically faster than on a CPU. </li>

                ]

            'ethics': {
                title: 'Ethical Considerations',
                summary: `
                    <p class="mb-4">As ML systems become more powerful and integrated into society, understanding their ethical implications is critically important.</p>
                    <ul class="list-disc space-y-4">
                        <li><strong>Bias:</strong> ML models learn from data. If training data reflects historical or societal biases, the model will learn and often amplify them. For example, a resume screening tool trained on data from a male-dominated industry might unfairly penalize female applicants. </li>
                        <li><strong>Privacy:</strong> ML models often require large amounts of data, which can be personal and sensitive. This creates major concerns about data collection, consent, security, and potential for misuse. Regulations like GDPR aim to protect user data, and techniques like Federated Learning attempt to train models without centralizing sensitive data.</li>

        const tabNav = document.getElementById('tab-nav');

        let currentQuizData = [];
        let currentQuestionIndex = 0;

        function renderTabContent(tabKey) {
            const data = contentData[tabKey];
            if (!data) return;
            
            const summaryHtml = data.summary;

            tabContent.innerHTML = `
                <div id="${tabKey}" class="tab-pane bg-white p-6 md:p-8 rounded-xl shadow-md">
                    <h2 class="text-2xl md:text-3xl font-bold mb-4 text-slate-800">${data.title}</h2>
                    <div class="prose max-w-none text-slate-700">${summaryHtml}</div>
                    <hr class="my-8">
                    <div id="quiz-container">
                        <h3 class="text-xl font-bold mb-4">Test Your Knowledge</h3>
                        <div id="quiz-content"></div>
                    </div>
                </div>
            `;
            
            startQuiz(data.quiz);
        }

        function startQuiz(quizData) {
            currentQuizData = quizData;
            currentQuestionIndex = 0;
            score = 0;
            showQuestion();
        }

        function showQuestion() {
            const quizContent = document.getElementById('quiz-content');
            if (currentQuestionIndex < currentQuizData.length) {
                const questionData = currentQuizData[currentQuestionIndex];
                const optionsHtml = questionData.options.map(option => 
                    `<button class="quiz-option w-full text-left p-4 my-2 border-2 border-slate-200 rounded-lg bg-slate-50 hover:bg-indigo-100 hover:border-indigo-300" onclick="checkAnswer(this, '${option.replace(/'/g, "\\'") === questionData.answer.replace(/'/g, "\\'")}')">${option}</button>`
                ).join('');

                quizContent.innerHTML = `
                    <div class="mb-2 text-slate-600">Question ${currentQuestionIndex + 1} of ${currentQuizData.length} | Score: ${score}</div>
                    <p class="text-lg font-semibold mb-4">${questionData.question}</p>
                    <div id="quiz-options">${optionsHtml}</div>
                    <div id="feedback" class="mt-4"></div>
                `;
            } else {
                showFinalScore();
            }
        }
        
        function checkAnswer(button, isCorrect) {
            const optionsContainer = document.getElementById('quiz-options');
            const feedback = document.getElementById('feedback');
            
            // Disable all buttons after an answer is chosen
            Array.from(optionsContainer.children).forEach(btn => {
                btn.disabled = true;
                // Highlight the correct answer
                 if (btn.innerText === currentQuizData[currentQuestionIndex].answer) {
                    btn.classList.add('correct');
                 }
            });

            if (isCorrect === 'true') {
                score++;
                button.classList.add('correct');
                feedback.innerHTML = `<p class="text-green-600 font-semibold">Correct!</p>`;
            } else {
                button.classList.add('incorrect');
                feedback.innerHTML = `<p class="text-red-600 font-semibold">Incorrect. The correct answer is highlighted.</p>`;
            }

            currentQuestionIndex++;
            
            setTimeout(showQuestion, 2000); // Wait 2 seconds before showing the next question
        }

        function showFinalScore() {
            const quizContent = document.getElementById('quiz-content');
            quizContent.innerHTML = `
                <div class="text-center p-6 bg-indigo-50 rounded-lg">
                    <h4 class="text-2xl font-bold">Quiz Complete!</h4>
                    <p class="text-lg my-2">Your final score is:</p>
                    <p class="text-4xl font-bold text-indigo-600">${score} / ${currentQuizData.length}</p>
                    <button class="mt-6 bg-indigo-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-indigo-700 transition-colors" onclick="startQuiz(currentQuizData)">Try Again</button>
                </div>
            `;
        }

        tabNav.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                const tabKey = e.target.dataset.tab;

                // Update active tab style
                Array.from(tabNav.children).forEach(tab => tab.classList.remove('tab-active'));
                e.target.classList.add('tab-active');

                // Render content
                renderTabContent(tabKey);
            }
        });

        // Initial load
        renderTabContent('ml-types');

    </script>
</body>
</html>
