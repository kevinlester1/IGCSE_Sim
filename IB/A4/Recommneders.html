<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendation Engine Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-2 tracking-tight">
                Recommendation <span class="text-indigo-600">Engine</span> Simulator
            </h1>
            <p class="text-slate-600 max-w-2xl mx-auto text-sm md:text-base">
                See exactly how algorithms process data to find your "Next Favorite Movie."
            </p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- LEFT COLUMN: Database & Profile -->
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-4 bg-slate-100 border-b border-slate-200 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <i data-lucide="film" class="text-slate-600 w-5 h-5"></i>
                            <h2 class="font-bold text-slate-800 uppercase text-xs tracking-wider">Movie Database</h2>
                        </div>
                        <span class="text-[10px] bg-indigo-200 text-indigo-700 px-2 py-0.5 rounded-full font-bold uppercase">Click to Like</span>
                    </div>
                    <div id="movie-list" class="p-4 grid grid-cols-1 gap-3 max-h-[500px] overflow-y-auto custom-scroll">
                        <!-- Movies rendered here -->
                    </div>
                </div>

                <div class="bg-indigo-600 text-white rounded-2xl p-6 shadow-lg shadow-indigo-200">
                    <h3 class="font-bold mb-4 flex items-center gap-2 border-b border-indigo-500 pb-2 text-lg">
                        <i data-lucide="user" class="w-5 h-5"></i> Your Digital Profile
                    </h3>
                    <div id="user-profile">
                        <!-- Profile rendered here -->
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: Algorithms & Tabs -->
            <div class="lg:col-span-8 space-y-6">
                <!-- Tab Switcher -->
                <div class="flex bg-slate-200 p-1 rounded-xl">
                    <button onclick="switchTab('collaborative')" id="tab-collaborative" class="flex-1 flex items-center justify-center gap-2 py-3 rounded-lg font-bold text-sm transition-all text-slate-600 hover:text-slate-800">
                        <i data-lucide="users" class="w-4 h-4"></i> Collaborative
                    </button>
                    <button onclick="switchTab('content')" id="tab-content" class="flex-1 flex items-center justify-center gap-2 py-3 rounded-lg font-bold text-sm transition-all text-slate-600 hover:text-slate-800">
                        <i data-lucide="layers" class="w-4 h-4"></i> Content-Based
                    </button>
                    <button onclick="switchTab('hybrid')" id="tab-hybrid" class="flex-1 flex items-center justify-center gap-2 py-3 rounded-lg font-bold text-sm transition-all text-slate-600 hover:text-slate-800">
                        <i data-lucide="sparkles" class="w-4 h-4"></i> Hybrid
                    </button>
                    <button onclick="switchTab('unplugged')" id="tab-unplugged" class="flex-1 flex items-center justify-center gap-2 py-3 rounded-lg font-bold text-sm transition-all text-slate-600 hover:text-slate-800">
                        <i data-lucide="scissors" class="w-4 h-4"></i> Unplugged
                    </button>
                </div>

                <!-- Active Tab Content -->
                <div id="tab-content-area" class="space-y-6">
                    <!-- Tab UI rendered here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const MOVIES = [
            { id: 1, title: "Interstellar", genre: ["Sci-Fi", "Drama"], tags: ["Space", "Emotional"] },
            { id: 2, title: "Inception", genre: ["Sci-Fi", "Action"], tags: ["Dreams", "Complex"] },
            { id: 3, title: "The Dark Knight", genre: ["Action", "Drama"], tags: ["Hero", "Dark"] },
            { id: 4, title: "Arrival", genre: ["Sci-Fi", "Drama"], tags: ["Space", "Aliens"] },
            { id: 5, title: "The Godfather", genre: ["Crime", "Drama"], tags: ["Classic", "Family"] },
            { id: 6, title: "Pulp Fiction", genre: ["Crime", "Action"], tags: ["Cool", "Non-linear"] },
            { id: 7, title: "Toy Story", genre: ["Animation", "Family"], tags: ["Kids", "Fun"] },
            { id: 8, title: "Finding Nemo", genre: ["Animation", "Family"], tags: ["Ocean", "Kids"] },
            { id: 9, title: "The Matrix", genre: ["Sci-Fi", "Action"], tags: ["Cyberpunk", "Reality"] },
            { id: 10, title: "Spirited Away", genre: ["Animation", "Fantasy"], tags: ["Magic", "Journey"] },
            { id: 11, title: "The Silence of the Lambs", genre: ["Crime", "Thriller"], tags: ["Intense", "Classic"] },
            { id: 12, title: "Up", genre: ["Animation", "Family"], tags: ["Emotional", "Adventure"] },
            { id: 13, title: "Gladiator", genre: ["Action", "History"], tags: ["Hero", "Classic"] },
            { id: 14, title: "The Prestige", genre: ["Drama", "Thriller"], tags: ["Magic", "Complex"] },
            { id: 15, title: "The Lion King", genre: ["Animation", "Family"], tags: ["Animals", "Classic"] },
            { id: 16, title: "Jurassic Park", genre: ["Action", "Sci-Fi"], tags: ["Dinosaurs", "Adventure"] },
            { id: 17, title: "Back to the Future", genre: ["Sci-Fi", "Comedy"], tags: ["Time-travel", "Classic"] },
            { id: 18, title: "Parasite", genre: ["Thriller", "Drama"], tags: ["Social", "Intense"] },
            { id: 19, title: "Shrek", genre: ["Animation", "Comedy"], tags: ["Fairy-tale", "Fun"] },
            { id: 20, title: "Avengers", genre: ["Action", "Sci-Fi"], tags: ["Hero", "Team-up"] }
        ];

        const OTHER_USERS = [
            { id: 'u1', name: "Alice", likes: [1, 2, 4, 9, 14, 20] },
            { id: 'u2', name: "Bob", likes: [5, 6, 3, 11, 13, 18] },
            { id: 'u3', name: "Charlie", likes: [7, 8, 1, 10, 12, 19] },
            { id: 'u4', name: "Dana", likes: [1, 2, 3, 9, 13, 16] }
        ];

        let state = {
            userLikes: [],
            activeTab: 'hybrid',
            expandedId: null
        };

        function toggleLike(id) {
            if (state.userLikes.includes(id)) {
                state.userLikes = state.userLikes.filter(item => item !== id);
            } else {
                state.userLikes.push(id);
            }
            render();
        }

        function switchTab(tab) {
            state.activeTab = tab;
            state.expandedId = null;
            render();
        }

        function toggleExpand(id) {
            state.expandedId = state.expandedId === id ? null : id;
            render();
        }

        function getPeerSimilarities() {
            return OTHER_USERS.map(user => {
                const intersection = user.likes.filter(id => state.userLikes.includes(id));
                const union = Array.from(new Set([...user.likes, ...state.userLikes]));
                const similarity = union.length === 0 ? 0 : intersection.length / union.length;
                return { ...user, similarity };
            }).sort((a, b) => b.similarity - a.similarity);
        }

        function getContentScores() {
            const likedItems = MOVIES.filter(m => state.userLikes.includes(m.id));
            const profileGenres = new Set(likedItems.flatMap(m => m.genre));
            const profileTags = new Set(likedItems.flatMap(m => m.tags));

            return MOVIES.reduce((acc, movie) => {
                if (!state.userLikes.includes(movie.id)) {
                    const matchingGenres = movie.genre.filter(g => profileGenres.has(g));
                    const matchingTags = movie.tags.filter(t => profileTags.has(t));
                    acc[movie.id] = matchingGenres.length + matchingTags.length;
                }
                return acc;
            }, {});
        }

        function getCollaborativeScores() {
            const peerSimilarities = getPeerSimilarities();
            const recMap = {};
            peerSimilarities.forEach(peer => {
                if (peer.similarity > 0) {
                    peer.likes.forEach(mid => {
                        if (!state.userLikes.includes(mid)) {
                            if (!recMap[mid]) recMap[mid] = 0;
                            recMap[mid] += peer.similarity;
                        }
                    });
                }
            });
            return recMap;
        }

        function render() {
            const movieList = document.getElementById('movie-list');
            movieList.innerHTML = MOVIES.map(movie => {
                const isLiked = state.userLikes.includes(movie.id);
                return `
                    <button onclick="toggleLike(${movie.id})" 
                        class="flex items-start justify-between p-3 rounded-xl border transition-all text-left ${isLiked ? 'border-pink-200 bg-pink-50 text-pink-700 ring-2 ring-pink-100 ring-offset-1' : 'border-slate-100 bg-white hover:border-indigo-200 hover:bg-indigo-50'}">
                        <div class="flex-1 pr-2">
                            <div class="font-semibold text-sm mb-1">${movie.title}</div>
                            <div class="flex flex-wrap gap-1 mb-1">
                                ${movie.genre.map(g => `<span class="text-[9px] px-1.5 py-0.5 bg-indigo-100 text-indigo-700 rounded-sm font-medium uppercase">${g}</span>`).join('')}
                            </div>
                            <div class="flex flex-wrap gap-1">
                                ${movie.tags.map(t => `<span class="text-[9px] px-1.5 py-0.5 bg-slate-200 text-slate-600 rounded-sm italic font-mono">#${t}</span>`).join('')}
                            </div>
                        </div>
                        <i data-lucide="heart" class="w-4 h-4 mt-1 ${isLiked ? 'fill-pink-500 text-pink-500' : 'text-slate-300'}"></i>
                    </button>
                `;
            }).join('');

            const profileArea = document.getElementById('user-profile');
            if (state.userLikes.length === 0) {
                profileArea.innerHTML = `<p class="text-indigo-100 text-sm italic">Like some movies to generate your "Taste Vector" for the AI.</p>`;
            } else {
                const likedItems = MOVIES.filter(m => state.userLikes.includes(m.id));
                const genres = Array.from(new Set(likedItems.flatMap(m => m.genre)));
                const tags = Array.from(new Set(likedItems.flatMap(m => m.tags)));
                profileArea.innerHTML = `
                    <div class="space-y-4 text-xs">
                        <div>
                            <span class="text-[10px] uppercase font-bold text-indigo-200 tracking-widest">Aggregated Genres</span>
                            <div class="flex flex-wrap gap-1.5 mt-2">
                                ${genres.map(g => `<span class="px-2 py-0.5 bg-indigo-500 rounded text-[10px] font-medium border border-indigo-400">${g}</span>`).join('')}
                            </div>
                        </div>
                        <div>
                            <span class="text-[10px] uppercase font-bold text-indigo-200 tracking-widest">Keyword Features</span>
                            <div class="flex flex-wrap gap-1.5 mt-2">
                                ${tags.map(t => `<span class="px-2 py-0.5 bg-indigo-400 rounded text-[10px] font-medium border border-indigo-300">#${t}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }

            ['collaborative', 'content', 'hybrid', 'unplugged'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (state.activeTab === t) {
                    btn.className = "flex-1 flex items-center justify-center gap-2 py-3 rounded-lg font-bold text-sm transition-all bg-white shadow-sm text-indigo-600";
                } else {
                    btn.className = "flex-1 flex items-center justify-center gap-2 py-3 rounded-lg font-bold text-sm transition-all text-slate-600 hover:text-slate-800";
                }
            });

            const contentArea = document.getElementById('tab-content-area');
            if (state.activeTab === 'collaborative') renderCollaborative(contentArea);
            if (state.activeTab === 'content') renderContentBased(contentArea);
            if (state.activeTab === 'hybrid') renderHybrid(contentArea);
            if (state.activeTab === 'unplugged') renderUnplugged(contentArea);

            lucide.createIcons();
        }

        function renderCollaborative(container) {
            const peerSimilarities = getPeerSimilarities();
            const recMap = getCollaborativeScores();
            const recs = Object.entries(recMap).map(([id, score]) => {
                const movie = MOVIES.find(m => m.id == id);
                const fromUsers = OTHER_USERS.filter(u => u.likes.includes(movie.id) && peerSimilarities.find(p => p.id == u.id).similarity > 0).map(u => u.name);
                return { ...movie, score, fromUsers };
            }).sort((a, b) => b.score - a.score);

            container.innerHTML = `
                <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                    <div class="flex items-center gap-3 mb-2 text-slate-800">
                        <i data-lucide="users" class="text-blue-500"></i>
                        <h2 class="text-xl font-bold">Collaborative Filtering</h2>
                    </div>
                    <p class="text-sm text-slate-600">Recommends items liked by people who have similar taste to you.</p>
                </div>
                <div class="space-y-4">
                    ${state.userLikes.length === 0 ? '<div class="p-12 text-center text-slate-400 bg-white rounded-2xl border-2 border-dashed border-slate-200">Like a movie to find neighbors.</div>' : 
                    recs.map(rec => `
                        <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm">
                            <div class="flex justify-between">
                                <div>
                                    <h4 class="font-bold">${rec.title}</h4>
                                    <p class="text-xs text-slate-500">Found via ${rec.fromUsers.join(', ')}</p>
                                </div>
                                <div class="text-blue-600 font-bold">${rec.score.toFixed(1)}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderContentBased(container) {
            const scores = getContentScores();
            const recs = Object.entries(scores).map(([id, score]) => {
                const movie = MOVIES.find(m => m.id == id);
                return { ...movie, score };
            }).filter(r => r.score > 0).sort((a, b) => b.score - a.score);

            container.innerHTML = `
                <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                    <div class="flex items-center gap-3 mb-2 text-slate-800">
                        <i data-lucide="layers" class="text-amber-500"></i>
                        <h2 class="text-xl font-bold">Content-Based Filtering</h2>
                    </div>
                    <p class="text-sm text-slate-600">Recommends items with tags/genres that match your history.</p>
                </div>
                <div class="space-y-4">
                    ${state.userLikes.length === 0 ? '<div class="p-12 text-center text-slate-400 bg-white rounded-2xl border-2 border-dashed border-slate-200">Like a movie to find features.</div>' : 
                    recs.map(rec => `
                        <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm">
                            <div class="flex justify-between">
                                <h4 class="font-bold">${rec.title}</h4>
                                <div class="text-amber-600 font-bold">${rec.score}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderHybrid(container) {
            const contentScores = getContentScores();
            const collabScores = getCollaborativeScores();
            
            // Normalize scores to roughly same scale (0-5)
            const hybridRecs = MOVIES
                .filter(m => !state.userLikes.includes(m.id))
                .map(movie => {
                    const cScore = contentScores[movie.id] || 0;
                    const colScore = collabScores[movie.id] || 0;
                    // Hybrid formula: Weighted average (50/50)
                    const hScore = (cScore * 0.5) + (colScore * 1.5); 
                    return { ...movie, cScore, colScore, hScore };
                })
                .filter(r => r.hScore > 0)
                .sort((a, b) => b.hScore - a.hScore);

            container.innerHTML = `
                <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-6 shadow-sm">
                    <div class="flex items-center gap-3 mb-3 text-indigo-900">
                        <i data-lucide="sparkles" class="text-indigo-600"></i>
                        <h2 class="text-xl font-bold">The Hybrid Approach</h2>
                    </div>
                    <p class="text-sm text-indigo-700 leading-relaxed mb-4">
                        This is how the pros do it. We combine <strong>Content features</strong> and <strong>Social signals</strong> to give you the most accurate results possible. It balances your specific niche interests with what's popular in your "tribe."
                    </p>
                    <div class="grid grid-cols-2 gap-4 text-xs font-mono text-indigo-400">
                        <div class="bg-white/50 p-2 rounded">Content Weight: 50%</div>
                        <div class="bg-white/50 p-2 rounded">Collaborative Weight: 50%</div>
                    </div>
                </div>

                <div class="space-y-4">
                    ${state.userLikes.length === 0 ? '<div class="p-12 text-center text-slate-400 bg-white rounded-2xl border-2 border-dashed border-slate-200">Start liking movies to see the Hybrid results.</div>' : 
                    hybridRecs.map(rec => `
                        <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                            <div onclick="toggleExpand(${rec.id})" class="p-5 flex items-center justify-between cursor-pointer group">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 rounded-xl bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-lg">
                                        ${rec.hScore.toFixed(1)}
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-slate-800">${rec.title}</h4>
                                        <div class="flex gap-2 mt-1">
                                            <span class="text-[9px] text-amber-600 bg-amber-50 px-1 rounded">Content: ${rec.cScore}</span>
                                            <span class="text-[9px] text-blue-600 bg-blue-50 px-1 rounded">Social: ${rec.colScore.toFixed(1)}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="text-indigo-600 font-bold text-xs uppercase flex items-center gap-1">
                                    Details <i data-lucide="chevron-right" class="w-4 h-4 ${state.expandedId === rec.id ? 'rotate-90' : ''}"></i>
                                </div>
                            </div>
                            ${state.expandedId === rec.id ? `
                                <div class="bg-slate-50 p-4 border-t border-slate-100 text-xs">
                                    <p class="text-slate-500 mb-2 font-bold uppercase tracking-widest text-[9px]">Hybrid Logic:</p>
                                    <p class="leading-relaxed">This movie was chosen because it matches your tags <strong>(${rec.cScore} hits)</strong> AND it's popular with people who have your same taste <strong>(+${rec.colScore.toFixed(1)} peer points)</strong>.</p>
                                </div>
                            ` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderUnplugged(container) {
            container.innerHTML = `
                <div class="bg-white rounded-2xl border border-slate-200 p-8 space-y-8 shadow-sm">
                    <div class="border-l-4 border-indigo-500 pl-4">
                        <h2 class="text-2xl font-bold mb-2 text-slate-800">Classroom Logic Activity</h2>
                        <p class="text-slate-600 italic">No computers needed—just some cards and human interaction.</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-4">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center font-bold">1</div>
                                <h3 class="font-bold text-lg">The Feature Match</h3>
                            </div>
                            <div class="bg-slate-50 p-4 rounded-xl text-sm leading-relaxed text-slate-700 border border-slate-100">
                                <p class="mb-2 font-bold text-amber-700 underline">Goal: Content-Based Filtering.</p>
                                <p>Count tag matches between your profile and a new card.</p>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold">2</div>
                                <h3 class="font-bold text-lg">The Taste Neighbor</h3>
                            </div>
                            <div class="bg-slate-50 p-4 rounded-xl text-sm leading-relaxed text-slate-700 border border-slate-100">
                                <p class="mb-2 font-bold text-blue-700 underline">Goal: Collaborative Filtering.</p>
                                <p>Find a partner with similar likes and "steal" their recommendations.</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        window.onload = () => render();
    </script>
</body>
</html>
