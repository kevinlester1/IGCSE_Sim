    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hogwarts Decision Tree Sorting Hat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

        body {
            font-family: 'Lora', serif;
            background-color: #1a202c;
            color: #e2e8f0;
        }
        h1, h2 {
            font-family: 'Cinzel Decorative', cursive;
            letter-spacing: 0.05em;
        }
        .house-gryffindor { border-color: #ae0001; background-color: rgba(174, 0, 1, 0.1); }
        .house-hufflepuff { border-color: #ffdb00; background-color: rgba(255, 219, 0, 0.1); }
        .house-ravenclaw { border-color: #222f5b; background-color: rgba(34, 47, 91, 0.1); }
        .house-slytherin { border-color: #2a623d; background-color: rgba(42, 98, 61, 0.1); }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #4a5568; border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #d4af37; cursor: pointer; margin-top: -6px; }
        input[type=range]::-moz-range-track { width: 100%; height: 8px; cursor: pointer; background: #4a5568; border-radius: 5px; }
        input[type=range]::-moz-range-thumb { height: 20px; width: 20px; border-radius: 50%; background: #d4af37; cursor: pointer; }

        .decision-node {
            border-left: 2px solid #4a5568;
            padding-left: 1.5rem;
            margin-top: 1rem;
        }
        .decision-path {
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .decision-path.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>

<body class="bg-gray-900 text-gray-200 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-4xl mx-auto bg-gray-800 p-8 rounded-2xl shadow-2xl" style="background: rgba(31, 41, 55, 0.8); backdrop-filter: blur(10px);">
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold text-yellow-300">The Sorting Hat</h1>
            <p class="text-lg text-gray-400 mt-2">Discover your House with a Decision Tree</p>
        </header>

        <main>
            <div id="controls" class="mb-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="trait-sliders">
                    <!-- Sliders will be dynamically inserted here -->
                </div>
            </div>

            <div class="text-center mb-8">
                <button id="sort-button" class="bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-bold py-3 px-8 rounded-lg text-xl transition-transform transform hover:scale-105">
                    Sort Me!
                </button>
            </div>

            <div id="result-container" class="text-center p-4 rounded-lg border-2 border-transparent transition-all duration-500 hidden">
                 <h2 class="text-2xl font-bold mb-4">The Sorting Hat's Path:</h2>
                 <div id="decision-path-container" class="text-left"></div>
            </div>
        </main>
    </div>

    <script>
        const csvData = `Bravery,Helping,chivalry,Hard work,patience,loyalty,fair play,Intelligence,knowledge,planning ahead,wit,Ambition,cunningness,heritage,resourcefulness,House

        let dataset = [];
        let traits = [];
        let decisionTree = {};

        // --- UI Setup ---
        function parseCSV(data) {
            const lines = data.trim().split('\n');
            const headers = lines[0].split(',');
            traits = headers.slice(0, -1);
            
            const records = [];
            for(let i = 1; i < lines.length; i++) {
                const row = {};
                const values = lines[i].split(',');
                headers.forEach((header, index) => {
                    const value = values[index].trim();
                    row[header] = isNaN(parseFloat(value)) ? value : parseFloat(value);
                });
                records.push(row);
            }
            return records;
        }

        function createSliders() {
            const container = document.getElementById('trait-sliders');
            traits.forEach(trait => {
                const div = document.createElement('div');
                div.className = 'mb-4';
                const label = document.createElement('label');
                label.htmlFor = `slider-${trait}`;
                label.className = 'block text-gray-300 font-semibold mb-2 flex justify-between';
                const traitName = document.createElement('span');
                traitName.textContent = trait.charAt(0).toUpperCase() + trait.slice(1);
                const traitValue = document.createElement('span');
                traitValue.id = `value-${trait}`;
                traitValue.textContent = '5';
                label.appendChild(traitName);
                label.appendChild(traitValue);
                const slider = document.createElement('input');
                slider.type = 'range';
                slider.id = `slider-${trait}`;
                slider.min = '1';
                slider.max = '10';
                slider.value = '5';
                slider.className = 'w-full';
                slider.addEventListener('input', () => { traitValue.textContent = slider.value; });
                div.appendChild(label);
                div.appendChild(slider);
                container.appendChild(div);
            });
        }

        // --- Decision Tree Algorithm ---
        function getHouseCounts(rows) {
            const counts = {};
            for (const row of rows) {
                const label = row['House'];
                counts[label] = (counts[label] || 0) + 1;
            }
            return counts;
        }

        function gini(rows) {
            const counts = getHouseCounts(rows);
            let impurity = 1;
            for (const lbl in counts) {
                const prob_of_lbl = counts[lbl] / rows.length;
                impurity -= prob_of_lbl ** 2;
            }
            return impurity;
        }
        
        class Question {
            constructor(column, value) {
                this.column = column;
                this.value = value;
            }
            match(example) {
                const val = example[this.column];
                return val >= this.value;
            }
            toString() {
                return `Is ${this.column.charAt(0).toUpperCase() + this.column.slice(1)} >= ${this.value}?`;
            }
        }

        function partition(rows, question) {
            const true_rows = [], false_rows = [];
            for (const row of rows) {
                if (question.match(row)) {
                    true_rows.push(row);
                } else {
                    false_rows.push(row);
                }
            }
            return [true_rows, false_rows];
        }

        function findBestSplit(rows) {
            let best_gain = 0;
            let best_question = null;
            const current_uncertainty = gini(rows);
            
            for (const col of traits) {
                const values = new Set(rows.map(r => r[col]));
                for (const val of values) {
                    const question = new Question(col, val);
                    const [true_rows, false_rows] = partition(rows, question);
                    if (true_rows.length === 0 || false_rows.length === 0) continue;
                    
                    const p = true_rows.length / rows.length;
                    const info_gain = current_uncertainty - p * gini(true_rows) - (1 - p) * gini(false_rows);
                    
                    if (info_gain >= best_gain) {
                        best_gain = info_gain;
                        best_question = question;
                    }
                }
            }
            return { gain: best_gain, question: best_question };
        }

        function buildTree(rows) {
            const { gain, question } = findBestSplit(rows);
            if (gain === 0) {
                return { leaf: getHouseCounts(rows) };
            }
            const [true_rows, false_rows] = partition(rows, question);
            const true_branch = buildTree(true_rows);
            const false_branch = buildTree(false_rows);
            return { question: question, true_branch: true_branch, false_branch: false_branch };
        }
        
        // --- Sorting and Display ---
        function handleSort() {
            const userTraits = {};
            traits.forEach(trait => {
                userTraits[trait] = parseInt(document.getElementById(`slider-${trait}`).value, 10);
            });
            
            const resultContainer = document.getElementById('result-container');
            const pathContainer = document.getElementById('decision-path-container');
            pathContainer.innerHTML = '';
            resultContainer.className = 'text-center p-4 rounded-lg border-2 border-transparent transition-all duration-500'; // Reset classes
            resultContainer.classList.remove('hidden');

            classifyAndDisplay(userTraits, decisionTree, pathContainer, 0);
        }
        
        function classifyAndDisplay(user, node, container, depth) {
            // Base case: we've reached a leaf
            if (node.leaf) {
                const sortedVotes = Object.entries(node.leaf).sort((a,b) => b[1] - a[1]);
                const finalHouse = sortedVotes[0][0];

                const finalDiv = document.createElement('div');
                finalDiv.className = `decision-path p-4 mt-4 rounded-lg house-${finalHouse.toLowerCase()}`;
                finalDiv.innerHTML = `<p class="font-bold text-lg">Therefore, you belong in:</p><h2 class="text-4xl font-bold">${finalHouse}</h2>`;
                container.appendChild(finalDiv);

                setTimeout(() => { 
                    finalDiv.classList.add('visible');
                    resultContainer.classList.add(`house-${finalHouse.toLowerCase()}`);
                }, 100);

                return;
            }
            
            const question = node.question;
            const answer = question.match(user);

            // Create and append the question element
            const questionDiv = document.createElement('div');
            questionDiv.className = 'decision-path decision-node';
            questionDiv.innerHTML = `
                <p class="text-gray-400">Step ${depth + 1}:</p>
                <p class="font-bold text-xl">${question.toString()}</p>
                <p class="text-lg">Your value for ${question.column} is <span class="font-bold text-yellow-300">${user[question.column]}</span>, so the answer is <span class="font-bold ${answer ? 'text-green-400' : 'text-red-400'}">${answer ? 'YES' : 'NO'}</span>.</p>
            `;
            container.appendChild(questionDiv);
            
            // Make the question visible with a delay
            setTimeout(() => {
                questionDiv.classList.add('visible');
                // Recurse to the next level after animation
                setTimeout(() => {
                    if (answer) {
                        classifyAndDisplay(user, node.true_branch, container, depth + 1);
                    } else {
                        classifyAndDisplay(user, node.false_branch, container, depth + 1);
                    }
                }, 800);
            }, depth * 1000);
        }

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            dataset = parseCSV(csvData);
            decisionTree = buildTree(dataset);
            createSliders();
            document.getElementById('sort-button').addEventListener('click', handleSort);
        });
    </script>
