<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB Machine Learning Quiz</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Set Inter as the default font -->
    <style>
        html {
            font-family: 'Inter', sans-serif;
        }
        /* Custom styles for answer feedback */
        .answer-btn.correct {
            background-color: #d1fae5; /* green-100 */
            border-color: #10b981; /* green-500 */
            color: #065f46; /* green-800 */
        }
        .answer-btn.incorrect {
            background-color: #fee2e2; /* red-100 */
            border-color: #ef4444; /* red-500 */
            color: #991b1b; /* red-800 */
        }
        .answer-btn.selected {
            ring: 2px;
            ring-offset-2;
        }
        .answer-btn:disabled {
            opacity: 0.8;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <!-- Start Screen Container -->
    <div id="start-container" class="bg-white p-6 sm:p-8 rounded-xl shadow-2xl w-full max-w-2xl">
        <h1 class="text-3xl font-bold text-indigo-700 mb-2">IB Machine Learning Quiz</h1>
        <p class="text-lg text-gray-600 mb-8">Select a topic to revise or take the full quiz.</p>
        
        <div id="section-list" class="space-y-6">
            <!-- Sections will be dynamically inserted here -->
        </div>

        <button onclick="startQuiz(-1)" class="w-full mt-8 bg-green-600 text-white px-6 py-3 rounded-lg font-medium text-lg hover:bg-green-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-green-400 focus:ring-offset-2">
            Quiz All (70 Questions)
        </button>
    </div>

    <!-- Quiz Container (Initially Hidden) -->
    <div id="quiz-container" class="bg-white p-6 sm:p-8 rounded-xl shadow-2xl w-full max-w-2xl hidden">
        
        <!-- Quiz Header -->
        <div class="flex justify-between items-center border-b pb-4 mb-6">
            <h1 id="quiz-title" class="text-2xl font-bold text-indigo-700">IB Machine Learning Quiz</h1>
            <div id="question-counter" class="text-sm font-semibold text-gray-600 bg-gray-100 px-3 py-1 rounded-full"></div>
        </div>

        <!-- Question -->
        <div id="question-text" class="text-xl font-semibold text-gray-800 mb-6 min-h-[50px]"></div>

        <!-- Answer Options -->
        <div id="options-container" class="grid grid-cols-1 gap-4">
            <!-- Answer buttons will be dynamically inserted here -->
        </div>

        <!-- Footer -->
        <div class="flex justify-between items-center mt-8 pt-6 border-t">
            <button id="hint-btn" class="bg-blue-500 text-white px-5 py-2 rounded-lg font-medium hover:bg-blue-600 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-2">
                Hint
            </button>
            <button id="next-btn" class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-medium hover:bg-indigo-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2 hidden">
                Next Question
            </button>
        </div>
    </div>

    <!-- Final Score Modal -->
    <div id="score-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md text-center">
            <h2 class="text-3xl font-bold text-indigo-700 mb-4">Quiz Complete!</h2>
            <p class="text-xl text-gray-700 mb-6">Your final score is:</p>
            <div id="final-score" class="text-6xl font-extrabold text-gray-800 mb-8"></div>
            
            <!-- Review Feedback Section -->
            <div class="mb-6">
                <p class="text-lg text-gray-700 mb-2 font-semibold">Areas to Review:</p>
                <div id="review-feedback" class_S="text-left text-sm text-gray-600 bg-gray-50 p-4 rounded-lg max-h-40 overflow-y-auto">
                    <!-- Feedback will be dynamically inserted here -->
                </div>
            </div>

            <button id="restart-btn" class="w-full bg-indigo-600 text-white px-6 py-3 rounded-lg font-medium text-lg hover:bg-indigo-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2">
                Back to Menu
            </button>
        </div>
    </div>

    <!-- Hint Modal -->
    <div id="hint-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-60 flex items-center justify-center p-4">
        <div class="bg-white p-7 rounded-xl shadow-2xl w-full max-w-md">
            <h3 class="text-xl font-semibold text-blue-700 mb-4">Hint</h3>
            <p id="hint-text" class="text-gray-700 mb-6"></p>
            <button onclick="closeModal('hint-modal')" class="w-full bg-gray-200 text-gray-800 px-4 py-2 rounded-lg font-medium hover:bg-gray-300 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-2">
                Close
            </button>
        </div>
    </div>

    <!-- Rationale Modal -->
    <div id="rationale-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-60 flex items-center justify-center p-4">
        <div id="rationale-content" class="bg-white p-7 rounded-xl shadow-2xl w-full max-w-md">
            <h3 id="rationale-title" class="text-2xl font-bold mb-4"></h3>
            <p id="rationale-text" class="text-gray-700 mb-6"></p>
            <button onclick="closeModal('rationale-modal')" class="w-full bg-indigo-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-indigo-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2">
                Continue
            </button>
        </div>
    </div>

        let answerSelected = false;
        let wrongAnswers = []; // NEW: To track concepts for review

        // --- 4. Core Functions ---

        /**
         * Populates the start screen with sections from the quiz data
         */
        function populateStartScreen() {
            sectionList.innerHTML = ''; // Clear existing list
            rawQuizData.sections.forEach((section, index) => {
                const sectionEl = document.createElement('div');
                sectionEl.className = 'border border-gray-200 rounded-lg p-5';
                
                sectionEl.innerHTML = `
                    <div class="flex flex-col sm:flex-row justify-between sm:items-center">
                        <div class="mb-4 sm:mb-0">
                            <h2 class="text-xl font-bold text-indigo-700">${section.title}</h2>
                            <p class="text-sm text-gray-600 mt-1">${section.summary}</p>
                        </div>
                        <button onclick="startQuiz(${index})" class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-medium hover:bg-indigo-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2 ml-0 sm:ml-4 flex-shrink-0">
                            Start (10)
                        </button>
                    </div>
                `;
                sectionList.appendChild(sectionEl);
            });
        }

        /**
         * Starts a quiz for a specific section or all questions
         * @param {number} sectionIndex - The index of the section, or -1 for all
         */
        function startQuiz(sectionIndex) {
            if (sectionIndex === -1) {
                // Combine all questions for the "Quiz All" option
                currentQuizQuestions = [].concat(...rawQuizData.sections.map(s => s.questions));
                quizTitle.textContent = 'IB Machine Learning Quiz (All)';
            } else {
                // Get questions for the specific section
                const section = rawQuizData.sections[sectionIndex];
                currentQuizQuestions = section.questions;
                quizTitle.textContent = section.title;
            }

            // Shuffle the questions for this quiz session
            shuffleArray(currentQuizQuestions);

            // Hide start screen, show quiz container
            startContainer.classList.add('hidden');
            quizContainer.classList.remove('hidden');

            startQuizFlow();
        }

        /**
         * Resets quiz state and loads the first question
         */
        function startQuizFlow() {
            currentQuestionIndex = 0;
            score = 0;
            answerSelected = false;
            wrongAnswers = []; // NEW: Reset wrong answers
            nextBtn.classList.add('hidden');
            loadQuestion();
        }

        /**
         * Loads the current question and its options
         */
        function loadQuestion() {
            if (currentQuestionIndex < currentQuizQuestions.length) {
                answerSelected = false;
                nextBtn.classList.add('hidden');
                hintBtn.disabled = false;
                
                const question = currentQuizQuestions[currentQuestionIndex];
                
                // Update question text and counter
                questionCounter.textContent = `Question ${currentQuestionIndex + 1} / ${currentQuizQuestions.length}`;
                // Bolder styling for the blanks
                questionText.innerHTML = question.question
                    .replace(/\`(.*?)\`/g, '<code class="font-bold text-indigo-600 bg-indigo-50 px-1 py-0.5 rounded">$1</code>')
                    .replace(/\$(.*?)\$/g, '<span class="font-mono text-indigo-600">$1</span>');
                
                // Clear old options
                optionsContainer.innerHTML = '';
                
                // Create new answer buttons
                question.GE.forEach((option, index) => {
                    const button = document.createElement('button');
                    button.innerHTML = option.text
                        .replace(/\`(.*?)\`/g, '<code class="font-bold text-indigo-600 bg-indigo-50 px-1 py-0.5 rounded">$1</code>')
                        .replace(/\$(.*?)\$/g, '<span class="font-mono text-indigo-600">$1</span>');
                    button.className = 'answer-btn w-full p-4 border-2 border-gray-300 rounded-lg text-left text-gray-700 font-medium hover:bg-gray-50 hover:border-indigo-400 focus:outline-none transition-colors duration-150';
                    button.dataset.correct = option.Sr;
                    button.dataset.rationale = option.O8;
                    // Note: We get the concept from the question object in selectAnswer
                    button.onclick = () => selectAnswer(button, question.GE);
                    optionsContainer.appendChild(button);
                });

                // Set hint
                hintBtn.onclick = () => showModal('hint-modal', question.hint);

            } else {
                // Quiz is over
                showFinalScore();
            }
        }

        /**
         * Handles the logic when an answer button is clicked
         */
        function selectAnswer(selectedButton, allOptions) {
            if (answerSelected) return; // Prevent multiple clicks
            answerSelected = true;
            
            const isCorrect = selectedButton.dataset.correct === 'true';
            const rationale = selectedButton.dataset.rationale;
            const question = currentQuizQuestions[currentQuestionIndex]; // Get current question
            
            // Disable all buttons
            optionsContainer.querySelectorAll('.answer-btn').forEach(btn => {
                btn.disabled = true;
                // Show the correct answer
                if (btn.dataset.correct === 'true') {
                    btn.classList.add('correct');
                }
            });

            if (isCorrect) {
                score++;
                selectedButton.classList.add('correct');
                // Show rationale immediately for correct answers
                showModal('rationale-modal', rationale, 'Correct!');
            } else {
                selectedButton.classList.add('incorrect');
                // NEW: Add concept to wrongAnswers array
                if (question.concept) {
                    wrongAnswers.push(question.concept);
                }
                // Show rationale for incorrect answers
                showModal('rationale-modal', rationale, 'Not Quite...');
            }

            // Show next button
            nextBtn.classList.remove('hidden');
            nextBtn.onclick = () => {
                currentQuestionIndex++;
                loadQuestion();
            };
        }

        /**
         * Displays the final score modal
         */
        function showFinalScore() {
            quizContainer.classList.add('hidden');
            scoreModal.classList.remove('hidden');
            finalScore.textContent = `${score} / ${currentQuizQuestions.length}`;
            finalScore.className = `text-6xl font-extrabold mb-8 ${getScoreColor(score, currentQuizQuestions.length)}`;
            
            // NEW: Generate and display review feedback
            if (wrongAnswers.length === 0) {
                reviewFeedbackEl.innerHTML = '<p class="text-green-600 font-medium">Great job! No specific areas to review.</p>';
            } else {
                const reviewCounts = {};
                wrongAnswers.forEach(concept => {
                    reviewCounts[concept] = (reviewCounts[concept] || 0) + 1;
                });
                
                // Sort concepts by most-missed
                const sortedReview = Object.entries(reviewCounts).sort((a, b) => b[1] - a[1]);
                
                let feedbackHtml = '<ul class="list-disc list-inside">';
                sortedReview.forEach(([concept, count]) => {
                    feedbackHtml += `<li class="mb-1"><strong>${concept}</strong> (missed ${count} ${count > 1 ? 'questions' : 'question'})</li>`;
                });
                feedbackHtml += '</ul>';
                reviewFeedbackEl.innerHTML = feedbackHtml;
            }
        }

        /**
         * Resets the quiz and returns to the start menu
         */
        function restartQuiz() {
            scoreModal.classList.add('hidden');
            startContainer.classList.remove('hidden');
        }

        // --- 5. Helper Functions ---

        /**
         * Shows a specified modal with text
         */
        function showModal(modalId, text, title = null) {
            const modal = document.getElementById(modalId);
            if (!modal) return;

            if (modalId === 'hint-modal') {
                hintText.textContent = text;
            } else if (modalId === 'rationale-modal') {
                rationaleTitle.textContent = title || 'Rationale';
                rationaleText.textContent = text;
            }
            
            modal.classList.remove('hidden');
        }

        /**
         * Closes any modal by its ID
         */
        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.add('hidden');
            }
            // If we closed the rationale modal, and the quiz isn't over, go to next question
            if (modalId === 'rationale-modal' && currentQuestionIndex < currentQuizQuestions.length) {
                nextBtn.click();
            }
        }

        /**
         * Returns a Tailwind color class based on the score percentage
         */
        function getScoreColor(score, total) {
            const percentage = (score / total) * 100;
            if (percentage >= 80) return 'text-green-600';
            if (percentage >= 50) return 'text-yellow-600';
            return 'text-red-600';
        }

        /**
         * Shuffles an array in place (Fisher-Yates shuffle)
         */
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // --- 6. Event Listeners ---
        window.onload = populateStartScreen;
        restartBtn.onclick = restartQuiz;

        // Close modals with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal('hint-modal');
                closeModal('rationale-modal');
            }
        });

    </script>
</body>
</html>
