<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Network Regression Simulation</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        /* Custom scrollbar for math worksheet */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- ICONS (Implemented as Simple Components) ---
        const IconBase = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const Play = ({ className }) => <IconBase className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></IconBase>;
        const Pause = ({ className }) => <IconBase className={className}><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></IconBase>;
        const RefreshCw = ({ className }) => <IconBase className={className}><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></IconBase>;
        const Activity = ({ className }) => <IconBase className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></IconBase>;
        const Brain = ({ className }) => <IconBase className={className}><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"></path><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"></path></IconBase>;
        const Settings = ({ className }) => <IconBase className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></IconBase>;
        const Target = ({ className }) => <IconBase className={className}><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></IconBase>;
        const Microscope = ({ className }) => <IconBase className={className}><path d="M6 18h8"></path><path d="M3 22h18"></path><path d="M14 22a7 7 0 1 0 0-14h-1"></path><path d="M9 14h2"></path><path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"></path><path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"></path></IconBase>;
        const Calculator = ({ className }) => <IconBase className={className}><rect x="4" y="2" width="16" height="20" rx="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></IconBase>;
        const Layers = ({ className }) => <IconBase className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></IconBase>;
        const LayoutGrid = ({ className }) => <IconBase className={className}><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></IconBase>;
        const MapPin = ({ className }) => <IconBase className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></IconBase>;
        const BedDouble = ({ className }) => <IconBase className={className}><path d="M2 20v-8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v8"></path><path d="M4 10V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v4"></path><path d="M12 4v6"></path><path d="M2 18h20"></path></IconBase>;
        const ChevronRight = ({ className }) => <IconBase className={className}><polyline points="9 18 15 12 9 6"></polyline></IconBase>;
        const Sigma = ({ className }) => <IconBase className={className}><path d="M18 7V4H6l6 8-6 8h12v-3"></path></IconBase>;
        const HelpCircle = ({ className }) => <IconBase className={className}><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></IconBase>;
        const BookOpen = ({ className }) => <IconBase className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></IconBase>;
        const ArrowRight = ({ className }) => <IconBase className={className}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></IconBase>;
        const TrendingUp = ({ className }) => <IconBase className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></IconBase>;
        const GitBranch = ({ className }) => <IconBase className={className}><line x1="6" y1="3" x2="6" y2="15"></line><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M18 9a9 9 0 0 1-9 9"></path></IconBase>;

        // --- MATH HELPERS ---
        const tanh = (x) => Math.tanh(x);
        const dTanh = (y) => 1 - y * y;
        const randomWeight = () => (Math.random() * 2 - 1) * 0.5;

        // Real-world mapping helpers
        const mapSize = (val) => Math.round(((val + 1) / 2) * 2000 + 500); // 500-2500 sqft
        const mapRooms = (val) => Math.round(((val + 1) / 2) * 4 + 1); // 1-5 rooms
        const mapPrice = (val) => Math.round(((val + 1) / 2) * 800 + 100); // $100k-$900k

        const NEURON_COLORS = [
            '#0ea5e9', '#f59e0b', '#84cc16', '#a855f7', '#ef4444', '#14b8a6'
        ];

        /**
         * FLEXIBLE NEURAL NETWORK ENGINE
         */
        class NeuralNetworkEngine {
            constructor(layerSizes) {
                this.layerSizes = layerSizes; 
                this.weights = [];
                this.biases = [];

                for (let i = 0; i < layerSizes.length - 1; i++) {
                    const inSize = layerSizes[i];
                    const outSize = layerSizes[i + 1];
                    
                    this.weights.push(Array(outSize).fill(0).map(() => 
                        Array(inSize).fill(0).map(() => randomWeight())
                    ));
                    this.biases.push(Array(outSize).fill(0).map(() => randomWeight()));
                }
            }

            predict(inputs, returnActivations = false) {
                let currentActivations = inputs; 
                const allActivations = [currentActivations]; 

                for (let i = 0; i < this.weights.length; i++) {
                    const w = this.weights[i];
                    const b = this.biases[i];
                    
                    const nextActivations = w.map((weightsRow, neuronIdx) => {
                        let sum = b[neuronIdx];
                        for (let k = 0; k < weightsRow.length; k++) {
                            sum += weightsRow[k] * currentActivations[k];
                        }
                        const isOutputLayer = i === this.weights.length - 1;
                        return isOutputLayer ? sum : tanh(sum); 
                    });

                    currentActivations = nextActivations;
                    allActivations.push(currentActivations);
                }

                if (returnActivations) return { output: currentActivations[0], allActivations };
                return currentActivations[0];
            }

            train(inputs, target, learningRate) {
                const { output, allActivations } = this.predict(inputs, true);
                const error = output - target;
                
                let deltas = [];
                const outputLayerIdx = this.layerSizes.length - 1;
                deltas[outputLayerIdx] = [error];

                for (let i = outputLayerIdx - 1; i > 0; i--) {
                    const currentLayerSize = this.layerSizes[i];
                    const nextLayerSize = this.layerSizes[i+1];
                    const nextLayerDeltas = deltas[i+1];
                    const currentLayerActivations = allActivations[i];
                    
                    const currentDeltas = [];
                    for (let j = 0; j < currentLayerSize; j++) {
                        let errorSum = 0;
                        for (let k = 0; k < nextLayerSize; k++) {
                            errorSum += nextLayerDeltas[k] * this.weights[i][k][j];
                        }
                        currentDeltas[j] = errorSum * dTanh(currentLayerActivations[j]);
                    }
                    deltas[i] = currentDeltas;
                }

                for (let i = 0; i < this.weights.length; i++) {
                    const inActivations = allActivations[i];
                    const layerDeltas = deltas[i+1];
                    
                    for (let r = 0; r < this.weights[i].length; r++) { 
                        const delta = layerDeltas[r];
                        this.biases[i][r] -= learningRate * delta;
                        for (let c = 0; c < this.weights[i][r].length; c++) { 
                            const inputVal = inActivations[c];
                            this.weights[i][r][c] -= learningRate * delta * inputVal;
                        }
                    }
                }

                return { prediction: output, target, error, inputs, lossSq: error * error, activations: allActivations };
            }
        }

        // --- COMPONENTS ---

        const HiddenNeuronMath = ({ step, nn, nIndex }) => {
            if (!nn || !step || !nn.weights[0] || !nn.weights[0][nIndex] || !nn.biases[0] || nn.biases[0][nIndex] === undefined) {
                return null;
            }

            const weights = nn.weights[0][nIndex];
            const bias = nn.biases[0][nIndex];
            const inputs = step.activations[0]; 

            let z = bias;
            const calcParts = [];
            weights.forEach((w, i) => {
                const inputVal = inputs[i] || 0;
                const val = w * inputVal;
                z += val;
                calcParts.push({ in: inputVal, w: w, val: val });
            });
            
            const a = tanh(z);

            // Tanh Viz
            const vizWidth = 150;
            const vizHeight = 50;
            const padding = 5;
            
            let pathD = `M 0 ${vizHeight/2} `;
            for (let px = 0; px <= vizWidth; px+=2) {
                const gx = ((px / vizWidth) * 6) - 3;
                const gy = Math.tanh(gx); 
                const py = (vizHeight/2) - (gy * (vizHeight/2 - padding));
                if (px === 0) pathD = `M ${px} ${py} `;
                else pathD += `L ${px} ${py} `;
            }

            const clampedZ = Math.max(-3, Math.min(3, z));
            const dotX = ((clampedZ + 3) / 6) * vizWidth;
            const dotY = (vizHeight/2) - (a * (vizHeight/2 - padding));

            return (
                <div className="bg-gray-50 rounded p-2 mb-2 border border-gray-200 font-mono text-xs">
                    <div className="flex justify-between items-center mb-1 border-b pb-1">
                        <span className="font-bold text-gray-700">Hidden Neuron {nIndex+1}</span>
                        <span className="text-gray-400">z = bias + ∑(x•w)</span>
                    </div>
                    <div className="flex justify-between text-gray-500 items-center">
                        <div className="flex items-center gap-1"><span>Bias</span></div>
                        <span>{bias.toFixed(3)}</span>
                    </div>
                    {calcParts.map((part, i) => (
                        <div key={i} className="flex justify-between">
                            <span className="text-gray-500">In{i+1}({part.in.toFixed(2)}) × W({part.w.toFixed(2)})</span>
                            <span>{part.val >= 0 ? '+' : ''}{part.val.toFixed(2)}</span>
                        </div>
                    ))}
                    <div className="flex justify-between border-t border-gray-300 mt-1 pt-1 font-bold text-gray-800">
                        <span>Sum (z)</span>
                        <span>{z.toFixed(3)}</span>
                    </div>

                    <div className="my-2 border border-indigo-100 bg-white rounded relative h-[50px] overflow-hidden">
                        <svg width="100%" height="100%" viewBox={`0 0 ${vizWidth} ${vizHeight}`} preserveAspectRatio="none">
                            <line x1={0} y1={vizHeight/2} x2={vizWidth} y2={vizHeight/2} stroke="#e5e7eb" strokeWidth="1" />
                            <line x1={vizWidth/2} y1={0} x2={vizWidth/2} y2={vizHeight} stroke="#e5e7eb" strokeWidth="1" />
                            <path d={pathD} fill="none" stroke="#6366f1" strokeWidth="2" />
                            <circle cx={dotX} cy={dotY} r="4" fill="#ec4899" />
                            <line x1={dotX} y1={vizHeight/2} x2={dotX} y2={dotY} stroke="#ec4899" strokeWidth="1" strokeDasharray="2,2" />
                            <line x1={vizWidth/2} y1={dotY} x2={dotX} y2={dotY} stroke="#ec4899" strokeWidth="1" strokeDasharray="2,2" />
                        </svg>
                        <div className="absolute top-0 right-1 text-[8px] text-gray-400">1.0</div>
                        <div className="absolute bottom-0 right-1 text-[8px] text-gray-400">-1.0</div>
                    </div>

                    <div className="flex justify-between text-indigo-600 font-bold">
                        <span>Activation: tanh(z)</span>
                        <span>{a.toFixed(3)}</span>
                    </div>
                </div>
            );
        };

        const OutputNeuronMath = ({ step, nn }) => {
            if (!nn || !step || !nn.weights[1] || !nn.biases[1]) return null;

            const weights = nn.weights[1][0]; 
            const bias = nn.biases[1][0];
            const hiddenActs = step.activations[1];

            if (!weights || bias === undefined) return null;

            let sum = bias;
            const calcParts = [];
            weights.forEach((w, i) => {
                const hVal = hiddenActs[i] || 0;
                const val = w * hVal;
                sum += val;
                calcParts.push({ h: hVal, w: w, val: val });
            });

            return (
                <div className="bg-gray-50 rounded p-2 border border-gray-200 font-mono text-xs">
                    <div className="flex justify-between items-center mb-1 border-b pb-1">
                        <span className="font-bold text-gray-700">Output Neuron</span>
                        <span className="text-gray-400">Price = ∑(h•w)</span>
                    </div>
                    <div className="flex justify-between text-gray-500">
                        <span>Bias</span>
                        <span>{bias.toFixed(3)}</span>
                    </div>
                    {calcParts.map((part, i) => (
                        <div key={i} className="flex justify-between">
                            <span className="text-gray-500">H{i+1}({part.h.toFixed(2)}) × W({part.w.toFixed(2)})</span>
                            <span>{part.val >= 0 ? '+' : ''}{part.val.toFixed(2)}</span>
                        </div>
                    ))}
                    <div className="flex justify-between border-t border-gray-300 mt-1 pt-1 font-bold text-red-600">
                        <span>Final Prediction</span>
                        <span>{sum.toFixed(3)}</span>
                    </div>
                </div>
            );
        };

        const GuideView = () => (
            <div className="bg-white p-8 rounded-xl shadow-sm border border-gray-200 max-w-4xl mx-auto space-y-10 animate-in fade-in slide-in-from-bottom-4">
                <div className="text-center">
                    <h2 className="text-3xl font-bold text-gray-900 mb-4">How this Artificial Neural Network Works</h2>
                    <p className="text-lg text-gray-600 max-w-2xl mx-auto">
                        This simulation uses a "Feed Forward Neural Network" to solve a regression problem (predicting a number, like Price). 
                    </p>
                </div>

                {/* 1. Structure */}
                <div className="grid md:grid-cols-2 gap-8 items-start">
                    <div className="space-y-4">
                        <h3 className="text-xl font-bold text-indigo-700 flex items-center gap-2">
                            <Layers className="w-5 h-5"/> 1. The Structure
                        </h3>
                        <p className="text-gray-600">The brain is arranged in layers, like an assembly line:</p>
                        <ul className="space-y-3">
                            <li className="flex gap-3">
                                <div className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-sm shrink-0">1</div>
                                <div><span className="font-bold text-gray-800">Input Layer:</span><p className="text-sm text-gray-500">Receives raw data (Size, Rooms).</p></div>
                            </li>
                            <li className="flex gap-3">
                                <div className="w-8 h-8 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center font-bold text-sm shrink-0">2</div>
                                <div><span className="font-bold text-gray-800">Hidden Layer:</span><p className="text-sm text-gray-500">The "Feature Detectors". They use non-linear math (Tanh) to bend lines into curves.</p></div>
                            </li>
                            <li className="flex gap-3">
                                <div className="w-8 h-8 rounded-full bg-red-100 text-red-600 flex items-center justify-center font-bold text-sm shrink-0">3</div>
                                <div><span className="font-bold text-gray-800">Output Layer:</span><p className="text-sm text-gray-500">Combines opinions into one final number: Price.</p></div>
                            </li>
                        </ul>
                    </div>
                    <div className="bg-gray-50 p-6 rounded-lg border border-gray-100 flex items-center justify-center">
                        <div className="flex items-center gap-4 text-sm font-mono">
                            <div className="w-10 h-10 rounded-full border-2 border-blue-500 bg-white flex items-center justify-center">In</div>
                            <ArrowRight className="w-4 h-4 text-gray-300"/>
                            <div className="flex flex-col gap-2">
                                <div className="w-10 h-10 rounded-full border-2 border-gray-500 bg-white flex items-center justify-center">H1</div>
                                <div className="w-10 h-10 rounded-full border-2 border-gray-500 bg-white flex items-center justify-center">H2</div>
                            </div>
                            <ArrowRight className="w-4 h-4 text-gray-300"/>
                            <div className="w-10 h-10 rounded-full border-2 border-red-500 bg-white flex items-center justify-center">Out</div>
                        </div>
                    </div>
                </div>

                <hr className="border-gray-200"/>

                {/* 2. Neuron Math */}
                <div className="grid md:grid-cols-2 gap-8 items-start">
                    <div className="order-2 md:order-1 bg-indigo-50 p-6 rounded-lg border border-indigo-100">
                        <div className="font-mono text-sm space-y-2 text-indigo-900">
                            <div className="font-bold">Formula for one neuron:</div>
                            <div className="text-lg bg-white p-3 rounded border border-indigo-200">
                                output = Tanh( (Input × Weight) + Bias )
                            </div>
                            <ul className="text-xs space-y-1 mt-2 text-indigo-700">
                                <li>• <strong>Weight:</strong> Connection strength.</li>
                                <li>• <strong>Bias:</strong> Offset (shifts curve up/down).</li>
                                <li>• <strong>Tanh:</strong> Activation (adds curve).</li>
                            </ul>
                        </div>
                        <div className="mt-4 bg-white p-2 rounded border border-indigo-100 h-24 relative flex items-center justify-center">
                            <div className="absolute inset-0 flex items-center justify-center opacity-10">
                                <TrendingUp className="w-16 h-16"/>
                            </div>
                            <div className="text-xs text-center text-indigo-800">
                                <strong>Why Tanh?</strong><br/>
                                It forces values between -1 and 1.<br/>
                                It turns linear math into curves!
                            </div>
                        </div>
                    </div>
                    <div className="order-1 md:order-2 space-y-4">
                        <h3 className="text-xl font-bold text-indigo-700 flex items-center gap-2">
                            <Calculator className="w-5 h-5"/> 2. The Math (Inside a Neuron)
                        </h3>
                        <p className="text-gray-600">
                            Think of a neuron like a decision maker. It takes inputs, weighs them, adds a bias, and decides how "active" to be.
                        </p>
                        <div className="space-y-3">
                            <div className="flex gap-2 items-start"><span className="font-bold text-gray-800 text-sm w-16 shrink-0">Weight:</span><p className="text-sm text-gray-600">"How much does Size matter?" (High weight = Matters a lot).</p></div>
                            <div className="flex gap-2 items-start"><span className="font-bold text-gray-800 text-sm w-16 shrink-0">Bias:</span><p className="text-sm text-gray-600">"What's the base price?" (Shift starting point).</p></div>
                            <div className="flex gap-2 items-start bg-yellow-50 p-2 rounded border border-yellow-100"><span className="font-bold text-gray-800 text-sm w-16 shrink-0">Tanh:</span><p className="text-sm text-gray-600">The <strong>Activation Function</strong>. Tanh creates the curves necessary to fit messy data.</p></div>
                        </div>
                    </div>
                </div>

                <hr className="border-gray-200"/>

                {/* 3. Learning */}
                <div className="space-y-4">
                    <h3 className="text-xl font-bold text-indigo-700 flex items-center gap-2">
                        <RefreshCw className="w-5 h-5"/> 3. How it Learns (Backpropagation)
                    </h3>
                    <p className="text-gray-600">Initially, weights are random. Learning is fixing these weights.</p>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
                        <div className="bg-red-50 p-4 rounded border border-red-100"><div className="font-bold text-red-800 mb-1">1. Forward Pass</div><p className="text-xs text-red-600">The AI takes input and guesses.</p></div>
                        <div className="bg-amber-50 p-4 rounded border border-amber-100"><div className="font-bold text-amber-800 mb-1">2. Measure Error</div><p className="text-xs text-amber-700">Error = (Guess - Reality)²</p></div>
                        <div className="bg-emerald-50 p-4 rounded border border-emerald-100"><div className="font-bold text-emerald-800 mb-1">3. Backward Pass</div><p className="text-xs text-emerald-700">Using Calculus, it nudges weights to reduce error.</p></div>
                    </div>
                </div>

                <hr className="border-gray-200"/>

                {/* 4. Neurons */}
                <div className="space-y-4">
                    <h3 className="text-xl font-bold text-indigo-700 flex items-center gap-2">
                        <Brain className="w-5 h-5"/> 4. Why add more Neurons?
                    </h3>
                    <div className="grid md:grid-cols-2 gap-6">
                        <div>
                            <h4 className="font-bold text-gray-800 mb-2">Few Neurons (Simple)</h4>
                            <p className="text-sm text-gray-600 mb-2">Can only draw simple shapes (lines/curves).</p>
                            <p className="text-xs text-gray-500 mt-1">Good for: Simple trends.</p>
                        </div>
                        <div>
                            <h4 className="font-bold text-gray-800 mb-2">Many Neurons (Complex)</h4>
                            <p className="text-sm text-gray-600 mb-2">Combines many curves. Can wiggle to fit specific details.</p>
                            <p className="text-xs text-gray-500 mt-1">Good for: Complex patterns.</p>
                        </div>
                    </div>
                </div>
            </div>
        );

        function NeuralNetworkDemo() {
            const [activeTab, setActiveTab] = useState('simple'); 
            const [isPlaying, setIsPlaying] = useState(false);
            const [epoch, setEpoch] = useState(0);
            const [loss, setLoss] = useState(0);
            const [learningRate, setLearningRate] = useState(0.01);
            const [hiddenNeurons, setHiddenNeurons] = useState(2); 
            const [trainingSpeed, setTrainingSpeed] = useState(5);
            
            const [stepInfo, setStepInfo] = useState(null);
            const [hoveredNode, setHoveredNode] = useState(null);

            const plotCanvasRef = useRef(null);
            const netCanvasRef = useRef(null);
            const nnRef = useRef(null);
            const dataRef = useRef([]);
            const requestRef = useRef();

            const generateData = useCallback(() => {
                const data = [];
                const numPoints = 60;
                setEpoch(0);
                setLoss(0);

                if (activeTab === 'simple') {
                    const gen = (x) => x * 0.8 + 0.1;
                    for (let i = 0; i < numPoints; i++) {
                        const x = (i / numPoints) * 2 - 1; 
                        let y = gen(x) + (Math.random() - 0.5) * 0.15;
                        data.push({ inputs: [x], y });
                    }
                } else {
                    for (let i = 0; i < numPoints; i++) {
                        const size = (Math.random() * 2) - 1;
                        const roomsRaw = Math.floor(Math.random() * 5); 
                        const rooms = (roomsRaw / 4) * 2 - 1;
                        const loc = (Math.random() * 2) - 1;

                        let y = (size * 0.5) + (rooms * 0.3) + (loc * 0.2);
                        if (size > 0.5 && loc > 0.5) y += 0.2; 
                        y += (Math.random() - 0.5) * 0.1;
                        data.push({ inputs: [size, rooms, loc], y });
                    }
                }
                dataRef.current = data;
            }, [activeTab]);

            const resetNetwork = useCallback(() => {
                if (activeTab === 'guide') return; 
                const inputCount = activeTab === 'simple' ? 1 : 3;
                nnRef.current = new NeuralNetworkEngine([inputCount, hiddenNeurons, 1]);
                setStepInfo(null);
                generateData();
            }, [hiddenNeurons, activeTab, generateData]);

            useEffect(() => {
                resetNetwork();
            }, [resetNetwork]);

            const drawPlot = (highlightStep = stepInfo) => {
                const canvas = plotCanvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const { width, height } = canvas;
                const padding = 40;
                const graphW = width - padding * 2;
                const graphH = height - padding * 2;

                const mapX = (x) => padding + ((x + 1) / 2 * graphW);
                const mapY = (y) => (height - padding) - ((y + 1) / 2 * graphH);

                ctx.clearRect(0, 0, width, height);

                ctx.strokeStyle = '#f3f4f6';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(padding, height/2); ctx.lineTo(width-padding, height/2);
                ctx.moveTo(width/2, padding); ctx.lineTo(width/2, height-padding);
                ctx.stroke();

                ctx.strokeStyle = '#9ca3af';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(padding, padding); ctx.lineTo(padding, height - padding);
                ctx.moveTo(padding, height - padding); ctx.lineTo(width - padding, height - padding);
                ctx.stroke();
                
                ctx.fillStyle = '#6b7280';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText("House Size", width/2, height - 10);
                ctx.save();
                ctx.translate(15, height/2);
                ctx.rotate(-Math.PI/2);
                ctx.fillText("Price", 0, 0);
                ctx.restore();

                dataRef.current.forEach(p => {
                    const x = mapX(p.inputs[0]); 
                    const yActual = mapY(p.y);
                    ctx.beginPath();
                    ctx.arc(x, yActual, 3, 0, Math.PI * 2);
                    ctx.fillStyle = '#94a3b8';
                    ctx.fill();
                    
                    if (activeTab === 'advanced' && isPlaying && nnRef.current) {
                        const pred = nnRef.current.predict(p.inputs);
                        const yPred = mapY(pred);
                        ctx.fillStyle = '#fca5a5'; 
                        ctx.fillRect(x-1, yPred-1, 2, 2);
                    }
                });

                if (activeTab === 'simple' && nnRef.current) {
                    ctx.strokeStyle = '#dc2626';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    for (let i = 0; i <= graphW; i += 5) {
                        const xVal = (i / graphW) * 2 - 1;
                        const yVal = nnRef.current.predict([xVal]);
                        const cx = padding + i;
                        const cy = mapY(yVal);
                        if (i === 0) ctx.moveTo(cx, cy);
                        else ctx.lineTo(cx, cy);
                    }
                    ctx.stroke();
                }

                if (highlightStep) {
                    const hx = mapX(highlightStep.inputs[0]);
                    const hy = mapY(highlightStep.target);
                    const py = mapY(highlightStep.prediction);
                    
                    ctx.beginPath();
                    ctx.moveTo(hx, hy); ctx.lineTo(hx, py);
                    ctx.strokeStyle = '#ef4444';
                    ctx.setLineDash([4, 4]);
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.setLineDash([]);

                    ctx.beginPath(); ctx.arc(hx, hy, 6, 0, Math.PI * 2); ctx.fillStyle = '#10b981'; ctx.fill();
                    ctx.beginPath(); ctx.arc(hx, py, 6, 0, Math.PI * 2); ctx.fillStyle = '#ef4444'; ctx.fill();
                }
            };

            const drawNetwork = () => {
                const canvas = netCanvasRef.current;
                if (!canvas || !nnRef.current) return;
                const ctx = canvas.getContext('2d');
                const { width, height } = canvas;
                const nn = nnRef.current;

                ctx.clearRect(0, 0, width, height);

                const layerCount = nn.layerSizes.length;
                const layerSpacing = width / layerCount;
                const startX = layerSpacing / 2;
                const nodeRadius = activeTab === 'simple' ? 28 : 22;

                const getNodePos = (l, n) => {
                    const lx = startX + l * layerSpacing;
                    const nodeCount = nn.layerSizes[l];
                    const hSpacing = height / (nodeCount + 1);
                    const ly = hSpacing * (n + 1);
                    return { x: lx, y: ly };
                };

                // Connections
                for (let l = 0; l < nn.weights.length; l++) {
                    const weightsMatrix = nn.weights[l];
                    for (let nextN = 0; nextN < weightsMatrix.length; nextN++) {
                        const nextPos = getNodePos(l + 1, nextN);
                        for (let currN = 0; currN < weightsMatrix[nextN].length; currN++) {
                            const currPos = getNodePos(l, currN);
                            const w = weightsMatrix[nextN][currN];
                            
                            let isRelevant = true;
                            if (hoveredNode) {
                                if (hoveredNode.layer === l + 1 && hoveredNode.index === nextN) isRelevant = true;
                                else if (hoveredNode.layer === l && hoveredNode.index === currN) isRelevant = true;
                                else isRelevant = false;
                            }

                            ctx.beginPath();
                            ctx.moveTo(currPos.x, currPos.y);
                            ctx.lineTo(nextPos.x, nextPos.y);
                            const alpha = isRelevant ? (Math.min(Math.abs(w) + 0.2, 1)) : 0.05;
                            const thickness = isRelevant ? Math.min(Math.abs(w) * 3 + 1, 6) : 1;
                            ctx.strokeStyle = w > 0 ? `rgba(79, 70, 229, ${alpha})` : `rgba(239, 68, 68, ${alpha})`;
                            ctx.lineWidth = thickness;
                            ctx.stroke();
                        }
                    }
                }

                // Nodes
                const inputLabels = activeTab === 'simple' ? ["Size"] : ["Size", "Rooms", "Loc"];
                const inputIcons = activeTab === 'simple' ? ["🏠"] : ["📏", "🛏️", "📍"];

                for (let l = 0; l < layerCount; l++) {
                    for (let n = 0; n < nn.layerSizes[l]; n++) {
                        const pos = getNodePos(l, n);
                        const isHovered = hoveredNode && hoveredNode.layer === l && hoveredNode.index === n;
                        
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, isHovered ? nodeRadius + 3 : nodeRadius, 0, Math.PI * 2);
                        
                        if (l === 0) ctx.fillStyle = '#e0e7ff';
                        else if (l === layerCount - 1) ctx.fillStyle = '#fce7f3';
                        else ctx.fillStyle = 'white';

                        ctx.fill();
                        
                        if (l === 0) ctx.strokeStyle = '#4338ca';
                        else if (l === layerCount - 1) ctx.strokeStyle = '#be185d';
                        else ctx.strokeStyle = NEURON_COLORS[n % NEURON_COLORS.length];
                        
                        ctx.lineWidth = isHovered ? 4 : 2;
                        ctx.stroke();

                        ctx.fillStyle = '#374151';
                        ctx.font = 'bold 12px sans-serif';
                        ctx.textAlign = 'center';
                        
                        if (l === 0) {
                            ctx.font = '14px sans-serif';
                            ctx.fillText(inputIcons[n], pos.x, pos.y + 5);
                            ctx.font = 'bold 12px sans-serif';
                            ctx.fillStyle = '#4338ca';
                            ctx.fillText(inputLabels[n], pos.x, pos.y + nodeRadius + 15);
                        } else if (l === layerCount - 1) {
                            ctx.fillText('Price', pos.x, pos.y + 4);
                        } else {
                            ctx.fillText(n + 1, pos.x, pos.y + 4);
                        }
                    }
                }
            };

            const handleNetMouseMove = (e) => {
                const canvas = netCanvasRef.current;
                if (!canvas) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const { width, height } = canvas;
                const nn = nnRef.current;
                
                const layerCount = nn.layerSizes.length;
                const layerSpacing = width / layerCount;
                const startX = layerSpacing / 2;

                let found = null;
                for (let l = 0; l < layerCount; l++) {
                    const lx = startX + l * layerSpacing;
                    const nodeCount = nn.layerSizes[l];
                    const hSpacing = height / (nodeCount + 1);
                    for (let n = 0; n < nodeCount; n++) {
                        const ly = hSpacing * (n + 1);
                        if (Math.sqrt((x - lx)**2 + (y - ly)**2) < 25) found = { layer: l, index: n };
                    }
                }
                setHoveredNode(found);
            };

            const performSingleStep = () => {
                setIsPlaying(false);
                if (dataRef.current.length === 0) return;
                const point = dataRef.current[Math.floor(Math.random() * dataRef.current.length)];
                const result = nnRef.current.train(point.inputs, point.y, learningRate);
                setStepInfo(result);
                setEpoch(e => e + 1);
                setLoss(result.lossSq);
                drawPlot(result);
                drawNetwork();
            };

            const animate = useCallback(() => {
                if (activeTab === 'guide') return; 
                if (isPlaying && nnRef.current) {
                    let totalLoss = 0;
                    const data = [...dataRef.current].sort(() => Math.random() - 0.5);
                    for (let k = 0; k < trainingSpeed; k++) {
                        for (let i = 0; i < data.length; i++) {
                            const res = nnRef.current.train(data[i].inputs, data[i].y, learningRate);
                            totalLoss += res.lossSq;
                        }
                    }
                    setLoss(totalLoss / (data.length * trainingSpeed));
                    setEpoch(e => e + trainingSpeed);
                    setStepInfo(null);
                    drawPlot(null);
                } else {
                    drawPlot(stepInfo); 
                }
                drawNetwork();
                requestRef.current = requestAnimationFrame(animate);
            }, [isPlaying, learningRate, trainingSpeed, stepInfo, hoveredNode, activeTab]); 

            useEffect(() => {
                requestRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(requestRef.current);
            }, [animate]);

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 font-sans p-4 md:p-8 flex flex-col items-center">
                    <div className="max-w-6xl w-full space-y-6">
                        
                        {/* TAB SWITCHER */}
                        <div className="flex justify-center mb-4">
                            <div className="bg-gray-200 p-1 rounded-xl flex gap-1 shadow-inner overflow-x-auto max-w-full">
                                <button
                                    onClick={() => { setActiveTab('simple'); setStepInfo(null); }}
                                    className={`px-4 md:px-6 py-2 rounded-lg font-bold text-sm transition-all flex items-center gap-2 whitespace-nowrap ${activeTab === 'simple' ? 'bg-white shadow text-indigo-600' : 'text-gray-500 hover:bg-gray-300'}`}
                                >
                                    <Brain className="w-4 h-4" /> Simple (1 Input)
                                </button>
                                <button
                                    onClick={() => { setActiveTab('advanced'); setStepInfo(null); }}
                                    className={`px-4 md:px-6 py-2 rounded-lg font-bold text-sm transition-all flex items-center gap-2 whitespace-nowrap ${activeTab === 'advanced' ? 'bg-white shadow text-indigo-600' : 'text-gray-500 hover:bg-gray-300'}`}
                                >
                                    <LayoutGrid className="w-4 h-4" /> Advanced (3 Inputs)
                                </button>
                                <button
                                    onClick={() => { setActiveTab('guide'); setStepInfo(null); }}
                                    className={`px-4 md:px-6 py-2 rounded-lg font-bold text-sm transition-all flex items-center gap-2 whitespace-nowrap ${activeTab === 'guide' ? 'bg-white shadow text-indigo-600' : 'text-gray-500 hover:bg-gray-300'}`}
                                >
                                    <BookOpen className="w-4 h-4" /> How it Works
                                </button>
                            </div>
                        </div>

                        {activeTab === 'guide' ? (
                            <GuideView />
                        ) : (
                            <>
                                <div className="text-center space-y-2">
                                    <h1 className="text-3xl font-bold text-gray-900 flex items-center justify-center gap-2">
                                        {activeTab === 'simple' ? 'Simple House Price Predictor' : 'Multivariate Regression AI'}
                                    </h1>
                                    <p className="text-gray-500 max-w-2xl mx-auto">
                                        {activeTab === 'simple' 
                                            ? "The AI learns to draw a line: Bigger House = Higher Price."
                                            : "The AI juggles 3 factors: Size, Rooms, and Location."
                                        }
                                    </p>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                                
                                <div className="lg:col-span-4 space-y-4">
                                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                    <h3 className="font-bold text-gray-700 mb-4 flex items-center gap-2">
                                        <Settings className="w-4 h-4"/> Controls
                                    </h3>
                                    
                                    <div className="space-y-6">
                                        <div>
                                            <div className="flex justify-between text-xs mb-1">
                                                <label className="font-bold text-gray-500 uppercase">Hidden Neurons</label>
                                                <span className="font-mono text-indigo-600">{hiddenNeurons}</span>
                                            </div>
                                            <input 
                                                type="range" min="1" max="5" step="1"
                                                value={hiddenNeurons}
                                                onChange={(e) => {
                                                    setHiddenNeurons(parseInt(e.target.value));
                                                    setStepInfo(null); 
                                                }}
                                                onMouseUp={resetNetwork} 
                                                onTouchEnd={resetNetwork}
                                                className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                                            />
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-2">
                                            <button
                                                onClick={() => { setIsPlaying(!isPlaying); setStepInfo(null); }}
                                                className={`py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-all shadow-sm ${
                                                isPlaying 
                                                ? 'bg-amber-100 text-amber-700 hover:bg-amber-200 border border-amber-300' 
                                                : 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200 border border-emerald-300'
                                                }`}
                                            >
                                                {isPlaying ? <><Pause className="w-4 h-4"/> Pause</> : <><Play className="w-4 h-4"/> Auto Run</>}
                                            </button>
                                            <button
                                                onClick={performSingleStep}
                                                className="py-3 bg-indigo-600 text-white rounded-lg font-bold flex items-center justify-center gap-2 shadow-md hover:bg-indigo-700 active:scale-95 transition-all"
                                            >
                                                <Target className="w-4 h-4" /> Train 1 Step
                                            </button>
                                        </div>
                                        
                                        <button onClick={resetNetwork} className="w-full py-2 bg-white border border-gray-300 text-gray-600 rounded-lg text-sm hover:bg-gray-50">
                                            <RefreshCw className="w-3 h-3 inline mr-2"/>Reset Weights
                                        </button>
                                    </div>
                                    </div>

                                    {/* INSPECTOR & MATH WORKSHEET */}
                                    {stepInfo && nnRef.current && (
                                        <div className="bg-white rounded-xl shadow-lg border border-indigo-100 overflow-hidden animate-in fade-in slide-in-from-bottom-4">
                                            <div className="bg-indigo-50 px-4 py-3 border-b border-indigo-100 flex justify-between items-center">
                                                <h3 className="font-bold text-indigo-900 flex items-center gap-2">
                                                    <Calculator className="w-4 h-4"/> Calculation Worksheet
                                                </h3>
                                            </div>
                                            
                                            {/* SCROLLABLE MATH AREA */}
                                            <div className="p-4 space-y-3 text-sm max-h-[350px] overflow-y-auto">
                                                
                                                {/* 1. INPUTS */}
                                                <div className="mb-2">
                                                    <span className="text-xs font-bold text-gray-400 uppercase tracking-wide">Step 1: Raw Inputs</span>
                                                    {activeTab === 'simple' ? (
                                                        <div className="text-sm font-bold text-gray-800 border-l-2 border-blue-500 pl-2 mt-1">
                                                            Size: {stepInfo.inputs[0]?.toFixed(2)} ({mapSize(stepInfo.inputs[0])}sqft)
                                                        </div>
                                                    ) : (
                                                        <div className="text-sm text-gray-600 border-l-2 border-blue-500 pl-2 mt-1">
                                                            S: {stepInfo.inputs[0]?.toFixed(2)}, R: {stepInfo.inputs[1]?.toFixed(2)}, L: {stepInfo.inputs[2]?.toFixed(2)}
                                                        </div>
                                                    )}
                                                </div>

                                                {/* 2. HIDDEN LAYER MATH */}
                                                <div>
                                                    <span className="text-xs font-bold text-gray-400 uppercase tracking-wide">Step 2: Hidden Layer</span>
                                                    <div className="mt-1">
                                                        {Array.from({length: Math.min(nnRef.current.layerSizes[1] || 0, 2)}).map((_, i) => (
                                                            <HiddenNeuronMath key={i} step={stepInfo} nn={nnRef.current} nIndex={i} />
                                                        ))}
                                                        {hiddenNeurons > 2 && <div className="text-xs text-gray-400 text-center italic">...and {hiddenNeurons - 2} more...</div>}
                                                    </div>
                                                </div>

                                                {/* 3. OUTPUT MATH */}
                                                <div>
                                                    <span className="text-xs font-bold text-gray-400 uppercase tracking-wide">Step 3: Final Price</span>
                                                    <div className="mt-1">
                                                        <OutputNeuronMath step={stepInfo} nn={nnRef.current} />
                                                    </div>
                                                </div>
                                                
                                                {/* 4. REALITY CHECK */}
                                                <div className="mt-2 pt-2 border-t border-dashed flex justify-between items-center">
                                                    <div className="text-xs text-gray-500">Actual Price</div>
                                                    <div className="font-mono font-bold text-emerald-600">${mapPrice(stepInfo.target)}k</div>
                                                </div>
                                                <div className="flex justify-between items-center">
                                                    <div className="text-xs text-gray-500">Error</div>
                                                    <div className="font-mono text-xs text-red-500">{(stepInfo.prediction - stepInfo.target).toFixed(3)}</div>
                                                </div>

                                                {/* BIAS EXPLANATION FOOTER */}
                                                <div className="mt-4 bg-blue-50 p-3 rounded border border-blue-100 text-xs text-blue-800">
                                                    <div className="font-bold mb-1 flex items-center gap-1">
                                                        <HelpCircle className="w-3 h-3"/> What is Bias?
                                                    </div>
                                                    <p>
                                                        <strong>Bias</strong> is like the intercept <em>(b)</em> in a line equation <em>(y = mx + b)</em>. 
                                                        Without bias, the neuron's curve would always pass through the origin (0,0). 
                                                        Bias allows the curve to shift left, right, up, or down to fit the data better.
                                                    </p>
                                                </div>

                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="lg:col-span-8 space-y-6">
                                    <div className="bg-white p-4 rounded-xl shadow-md border border-gray-200 relative">
                                    <h3 className="font-bold text-gray-800 mb-2">
                                        {activeTab === 'simple' ? 'Simple Regression (Line)' : 'Multivariate (Cloud)'}
                                    </h3>
                                    <canvas ref={plotCanvasRef} width={700} height={300} className="w-full h-[300px] object-contain bg-white rounded cursor-crosshair"/>
                                    </div>

                                    <div className="bg-white p-4 rounded-xl shadow-md border border-gray-200">
                                    <div className="flex justify-between items-center mb-2">
                                        <h3 className="font-bold text-gray-800 flex items-center gap-2">
                                            <Layers className="w-4 h-4"/> Neural Network
                                        </h3>
                                        <span className="text-xs text-indigo-600 bg-indigo-50 px-2 py-1 rounded">
                                        {activeTab === 'simple' ? '1 Input Node' : '3 Input Nodes'} &rarr; {hiddenNeurons} Hidden &rarr; 1 Output
                                        </span>
                                    </div>
                                    <canvas 
                                        ref={netCanvasRef} 
                                        width={700} 
                                        height={350} 
                                        className="w-full h-[350px] object-contain cursor-pointer"
                                        onMouseMove={handleNetMouseMove}
                                        onMouseLeave={() => setHoveredNode(null)}
                                    />
                                    </div>
                                </div>
                                </div>
                            </>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<NeuralNetworkDemo />);
    </script>
</body>
</html>
