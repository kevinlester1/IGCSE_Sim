<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Hardware Deployment Scenarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const quizQuestions = [
            {
                question: "Which hardware is explicitly designed by Google to speed up neural network workloads?",
                options: ["ASICs", "TPUs", "Standard CPUs", "FPGAs"],
                correctAnswer: 1,
                explanation: "TPUs (Tensor Processing Units) are custom accelerators developed by Google specifically for ML workloads."
            },
            {
                question: "If you are deploying a trained model to a smart watch to track health metrics offline, what hardware context are you working in?",
                options: ["HPC Centres", "Edge Devices", "Cloud-based Platforms", "Enterprise NAS"],
                correctAnswer: 1,
                explanation: "Smart watches are Edge Devices. They perform inference locally to ensure low latency and function without internet."
            },
            {
                question: "What is the primary scalability characteristic of Foundation Model Training (like ChatGPT)?",
                options: ["Low - reliant on local RAM", "High - but limited to unscalable individual devices", "Maximum - scales across thousands of nodes in a data centre", "Moderate - only scales by buying bigger hard drives"],
                correctAnswer: 2,
                explanation: "Foundation models require massive High-Performance Computing (HPC) centres designed to distribute load across thousands of GPUs/TPUs."
            },
            {
                question: "Which integrated circuit can be reconfigured by the customer after manufacturing, making it useful as models update?",
                options: ["ASICs", "GPUs", "FPGAs", "Standard Laptops"],
                correctAnswer: 2,
                explanation: "FPGAs (Field-Programmable Gate Arrays) can be reprogrammed, offering a balance of efficiency and flexibility."
            },
            {
                question: "For an individual learning data science fundamentals and testing very small datasets, what is typically sufficient?",
                options: ["Standard Laptops", "ASIC Clusters", "Enterprise SSD Arrays", "HPC Centres"],
                correctAnswer: 0,
                explanation: "Standard laptops are perfectly capable of handling exploratory data analysis and basic script writing for learning purposes."
            }
        ];

        const scenarios = [
            {
                id: 1,
                title: "Individual Prototyping & Learning",
                icon: "💻",
                description: "Initial model development, testing small datasets, and learning data science fundamentals.",
                processing: "Standard laptops with multi-core CPUs and entry-level discrete GPUs are sufficient. They handle exploratory data analysis (EDA) and lightweight inference well.",
                storage: "512GB to 1TB SSD. Fast local storage is needed to load datasets into memory quickly, but overall capacity requirements are low.",
                scalability: "Low. Scalability is limited to upgrading local RAM or storage. To scale compute, users must migrate workloads to cloud-based platforms.",
                hardware: ["Standard Laptops"]
            },
            {
                id: 2,
                title: "Real-time IoT & Edge Inference",
                icon: "📱",
                description: "Deploying trained models directly onto localized hardware (like smart cameras, wearables, or autonomous drones) for real-time decision making without internet dependency.",
                processing: "Requires low-power, high-efficiency processors. Relies heavily on Edge devices utilizing ASICs (Application-Specific Integrated Circuits) or FPGAs (Field-Programmable Gate Arrays) designed specifically to run pre-trained neural networks with minimal latency.",
                storage: "Extremely constrained (Megabytes to a few Gigabytes of flash storage). Models must be compressed, pruned, or quantized to fit.",
                scalability: "High horizontal scalability (deploying millions of edge devices), but individual device compute capacity is fixed and unscalable.",
                hardware: ["Edge devices", "ASICs", "FPGAs"]
            },
            {
                id: 3,
                title: "Enterprise Deep Learning Applications",
                icon: "🏢",
                description: "Training complex computer vision or natural language processing models on large proprietary enterprise datasets.",
                processing: "Requires massive parallel processing capabilities. Typically uses clusters of high-end GPUs or Google's TPUs (Tensor Processing Units).",
                storage: "Requires Fast NVMe SSD arrays or enterprise-grade Network Attached Storage (NAS) holding Terabytes of data. High bandwidth is crucial to ensure the GPUs are never waiting for data.",
                scalability: "Highly scalable via Cloud-based platforms. Enterprises can spin up virtual machines with attached GPUs/TPUs dynamically, scaling horizontally across multiple cloud instances as training demands increase.",
                hardware: ["GPUs", "TPUs", "Cloud-based platforms"]
            },
            {
                id: 4,
                title: "Foundation Model Training (e.g., LLMs)",
                icon: "🌐",
                description: "Training state-of-the-art AI models (like ChatGPT or Gemini) on datasets comprising a significant portion of the public internet.",
                processing: "Relies on High-Performance Computing (HPC) centres. Involves tens of thousands of GPUs or TPUs working simultaneously, interconnected by ultra-high-speed custom networking (like InfiniBand).",
                storage: "Distributed object storage handling Petabytes of data. Requires massive amounts of High Bandwidth Memory (HBM) located directly on the GPU/TPU chips.",
                scalability: "Maximum scalability. Infrastructure is designed to scale across thousands of server nodes, distributing the processing load mathematically across an entire data centre.",
                hardware: ["HPC centres", "GPUs", "TPUs", "Cloud-based platforms"]
            }
        ];

        const hardwareGlossary = [
            { name: "Standard Laptops", desc: "Everyday computers providing adequate CPU and basic GPU resources for initial script writing, data cleaning, and testing very small models." },
            { name: "GPUs (Graphics Processing Units)", desc: "The workhorse of machine learning. Originally designed for rendering graphics, their highly parallel architecture makes them perfect for the massive matrix multiplications required in deep learning." },
            { name: "TPUs (Tensor Processing Units)", desc: "Custom-developed accelerators by Google specifically designed to speed up machine learning workloads, particularly neural network machine learning, offering high throughput for tensor operations." },
            { name: "FPGAs (Field-Programmable Gate Arrays)", desc: "Integrated circuits that can be configured by a customer after manufacturing. They offer low latency and high efficiency for specific ML inference tasks and can be reprogrammed as models update." },
            { name: "ASICs (Application-Specific Integrated Circuits)", desc: "Microchips designed for a very specific application (like running a specific neural network architecture). They offer the highest performance and lowest power consumption but cannot be easily repurposed." },
            { name: "Edge Devices", desc: "Hardware located close to the data source (phones, smart sensors, IoT devices). They process ML inference locally to reduce latency, save bandwidth, and ensure data privacy." },
            { name: "Cloud-based Platforms", desc: "Services (like AWS, Google Cloud, Azure) that provide on-demand access to virtualized computing resources, allowing users to rent GPUs, TPUs, and massive storage without buying physical hardware." },
            { name: "HPC (High-Performance Computing) Centres", desc: "Supercomputing facilities that aggregate massive computational power, high-speed networks, and parallel file systems to solve the largest, most complex machine learning training problems." }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('scenarios');
            const [activeScenario, setActiveScenario] = useState(scenarios[0]);
            
            // Quiz state
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showResult, setShowResult] = useState(false);
            const [score, setScore] = useState(0);
            const [quizCompleted, setQuizCompleted] = useState(false);

            const handleAnswerClick = (index) => {
                if (showResult) return; // Prevent changing answer after submission
                setSelectedAnswer(index);
                setShowResult(true);
                
                if (index === quizQuestions[currentQuestion].correctAnswer) {
                    setScore(score + 1);
                }
            };

            const nextQuestion = () => {
                if (currentQuestion < quizQuestions.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                    setSelectedAnswer(null);
                    setShowResult(false);
                } else {
                    setQuizCompleted(true);
                }
            };

            const restartQuiz = () => {
                setCurrentQuestion(0);
                setSelectedAnswer(null);
                setShowResult(false);
                setScore(0);
                setQuizCompleted(false);
            };

            return (
                <div className="min-h-screen bg-gray-100 p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        <header className="mb-8 text-center">
                            <h1 className="text-3xl md:text-4xl font-bold text-gray-800 mb-2">Machine Learning Hardware Deployment</h1>
                            <p className="text-gray-600">An interactive guide to hardware requirements across different ML scenarios.</p>
                        </header>

                        {/* Navigation */}
                        {}
                        <div className="flex justify-center mb-8">
                            <div className="bg-white rounded-lg shadow inline-flex p-1 flex-wrap justify-center">
                                <button 
                                    onClick={() => setActiveTab('scenarios')}
                                    className={`px-4 sm:px-6 py-2 rounded-md font-medium transition-colors ${activeTab === 'scenarios' ? 'bg-blue-600 text-white' : 'text-gray-600 hover:bg-gray-100'}`}
                                >
                                    Deployment Scenarios
                                </button>
                                <button 
                                    onClick={() => setActiveTab('glossary')}
                                    className={`px-4 sm:px-6 py-2 rounded-md font-medium transition-colors ${activeTab === 'glossary' ? 'bg-blue-600 text-white' : 'text-gray-600 hover:bg-gray-100'}`}
                                >
                                    Hardware Glossary
                                </button>
                                <button 
                                    onClick={() => setActiveTab('exercise')}
                                    className={`px-4 sm:px-6 py-2 rounded-md font-medium transition-colors ${activeTab === 'exercise' ? 'bg-blue-600 text-white' : 'text-gray-600 hover:bg-gray-100'}`}
                                >
                                    Mastery Exercise
                                </button>
                            </div>
                        </div>

                        {/* Content Area */}
                        {}
                        {activeTab === 'scenarios' && (
                            <div className="flex flex-col md:flex-row gap-6 fade-in">
                                {/* Sidebar */}
                                <div className="w-full md:w-1/3 flex flex-col gap-3">
                                    {scenarios.map(scenario => (
                                        <button 
                                            key={scenario.id}
                                            onClick={() => setActiveScenario(scenario)}
                                            className={`text-left p-4 rounded-xl border-2 transition-all ${activeScenario.id === scenario.id ? 'border-blue-600 bg-blue-50 shadow-md' : 'border-transparent bg-white hover:border-blue-300 shadow-sm'}`}
                                        >
                                            <div className="text-2xl mb-1">{scenario.icon}</div>
                                            <h3 className="font-semibold text-gray-800">{scenario.title}</h3>
                                        </button>
                                    ))}
                                </div>

                                {/* Main Detail Panel */}
                                <div className="w-full md:w-2/3 bg-white rounded-xl shadow-lg p-6 md:p-8">
                                    <div className="flex items-center gap-3 mb-4">
                                        <span className="text-4xl">{activeScenario.icon}</span>
                                        <h2 className="text-2xl font-bold text-gray-800">{activeScenario.title}</h2>
                                    </div>
                                    <p className="text-gray-600 mb-8 text-lg">{activeScenario.description}</p>

                                    <div className="grid grid-cols-1 gap-6 mb-8">
                                        <div className="bg-blue-50 p-4 rounded-lg border border-blue-100">
                                            <h4 className="font-bold text-blue-800 mb-2 flex items-center gap-2">
                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                                                Processing Needs
                                            </h4>
                                            <p className="text-gray-700 text-sm leading-relaxed">{activeScenario.processing}</p>
                                        </div>
                                        
                                        <div className="bg-green-50 p-4 rounded-lg border border-green-100">
                                            <h4 className="font-bold text-green-800 mb-2 flex items-center gap-2">
                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
                                                Storage Requirements
                                            </h4>
                                            <p className="text-gray-700 text-sm leading-relaxed">{activeScenario.storage}</p>
                                        </div>

                                        <div className="bg-purple-50 p-4 rounded-lg border border-purple-100">
                                            <h4 className="font-bold text-purple-800 mb-2 flex items-center gap-2">
                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                                                Scalability
                                            </h4>
                                            <p className="text-gray-700 text-sm leading-relaxed">{activeScenario.scalability}</p>
                                        </div>
                                    </div>

                                    <div>
                                        <h4 className="text-sm uppercase tracking-wider font-bold text-gray-500 mb-3">Key Hardware Utilized:</h4>
                                        <div className="flex flex-wrap gap-2">
                                            {activeScenario.hardware.map(hw => (
                                                <span key={hw} className="bg-gray-800 text-white px-3 py-1 rounded-full text-sm font-medium">
                                                    {hw}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {activeTab === 'glossary' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 fade-in">
                                {hardwareGlossary.map((item, idx) => (
                                    <div key={idx} className="bg-white p-5 rounded-xl shadow hover:shadow-lg transition-shadow border-t-4 border-blue-600">
                                        <h3 className="font-bold text-gray-800 mb-2 text-lg">{item.name}</h3>
                                        <p className="text-sm text-gray-600 leading-relaxed">{item.desc}</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {}
                        {activeTab === 'exercise' && (
                            <div className="max-w-3xl mx-auto bg-white rounded-xl shadow-lg p-6 md:p-10 fade-in">
                                {!quizCompleted ? (
                                    <div>
                                        <div className="flex justify-between items-center mb-6">
                                            <h2 className="text-2xl font-bold text-gray-800">Knowledge Check</h2>
                                            <span className="bg-blue-100 text-blue-800 text-sm font-semibold px-3 py-1 rounded-full">
                                                Question {currentQuestion + 1} of {quizQuestions.length}
                                            </span>
                                        </div>
                                        
                                        <div className="mb-8">
                                            <p className="text-lg text-gray-700 font-medium mb-4">
                                                {quizQuestions[currentQuestion].question}
                                            </p>
                                            
                                            <div className="space-y-3">
                                                {quizQuestions[currentQuestion].options.map((option, idx) => {
                                                    let buttonClass = "w-full text-left p-4 rounded-lg border-2 transition-all ";
                                                    
                                                    if (!showResult) {
                                                        buttonClass += "border-gray-200 hover:border-blue-400 hover:bg-blue-50";
                                                    } else if (idx === quizQuestions[currentQuestion].correctAnswer) {
                                                        buttonClass += "border-green-500 bg-green-50 text-green-900";
                                                    } else if (idx === selectedAnswer) {
                                                        buttonClass += "border-red-500 bg-red-50 text-red-900";
                                                    } else {
                                                        buttonClass += "border-gray-200 opacity-50";
                                                    }

                                                    return (
                                                        <button
                                                            key={idx}
                                                            onClick={() => handleAnswerClick(idx)}
                                                            disabled={showResult}
                                                            className={buttonClass}
                                                        >
                                                            <div className="flex items-center">
                                                                <span className="w-6 h-6 flex items-center justify-center rounded-full border border-current mr-3 flex-shrink-0">
                                                                    {String.fromCharCode(65 + idx)}
                                                                </span>
                                                                {option}
                                                            </div>
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        {showResult && (
                                            <div className={`p-4 rounded-lg mb-6 fade-in ${selectedAnswer === quizQuestions[currentQuestion].correctAnswer ? 'bg-green-100 border border-green-300' : 'bg-red-100 border border-red-300'}`}>
                                                <p className="font-bold mb-1">
                                                    {selectedAnswer === quizQuestions[currentQuestion].correctAnswer ? '✅ Correct!' : '❌ Incorrect'}
                                                </p>
                                                <p className="text-gray-700 text-sm">
                                                    {quizQuestions[currentQuestion].explanation}
                                                </p>
                                            </div>
                                        )}

                                        <div className="flex justify-end">
                                            <button
                                                onClick={nextQuestion}
                                                disabled={!showResult}
                                                className={`px-6 py-2 rounded-md font-medium transition-colors ${showResult ? 'bg-blue-600 text-white hover:bg-blue-700' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}
                                            >
                                                {currentQuestion < quizQuestions.length - 1 ? 'Next Question' : 'Finish Exercise'}
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="text-center py-8 fade-in">
                                        <h2 className="text-3xl font-bold text-gray-800 mb-4">Exercise Complete!</h2>
                                        <div className="inline-flex items-center justify-center w-32 h-32 rounded-full bg-blue-50 mb-6 border-4 border-blue-200">
                                            <span className="text-4xl font-bold text-blue-600">{score}/{quizQuestions.length}</span>
                                        </div>
                                        <p className="text-lg text-gray-600 mb-8">
                                            {score === quizQuestions.length ? "Perfect score! You have mastered the hardware deployment scenarios." : 
                                             score >= quizQuestions.length / 2 ? "Good job! Review the glossary to touch up on a few concepts." : 
                                             "Keep practicing! Review the deployment scenarios and try again."}
                                        </p>
                                        <button
                                            onClick={restartQuiz}
                                            className="px-8 py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition-colors shadow-md"
                                        >
                                            Retake Exercise
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
