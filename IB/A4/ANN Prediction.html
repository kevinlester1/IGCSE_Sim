<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Network Subject Predictor</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .weight-label {
            font-family: monospace;
            font-size: 10px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0px 0px 2px black;
        }
        .code-font { font-family: 'Consolas', 'Monaco', 'Courier New', monospace; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Configuration Data ---
        
        const INPUTS = [
            { id: 'maths', label: 'Maths Grade', type: 'grade', category: 'STEM' },
            { id: 'english', label: 'English Grade', type: 'grade', category: 'Humanities' },
            { id: 'science', label: 'Science Grade', type: 'grade', category: 'STEM' },
            { id: 'art', label: 'Art Grade', type: 'grade', category: 'Creative' },
            { id: 'int_coding', label: 'Likes Coding', type: 'interest', category: 'STEM' },
            { id: 'int_writing', label: 'Likes Writing', type: 'interest', category: 'Humanities' },
            { id: 'int_nature', label: 'Likes Nature', type: 'interest', category: 'STEM' },
            { id: 'career_med', label: 'Goal: Medicine', type: 'career', category: 'STEM' },
            { id: 'career_eng', label: 'Goal: Engineering', type: 'career', category: 'STEM' },
            { id: 'career_arts', label: 'Goal: Designer', type: 'career', category: 'Creative' },
        ];

        const HIDDEN_NEURONS = [
            { id: 'h1', label: 'Analytical Pattern', y: 15 },
            { id: 'h2', label: 'Creative Pattern', y: 50 },
            { id: 'h3', label: 'Verbal Pattern', y: 85 },
        ];

        const OUTPUTS = [
            { id: 'phys', label: 'Physics' },
            { id: 'bio', label: 'Biology' },
            { id: 'cs', label: 'Comp Sci' },
            { id: 'englit', label: 'English Lit' },
            { id: 'hist', label: 'History' },
            { id: 'art_des', label: 'Art & Design' },
        ];

        // TARGET Weights (The "Correct" Brain)
        const TARGET_W_IH = {
            'maths-h1': 0.9, 'maths-h2': -0.2, 'maths-h3': -0.1,
            'science-h1': 0.8, 'science-h2': 0.1, 'science-h3': 0.1,
            'english-h1': -0.1, 'english-h2': 0.4, 'english-h3': 0.9,
            'art-h1': 0.0, 'art-h2': 0.9, 'art-h3': 0.2,
            'int_coding-h1': 0.8, 'int_coding-h2': 0.3, 'int_coding-h3': -0.2,
            'int_writing-h1': -0.2, 'int_writing-h2': 0.4, 'int_writing-h3': 0.8,
            'int_nature-h1': 0.6, 'int_nature-h2': 0.2, 'int_nature-h3': 0.1,
            'career_med-h1': 0.7, 'career_med-h2': 0.1, 'career_med-h3': 0.2,
            'career_eng-h1': 0.9, 'career_eng-h2': 0.1, 'career_eng-h3': -0.1,
            'career_arts-h1': -0.3, 'career_arts-h2': 1.0, 'career_arts-h3': 0.3,
        };

        const TARGET_W_HO = {
            'h1-phys': 0.9, 'h1-cs': 0.9, 'h1-bio': 0.6, 'h1-englit': -0.5, 'h1-hist': -0.2, 'h1-art_des': -0.4,
            'h2-art_des': 0.95, 'h2-englit': 0.3, 'h2-hist': 0.1, 'h2-phys': -0.1, 'h2-cs': 0.2, 'h2-bio': 0.1,
            'h3-englit': 0.9, 'h3-hist': 0.85, 'h3-art_des': 0.2, 'h3-bio': 0.1, 'h3-phys': -0.3, 'h3-cs': -0.2,
        };

        // --- Main Component ---

        function App() {
            const [activeTab, setActiveTab] = useState('simulation');
            
            // Shared State for Simulation inputs
            const [values, setValues] = useState({
                maths: 5, english: 5, science: 5, art: 5,
                int_coding: 0, int_writing: 0, int_nature: 0,
                career_med: 0, career_eng: 0, career_arts: 0
            });

            // --- Simulation Logic (Calculates outputs based on constants) ---
            const networkState = useMemo(() => {
                const hiddenActivations = {};
                const hiddenSums = {}; 
                HIDDEN_NEURONS.forEach(h => {
                    let sum = 0;
                    INPUTS.forEach(inp => {
                        let val = values[inp.id];
                        if (inp.type === 'grade') val = val / 9; 
                        const weight = TARGET_W_IH[`${inp.id}-${h.id}`] || 0;
                        sum += val * weight;
                    });
                    hiddenSums[h.id] = sum;
                    hiddenActivations[h.id] = Math.max(0, sum); 
                });

                const outputActivations = {};
                const outputSums = {};
                OUTPUTS.forEach(o => {
                    let sum = 0;
                    HIDDEN_NEURONS.forEach(h => {
                        const hVal = hiddenActivations[h.id];
                        const weight = TARGET_W_HO[`${h.id}-${o.id}`] || 0;
                        sum += hVal * weight;
                    });
                    outputSums[o.id] = sum;
                    let sigmoid = 1 / (1 + Math.exp(-sum + 2)); 
                    outputActivations[o.id] = Math.min(1, Math.max(0, sigmoid)); 
                });

                return { hidden: hiddenActivations, hiddenSums, output: outputActivations, outputSums };
            }, [values]);

            const handleValueChange = (id, newVal) => {
                if (id.startsWith('career_')) {
                    setValues(prev => ({
                        ...prev,
                        career_med: 0, career_eng: 0, career_arts: 0,
                        [id]: newVal ? 1 : 0
                    }));
                } else {
                    setValues(prev => ({ ...prev, [id]: newVal }));
                }
            };

            return (
                <div className="min-h-screen flex flex-col p-4 md:p-8 max-w-7xl mx-auto">
                    <header className="mb-4 text-center">
                        <h1 className="text-3xl md:text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                            Neural Network Subject Predictor
                        </h1>
                        <p className="text-slate-400 mt-2">
                            {activeTab === 'simulation' && "Adjust the Inputs to see how the Neural Network makes decisions."}
                            {activeTab === 'training_live' && "Manually step through training to see how weights evolve from chaos to order."}
                            {activeTab === 'training_explainer' && "Read the full guide on how the architecture, math, and training process works."}
                            {activeTab === 'python_tutorial' && "Follow the step-by-step guide to build the Python GUI application."}
                            {activeTab === 'ann_guide' && "Key concepts from the IB Computer Science Guide (2027) regarding ANNs."}
                            {activeTab === 'exam_prep' && "Test your knowledge with IB-style exam questions."}
                        </p>
                    </header>

                    {/* Tab Navigation */}
                    <div className="flex flex-wrap justify-center gap-4 mb-6">
                        <button onClick={() => setActiveTab('simulation')} className={`px-4 py-2 rounded-full font-bold transition-all text-sm ${activeTab === 'simulation' ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>🔮 Simulation</button>
                        <button onClick={() => setActiveTab('training_live')} className={`px-4 py-2 rounded-full font-bold transition-all text-sm ${activeTab === 'training_live' ? 'bg-green-600 text-white shadow-lg' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>⚡ Training</button>
                        <button onClick={() => setActiveTab('training_explainer')} className={`px-4 py-2 rounded-full font-bold transition-all text-sm ${activeTab === 'training_explainer' ? 'bg-purple-600 text-white shadow-lg' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>📖 Guide</button>
                        <button onClick={() => setActiveTab('python_tutorial')} className={`px-4 py-2 rounded-full font-bold transition-all text-sm ${activeTab === 'python_tutorial' ? 'bg-yellow-600 text-white shadow-lg' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>🐍 Python</button>
                        <button onClick={() => setActiveTab('ann_guide')} className={`px-4 py-2 rounded-full font-bold transition-all text-sm ${activeTab === 'ann_guide' ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>📘 Syllabus</button>
                        <button onClick={() => setActiveTab('exam_prep')} className={`px-4 py-2 rounded-full font-bold transition-all text-sm ${activeTab === 'exam_prep' ? 'bg-red-600 text-white shadow-lg' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>📝 Exam Prep</button>
                        <button onClick={() => setActiveTab('resources')} className={`px-4 py-2 rounded-full font-bold transition-all text-sm ${activeTab === 'resources' ? 'bg-teal-600 text-white shadow-lg' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>📚 Resources</button>
                    </div>

                    {/* CONTENT AREA */}
                    {activeTab === 'simulation' && (
                        <div className="flex flex-col lg:flex-row gap-6 h-full grow">
                             <div className="w-full lg:w-1/4 bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl overflow-y-auto max-h-[800px]">
                                <h2 className="text-xl font-bold mb-4 text-blue-300">1. Inputs</h2>
                                {INPUTS.filter(i => i.type === 'grade').map(inp => (
                                    <div key={inp.id} className="mb-3">
                                        <div className="flex justify-between text-sm mb-1"><span>{inp.label}</span><span className="font-mono text-blue-400">{values[inp.id]}</span></div>
                                        <input type="range" min="0" max="9" step="1" value={values[inp.id]} onChange={(e) => handleValueChange(inp.id, parseInt(e.target.value))} className="w-full h-2 bg-slate-600 rounded-lg appearance-none cursor-pointer accent-blue-500"/>
                                    </div>
                                ))}
                                <div className="mt-4"><h3 className="text-sm font-semibold text-slate-300 mb-2">Interests</h3>{INPUTS.filter(i => i.type === 'interest').map(inp => (<label key={inp.id} className="flex items-center space-x-2 mb-2"><input type="checkbox" checked={values[inp.id]===1} onChange={e=>handleValueChange(inp.id, e.target.checked?1:0)} className="rounded bg-slate-700"/> <span className="text-sm">{inp.label}</span></label>))}</div>
                                <div className="mt-4"><h3 className="text-sm font-semibold text-slate-300 mb-2">Future Goal</h3>{INPUTS.filter(i => i.type === 'career').map(inp => (<label key={inp.id} className="flex items-center space-x-2 mb-2"><input type="radio" checked={values[inp.id]===1} onChange={()=>handleValueChange(inp.id, true)} className="rounded bg-slate-700"/> <span className="text-sm">{inp.label}</span></label>))}</div>
                            </div>

                            <div className="w-full lg:w-2/4 bg-slate-900 rounded-xl border border-slate-700 shadow-2xl relative overflow-hidden flex flex-col">
                                <div className="absolute top-0 left-0 w-full p-2 bg-slate-900/90 border-b border-slate-800 flex justify-between px-4 items-center z-10">
                                    <h2 className="text-lg font-bold text-purple-300">The "Brain" (Trained)</h2>
                                    <span className="text-xs text-slate-400 bg-slate-800 px-2 py-1 rounded">Hover over neurons to see math</span>
                                </div>
                                <NetworkCanvas values={values} networkState={networkState} weightsIH={TARGET_W_IH} weightsHO={TARGET_W_HO} />
                            </div>

                            <div className="w-full lg:w-1/4 bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl">
                                <h2 className="text-xl font-bold mb-4 text-green-300">3. Predictions</h2>
                                <div className="space-y-4">
                                    {OUTPUTS.sort((a,b) => networkState.output[b.id] - networkState.output[a.id]).map(out => (
                                        <div key={out.id}><div className="flex justify-between text-sm mb-1"><span>{out.label}</span><span>{Math.round(networkState.output[out.id]*100)}%</span></div><div className="w-full bg-slate-700 rounded-full h-2"><div className="bg-green-500 h-2 rounded-full" style={{width: `${networkState.output[out.id]*100}%`}}></div></div></div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'training_live' && <LiveTrainingLab />}

                    {activeTab === 'training_explainer' && <GuideTab />}

                    {activeTab === 'python_tutorial' && <PythonTutorialTab />}

                    {activeTab === 'ann_guide' && <ANNGuideTab />}

                    {activeTab === 'exam_prep' && <ExamPrepTab />}

                    {activeTab === 'resources' && <ResourcesTab />}
                </div>
            );
        }

        // --- LIVE TRAINING COMPONENT ---

        function LiveTrainingLab() {
            const [isTraining, setIsTraining] = useState(false);
            const [epoch, setEpoch] = useState(0);
            const [trainingSample, setTrainingSample] = useState(null); 
            
            const initialWeightsIH = useMemo(() => {
                const w = {};
                INPUTS.forEach(inp => HIDDEN_NEURONS.forEach(h => w[`${inp.id}-${h.id}`] = (Math.random() * 2 - 1).toFixed(2)));
                return w;
            }, []);
            
            const initialWeightsHO = useMemo(() => {
                const w = {};
                HIDDEN_NEURONS.forEach(h => OUTPUTS.forEach(o => w[`${h.id}-${o.id}`] = (Math.random() * 2 - 1).toFixed(2)));
                return w;
            }, []);

            const [currentWeightsIH, setCurrentWeightsIH] = useState(initialWeightsIH);
            const [currentWeightsHO, setCurrentWeightsHO] = useState(initialWeightsHO);
            
            // Dummy values for initial render
            const dummyValues = { maths: 5, english: 5, science: 5, art: 5, int_coding: 0, int_writing: 0, int_nature: 0, career_med: 0, career_eng: 0, career_arts: 0 };

            // Calculate network state based on CURRENT WEIGHTS and CURRENT STUDENT
            const liveNetworkState = useMemo(() => {
                const student = trainingSample ? trainingSample.student : dummyValues;
                const hiddenActivations = {};
                const hiddenSums = {}; 
                HIDDEN_NEURONS.forEach(h => {
                    let sum = 0;
                    INPUTS.forEach(inp => {
                        let val = student[inp.id];
                        if (inp.type === 'grade') val = val / 9; 
                        const weight = parseFloat(currentWeightsIH[`${inp.id}-${h.id}`] || 0);
                        sum += val * weight;
                    });
                    hiddenSums[h.id] = sum;
                    hiddenActivations[h.id] = Math.max(0, sum); 
                });

                const outputActivations = {};
                const outputSums = {};
                OUTPUTS.forEach(o => {
                    let sum = 0;
                    HIDDEN_NEURONS.forEach(h => {
                        const hVal = hiddenActivations[h.id];
                        const weight = parseFloat(currentWeightsHO[`${h.id}-${o.id}`] || 0);
                        sum += hVal * weight;
                    });
                    outputSums[o.id] = sum;
                    let sigmoid = 1 / (1 + Math.exp(-sum + 2)); 
                    outputActivations[o.id] = Math.min(1, Math.max(0, sigmoid)); 
                });

                return { hidden: hiddenActivations, hiddenSums, output: outputActivations, outputSums };
            }, [trainingSample, currentWeightsIH, currentWeightsHO]);

            const generateStudentData = () => {
                const student = {
                    maths: Math.floor(Math.random() * 10),
                    english: Math.floor(Math.random() * 10),
                    science: Math.floor(Math.random() * 10),
                    art: Math.floor(Math.random() * 10),
                    int_coding: Math.random() > 0.5 ? 1 : 0,
                    int_writing: Math.random() > 0.5 ? 1 : 0,
                    int_nature: Math.random() > 0.5 ? 1 : 0,
                    career_med: 0, career_eng: 0, career_arts: 0
                };
                
                const r = Math.random();
                if (r < 0.33) student.career_med = 1;
                else if (r < 0.66) student.career_eng = 1;
                else student.career_arts = 1;

                const truth = {};
                OUTPUTS.forEach(o => truth[o.id] = 0); 
                if (student.maths > 6 && student.science > 6 && (student.career_eng || student.int_coding)) { truth.phys = 1; truth.cs = 1; }
                if (student.science > 7 && (student.career_med || student.int_nature)) { truth.bio = 1; }
                if (student.art > 7 && (student.career_arts || student.int_writing)) { truth.art_des = 1; truth.englit = 1; }
                
                return { student, truth };
            };

            const performTrainingStep = () => {
                 setEpoch(prev => {
                    if (prev >= 100) { setIsTraining(false); return 100; }
                    return prev + 1;
                });

                const newSample = generateStudentData();
                setTrainingSample(newSample);

                setCurrentWeightsIH(prev => {
                    const next = { ...prev };
                    Object.keys(next).forEach(key => {
                        const target = TARGET_W_IH[key] || 0;
                        const current = parseFloat(next[key]);
                        next[key] = (current + (target - current) * 0.1).toFixed(3);
                    });
                    return next;
                });
                setCurrentWeightsHO(prev => {
                    const next = { ...prev };
                    Object.keys(next).forEach(key => {
                        const target = TARGET_W_HO[key] || 0;
                        const current = parseFloat(next[key]);
                        next[key] = (current + (target - current) * 0.1).toFixed(3);
                    });
                    return next;
                });
            };

            useEffect(() => {
                let interval;
                if (isTraining) { interval = setInterval(performTrainingStep, 400); }
                return () => clearInterval(interval);
            }, [isTraining]);

            const reset = () => {
                setIsTraining(false);
                setEpoch(0);
                setCurrentWeightsIH(initialWeightsIH);
                setCurrentWeightsHO(initialWeightsHO);
                setTrainingSample(null);
            };

            return (
                <div className="flex flex-col lg:flex-row gap-6 h-full grow">
                    {/* Controls & Data Monitor */}
                    <div className="w-full lg:w-1/3 flex flex-col gap-4">
                        <div className="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl">
                            <h2 className="text-xl font-bold mb-4 text-green-300">⚡ Training Control</h2>
                            <div className="flex flex-col gap-3 mb-6">
                                <div className="flex gap-2">
                                     <button 
                                        onClick={() => setIsTraining(!isTraining)}
                                        disabled={epoch>=100}
                                        className={`flex-1 py-3 rounded-lg font-bold text-white shadow transition-all ${isTraining ? 'bg-red-500 hover:bg-red-600' : 'bg-green-600 hover:bg-green-700'}`}
                                    >
                                        {isTraining ? "⏸ Pause" : epoch >= 100 ? "Complete" : "▶ Auto-Train"}
                                    </button>
                                     <button onClick={reset} className="px-4 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg text-slate-300 font-bold">↺ Reset</button>
                                </div>
                                <button onClick={performTrainingStep} disabled={isTraining || epoch >= 100} className="w-full py-2 rounded-lg font-bold text-white bg-blue-600 hover:bg-blue-500 shadow disabled:opacity-50 disabled:cursor-not-allowed border-t border-blue-400">👣 Step +1 Epoch (Manual)</button>
                            </div>
                            <div className="bg-slate-900 rounded-lg p-4 border border-slate-800">
                                <div className="flex justify-between mb-2">
                                    <span className="text-slate-400">Epochs:</span>
                                    <span className="font-mono text-purple-400 font-bold">{epoch} / 100</span>
                                </div>
                                <div className="w-full bg-slate-800 rounded-full h-3"><div className="bg-purple-500 h-3 rounded-full transition-all duration-100" style={{width: `${epoch}%`}}></div></div>
                            </div>
                        </div>

                        {/* LIVE DATA PROCESSOR */}
                        <div className="bg-black p-4 rounded-xl border border-slate-700 shadow-xl grow overflow-hidden flex flex-col">
                            <h3 className="text-slate-400 border-b border-slate-800 pb-2 mb-2 uppercase tracking-widest text-xs">Current Training Sample</h3>
                            {trainingSample ? (
                                <div className="flex flex-col gap-3 fade-in font-mono text-xs">
                                    <div className="bg-slate-800 p-3 rounded border border-slate-600">
                                        <div className="text-blue-300 font-bold mb-2 border-b border-slate-700 pb-1">Student Profile</div>
                                        <div className="grid grid-cols-2 gap-x-2 gap-y-1 text-slate-300 mb-3">
                                            <span>Maths: <span className="text-white font-bold">{trainingSample.student.maths}</span></span>
                                            <span>English: <span className="text-white font-bold">{trainingSample.student.english}</span></span>
                                            <span>Science: <span className="text-white font-bold">{trainingSample.student.science}</span></span>
                                            <span>Art: <span className="text-white font-bold">{trainingSample.student.art}</span></span>
                                        </div>
                                        <div className="mb-3">
                                            <div className="text-[10px] text-slate-500 uppercase tracking-wider mb-1">Interests</div>
                                            <div className="flex flex-wrap gap-2">
                                                <span className={`px-2 py-0.5 rounded text-[10px] border ${trainingSample.student.int_coding ? 'bg-blue-900/50 text-blue-200 border-blue-500' : 'bg-slate-700/30 text-slate-600 border-slate-700'}`}>Coding</span>
                                                <span className={`px-2 py-0.5 rounded text-[10px] border ${trainingSample.student.int_writing ? 'bg-blue-900/50 text-blue-200 border-blue-500' : 'bg-slate-700/30 text-slate-600 border-slate-700'}`}>Writing</span>
                                                <span className={`px-2 py-0.5 rounded text-[10px] border ${trainingSample.student.int_nature ? 'bg-blue-900/50 text-blue-200 border-blue-500' : 'bg-slate-700/30 text-slate-600 border-slate-700'}`}>Nature</span>
                                            </div>
                                        </div>
                                        <div>
                                            <div className="text-[10px] text-slate-500 uppercase tracking-wider mb-1">Career Goal</div>
                                            <div className="text-purple-300 font-bold bg-purple-900/20 px-2 py-1 rounded border border-purple-500/30 inline-block">
                                                {trainingSample.student.career_med ? "Medicine" : trainingSample.student.career_eng ? "Engineering" : "Creative Arts"}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-slate-900 p-3 rounded border border-slate-800">
                                        <div className="flex justify-between text-slate-400 mb-2 border-b border-slate-800 pb-1"><span>Subject</span><span>Target (Truth)</span></div>
                                        <div className="flex flex-col gap-1 max-h-[150px] overflow-y-auto">
                                            {OUTPUTS.map(out => {
                                                const isTrue = trainingSample.truth[out.id] === 1;
                                                return (<div key={out.id} className="flex justify-between items-center"><span>{out.label}</span><div className="flex items-center gap-2">{isTrue ? <span className="text-green-400 font-bold">YES</span> : <span className="text-slate-600">NO</span>}{isTrue && <span className="text-[10px] bg-red-900 text-red-200 px-1 rounded animate-pulse">Backprop!</span>}</div></div>);
                                            })}
                                        </div>
                                    </div>
                                    <div className="text-center text-green-400 text-xs mt-2">Weights Updated based on Error!</div>
                                </div>
                            ) : (
                                <div className="text-slate-500 text-center mt-10 italic">Waiting to start...<br/>Click "Step +1" to process a student.</div>
                            )}
                        </div>
                    </div>

                    {/* Network Visualization */}
                    <div className="w-full lg:w-2/3 bg-slate-900 rounded-xl border border-slate-700 shadow-2xl relative overflow-hidden flex flex-col">
                         <div className="absolute top-0 left-0 w-full p-2 bg-slate-900/90 border-b border-slate-800 flex justify-between px-4 items-center z-10">
                             <h2 className="text-lg font-bold text-green-300">Live Network View</h2>
                             <span className="text-xs text-slate-400 bg-slate-800 px-2 py-1 rounded">Hover over neurons/lines to see math</span>
                         </div>
                         <NetworkCanvas 
                            values={trainingSample ? trainingSample.student : dummyValues} 
                            networkState={liveNetworkState} 
                            weightsIH={currentWeightsIH}
                            weightsHO={currentWeightsHO}
                            isTrainingMode={true}
                        />
                    </div>
                </div>
            );
        }


        // --- Helper: NetworkCanvas ---

        function NetworkCanvas({ values, networkState, weightsIH, weightsHO, isTrainingMode = false }) {
            const [hoveredNode, setHoveredNode] = useState(null);
            const [hoveredLine, setHoveredLine] = useState(null);
            const { hidden, output, hiddenSums, outputSums } = networkState;

            // Use passed weights OR fall back to targets (for simulation tab)
            const wIH = weightsIH || TARGET_W_IH;
            const wHO = weightsHO || TARGET_W_HO;

            // Coordinates
            const width = 600;
            const height = 600;
            const inputX = 50;
            const hiddenX = 300;
            const outputX = 550;
            const inputStep = height / (INPUTS.length + 1);
            const outputStep = height / (OUTPUTS.length + 1);

            // --- Math Inspector Logic ---
            const getInspectorContent = () => {
                // 1. Weight Inspector
                if (hoveredLine) {
                    const { id, currentW, targetW, sourceLabel, targetLabel, type, sourceId } = hoveredLine;
                    
                    // TRAINING MODE
                    if (isTrainingMode) {
                        const diff = targetW - currentW;
                        const nudge = diff * 0.1;
                        return (
                            <div className="absolute bottom-4 right-4 w-72 bg-slate-800 border border-slate-600 p-4 rounded-lg shadow-2xl z-20 text-xs fade-in font-mono">
                                <h3 className="font-bold text-yellow-300 mb-2 border-b border-slate-600 pb-1 font-sans">Training Inspector</h3>
                                <div className="text-[10px] text-slate-400 mb-2 text-center">{sourceLabel} <span className="text-white">→</span> {targetLabel}</div>
                                <div className="grid grid-cols-2 gap-2 mb-3">
                                    <div className="bg-slate-900 p-2 rounded">
                                        <div className="text-slate-500 text-[9px]">Current Weight</div>
                                        <div className={`text-lg font-bold ${currentW > 0 ? 'text-blue-400' : 'text-red-400'}`}>{currentW > 0 ? '+' : ''}{parseFloat(currentW).toFixed(3)}</div>
                                    </div>
                                    <div className="bg-slate-900 p-2 rounded">
                                        <div className="text-slate-500 text-[9px]">Next Nudge</div>
                                        <div className={`text-lg font-bold ${nudge > 0 ? 'text-green-400' : 'text-orange-400'}`}>{nudge > 0 ? '▲' : '▼'} {Math.abs(nudge).toFixed(3)}</div>
                                    </div>
                                </div>
                                <div className="bg-slate-700/50 p-2 rounded border border-slate-600 text-center">
                                    <div className="font-bold text-white mb-1">Decision Logic</div>
                                    <p className="text-[10px] text-slate-300 leading-tight">{Math.abs(diff) < 0.1 ? "✅ Optimized! Keeping weight stable." : diff > 0 ? "📉 Input was too low for the correct answer. Boosting weight." : "📈 Input was too high for the correct answer. Reducing weight."}</p>
                                </div>
                            </div>
                        );
                    } 
                    // SIMULATION MODE
                    else {
                        let sourceValue = 0;
                        if (type === 'IH') {
                            const inp = INPUTS.find(i => i.id === sourceId);
                            sourceValue = values[sourceId];
                            if(inp && inp.type === 'grade') sourceValue /= 9;
                        } else {
                            sourceValue = hidden[sourceId] || 0;
                        }
                        
                        const signal = sourceValue * currentW;

                        return (
                            <div className="absolute bottom-4 right-4 w-72 bg-slate-800 border border-slate-600 p-4 rounded-lg shadow-2xl z-20 text-xs fade-in font-mono">
                                <h3 className="font-bold text-blue-300 mb-2 border-b border-slate-600 pb-1 font-sans">Signal Inspector</h3>
                                <div className="text-[10px] text-slate-400 mb-2 text-center">{sourceLabel} <span className="text-white">→</span> {targetLabel}</div>
                                
                                <div className="bg-slate-900 p-3 rounded mb-2">
                                    <div className="flex justify-between items-center mb-1 text-slate-400 text-[10px]"><span>Source Value</span><span>× Weight</span><span>= Signal</span></div>
                                    <div className="flex justify-between items-center text-sm font-bold">
                                        <span className="text-white">{sourceValue.toFixed(2)}</span>
                                        <span className={currentW > 0 ? "text-blue-400" : "text-red-400"}>{currentW > 0 ? '×' : '×'}{parseFloat(currentW).toFixed(2)}</span>
                                        <span className="text-white">= {signal.toFixed(2)}</span>
                                    </div>
                                </div>
                                <div className="bg-slate-700/50 p-2 rounded border border-slate-600 text-center">
                                    <p className="text-[10px] text-slate-300">This connection sends a signal of <strong>{signal.toFixed(2)}</strong> to the next neuron.</p>
                                </div>
                            </div>
                        );
                    }
                }

                if (!hoveredNode) return null;

                // Case 0: Input Node
                const inpNode = INPUTS.find(i => i.id === hoveredNode);
                if (inpNode) {
                    let rawVal = values[inpNode.id];
                    let normVal = rawVal;
                    let formula = "Raw Value";
                    if (inpNode.type === 'grade') { normVal = rawVal / 9; formula = `${rawVal} ÷ 9`; }

                    return (
                        <div className="absolute bottom-4 right-4 w-64 bg-slate-800 border border-slate-600 p-4 rounded-lg shadow-2xl z-20 text-xs fade-in font-mono">
                            <h3 className="font-bold text-blue-300 mb-2 border-b border-slate-600 pb-1 font-sans">{inpNode.label}</h3>
                            <div className="flex justify-between mb-2 text-slate-400"><span>Raw Input:</span> <span className="text-white">{rawVal}</span></div>
                            <div className="bg-slate-700/50 p-2 rounded border border-slate-600">
                                <div className="text-[10px] text-slate-400 mb-1 text-center">Normalization</div>
                                <div className="flex justify-between items-center text-blue-200"><span>{formula}</span><span>=</span><span className="text-lg font-bold text-blue-400">{typeof normVal === 'number' ? normVal.toFixed(2) : normVal}</span></div>
                                <div className="text-[9px] text-slate-500 text-center mt-1">This value (0.0-1.0) travels down the lines</div>
                            </div>
                        </div>
                    );
                }

                // Case 1: Hidden Node (ReLU)
                const hidNode = HIDDEN_NEURONS.find(h => h.id === hoveredNode);
                if (hidNode) {
                    const contributors = INPUTS.map(inp => {
                        let val = values[inp.id];
                        if (inp.type === 'grade') val /= 9;
                        const w = parseFloat(wIH[`${inp.id}-${hidNode.id}`] || 0);
                        return { label: inp.label, val, w, impact: val * w };
                    }).filter(c => Math.abs(c.impact) > 0.05).sort((a,b) => Math.abs(b.impact) - Math.abs(a.impact)).slice(0, 3);
                    const sum = hiddenSums[hidNode.id] || 0;

                    return (
                        <div className="absolute bottom-4 right-4 w-72 bg-slate-800 border border-slate-600 p-4 rounded-lg shadow-2xl z-20 text-xs fade-in font-mono">
                            <h3 className="font-bold text-purple-300 mb-3 border-b border-slate-600 pb-1 font-sans">{hidNode.label}</h3>
                            <div className="flex justify-between text-[10px] text-slate-500 mb-1 px-1"><span>Input × Weight</span><span>Signal</span></div>
                            <div className="space-y-2 mb-3">
                                {contributors.map((c, i) => (
                                    <div key={i} className="flex items-center justify-between bg-slate-900/50 p-1 rounded">
                                        <div className="flex flex-col"><span className="text-slate-300">{c.label.split(' ')[0]} ({c.val.toFixed(2)})</span><span className={`text-[10px] ${c.w>0?'text-blue-400':'text-red-400'}`}>× W {c.w > 0 ? '+' : ''}{c.w.toFixed(2)}</span></div>
                                        <span className="font-bold text-white">{c.impact > 0 ? '+' : ''}{c.impact.toFixed(2)}</span>
                                    </div>
                                ))}
                                <div className="text-slate-500 italic text-[10px] text-center">+ others...</div>
                            </div>
                            <div className="bg-slate-700/50 p-2 rounded border border-slate-600">
                                <div className="flex justify-between items-center mb-1"><span className="text-slate-400">Total Sum:</span><span className="text-white">{sum.toFixed(2)}</span></div>
                                <div className="border-t border-slate-600 pt-1 flex justify-between items-center"><span className="text-purple-300 font-bold">ReLU Output:</span><span className="text-lg font-bold text-purple-400">{sum < 0 ? '0.00' : sum.toFixed(2)}</span></div>
                                <div className="text-[9px] text-slate-500 mt-1 text-center">(Negatives become 0)</div>
                            </div>
                        </div>
                    );
                }

                // Case 2: Output Node (Sigmoid)
                const outNode = OUTPUTS.find(o => o.id === hoveredNode);
                if (outNode) {
                    const sum = outputSums[outNode.id] || 0;
                    const finalProb = output[outNode.id] || 0;
                    return (
                         <div className="absolute bottom-4 right-4 w-64 bg-slate-800 border border-slate-600 p-4 rounded-lg shadow-2xl z-20 text-xs fade-in font-mono">
                            <h3 className="font-bold text-green-300 mb-2 border-b border-slate-600 pb-1 font-sans">{outNode.label}</h3>
                            <div className="bg-slate-900 p-2 rounded mb-2 flex justify-between"><span className="text-slate-400">Weighted Sum:</span><span className="text-white">{sum.toFixed(2)}</span></div>
                            <div className="bg-slate-700/50 p-2 rounded border border-slate-600">
                                <div className="text-[10px] text-slate-400 mb-1 text-center">Sigmoid Activation</div>
                                <div className="font-mono text-[9px] text-center text-slate-500 mb-2">1 / (1 + e^(-sum))</div>
                                <div className="flex justify-center items-center"><div className="text-2xl font-bold text-green-400">{(finalProb * 100).toFixed(1)}%</div></div>
                            </div>
                        </div>
                    );
                }
                return null;
            };

            return (
                <div className="w-full h-full flex items-center justify-center p-4 overflow-hidden mt-8 relative">
                    {getInspectorContent()}

                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full max-h-[600px] select-none">
                        <defs>
                            <filter id="glow">
                                <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                                <feMerge>
                                    <feMergeNode in="coloredBlur"/>
                                    <feMergeNode in="SourceGraphic"/>
                                </feMerge>
                            </filter>
                        </defs>

                        {/* CONNECTIONS: Input -> Hidden */}
                        {INPUTS.map((inp, i) => {
                            const y1 = (i + 1) * inputStep;
                            let inpVal = values[inp.id];
                            if(inp.type === 'grade') inpVal /= 9;

                            return HIDDEN_NEURONS.map((hid, j) => {
                                const y2 = (hid.y / 100) * height;
                                const weightId = `${inp.id}-${hid.id}`;
                                const weight = parseFloat(wIH[weightId] || 0);
                                const targetW = TARGET_W_IH[weightId] || 0;
                                
                                const isConnected = hoveredNode === inp.id || hoveredNode === hid.id;
                                const isLineHovered = hoveredLine && hoveredLine.id === weightId;
                                const isHoveringAny = hoveredNode !== null || hoveredLine !== null;
                                const dim = isHoveringAny && !isConnected && !isLineHovered;

                                let opacity = isTrainingMode ? Math.abs(weight) * 0.5 + 0.1 : Math.min(1, (Math.abs(weight) * inpVal) + 0.1);
                                if (dim) opacity = 0.05;
                                if (isConnected || isLineHovered) opacity = 1;

                                let strokeWidth = isTrainingMode ? Math.abs(weight) * 2 : Math.max(0.5, Math.abs(weight) * 3 * inpVal);
                                if (isConnected || isLineHovered) strokeWidth = Math.max(3, Math.abs(weight) * 6);
                                const color = weight > 0 ? '#6366f1' : '#f43f5e';

                                return (
                                    <g key={weightId}>
                                        <line 
                                            x1={inputX} y1={y1} x2={hiddenX} y2={y2} 
                                            stroke={color} strokeWidth={strokeWidth} opacity={opacity * 0.8} 
                                            className="transition-all duration-300 cursor-pointer hover:opacity-100"
                                            onMouseEnter={() => setHoveredLine({ 
                                                id: weightId, currentW: weight, targetW, 
                                                sourceLabel: inp.label, targetLabel: hid.label,
                                                type: 'IH', sourceId: inp.id
                                            })}
                                            onMouseLeave={() => setHoveredLine(null)}
                                        />
                                        {(isConnected || isLineHovered) && (
                                            <text x={inputX + (hiddenX - inputX) * 0.25} y={y1 + (y2 - y1) * 0.25 - 5} fill={color} className="weight-label">{weight > 0 ? '+' : ''}{weight.toFixed(2)}</text>
                                        )}
                                    </g>
                                );
                            });
                        })}

                        {/* CONNECTIONS: Hidden -> Output */}
                        {HIDDEN_NEURONS.map((hid, i) => {
                            const y1 = (hid.y / 100) * height;
                            
                            return OUTPUTS.map((out, j) => {
                                const y2 = (j + 1) * outputStep;
                                const weightId = `${hid.id}-${out.id}`;
                                const weight = parseFloat(wHO[weightId] || 0);
                                const targetW = TARGET_W_HO[weightId] || 0;

                                const isConnected = hoveredNode === hid.id || hoveredNode === out.id;
                                const isLineHovered = hoveredLine && hoveredLine.id === weightId;
                                const isHoveringAny = hoveredNode !== null || hoveredLine !== null;
                                const dim = isHoveringAny && !isConnected && !isLineHovered;

                                let opacity = Math.min(1, Math.abs(weight) + 0.1);
                                if (dim) opacity = 0.05;
                                if (isConnected || isLineHovered) opacity = 1;

                                let strokeWidth = Math.max(0.5, Math.abs(weight) * 3);
                                if (isConnected || isLineHovered) strokeWidth = Math.max(3, Math.abs(weight) * 6);
                                const color = weight > 0 ? '#10b981' : '#f43f5e';

                                return (
                                    <g key={weightId}>
                                        <line 
                                            x1={hiddenX} y1={y1} x2={outputX} y2={y2} 
                                            stroke={color} strokeWidth={strokeWidth} opacity={opacity * 0.7} 
                                            className="transition-all duration-300 cursor-pointer"
                                            onMouseEnter={() => setHoveredLine({ 
                                                id: weightId, currentW: weight, targetW, 
                                                sourceLabel: hid.label, targetLabel: out.label,
                                                type: 'HO', sourceId: hid.id 
                                            })}
                                            onMouseLeave={() => setHoveredLine(null)}
                                        />
                                        {(isConnected || isLineHovered) && (
                                            <text x={hiddenX + (outputX - hiddenX) * 0.75} y={y1 + (y2 - y1) * 0.75 - 5} fill={color} className="weight-label" textAnchor="end">{weight > 0 ? '+' : ''}{weight.toFixed(2)}</text>
                                        )}
                                    </g>
                                );
                            });
                        })}

                        {/* NODES: Inputs */}
                        {INPUTS.map((inp, i) => {
                            const y = (i + 1) * inputStep;
                            const isHovered = hoveredNode === inp.id;
                            let val = values[inp.id];
                            if(inp.type === 'grade') val /= 9;
                            
                            return (
                                <g key={`node-in-${i}`} className="transition-all duration-300 cursor-pointer" onMouseEnter={() => setHoveredNode(inp.id)} onMouseLeave={() => setHoveredNode(null)}>
                                    <circle cx={inputX} cy={y} r={isHovered ? 8 : 4} fill={isTrainingMode && val > 0.1 ? "#60a5fa" : isTrainingMode ? "#334155" : isHovered ? "#60a5fa" : (val > 0.1 ? "#60a5fa" : "#334155")} stroke={isHovered ? "white" : "none"} strokeWidth="2" />
                                    <text x={inputX - 15} y={y + 4} textAnchor="end" fill="#94a3b8" fontSize="10" className="hidden md:block select-none">{inp.id.includes('career') ? '★' : ''} {inp.label.split(' ')[0]}</text>
                                </g>
                            );
                        })}

                        {/* NODES: Hidden Layer */}
                        {HIDDEN_NEURONS.map((hid, i) => {
                            const y = (hid.y / 100) * height;
                            const isHovered = hoveredNode === hid.id;
                            const val = hidden[hid.id] || 0;
                            const r = 10 + (val * 10); 
                            const intensity = Math.min(255, Math.floor(val * 200));

                            return (
                                <g key={`node-h-${i}`} className="cursor-pointer" onMouseEnter={() => setHoveredNode(hid.id)} onMouseLeave={() => setHoveredNode(null)}>
                                    <circle cx={hiddenX} cy={y} r={r} fill={`rgb(${intensity}, ${intensity}, 255)`} stroke={isHovered ? "white" : "white"} strokeWidth={isHovered ? "3" : "1"} className="transition-all duration-500 ease-out" />
                                    <text x={hiddenX} y={y - 20} textAnchor="middle" fill="white" fontSize="12" fontWeight="bold" className="select-none">{hid.label}</text>
                                    <text x={hiddenX} y={y + 5} textAnchor="middle" fill="#1e293b" fontSize="10" fontWeight="bold" className="select-none">{val.toFixed(2)}</text>
                                </g>
                            );
                        })}

                        {/* NODES: Outputs */}
                        {OUTPUTS.map((out, i) => {
                            const y = (i + 1) * outputStep;
                            const isHovered = hoveredNode === out.id;
                            const val = output[out.id] || 0;
                            const r = 6 + (val * 8);

                            return (
                                <g key={`node-out-${i}`} className="cursor-pointer" onMouseEnter={() => setHoveredNode(out.id)} onMouseLeave={() => setHoveredNode(null)}>
                                    <circle cx={outputX} cy={y} r={r} fill={val > 0.5 ? "#10b981" : "#334155"} stroke={isHovered ? "white" : "none"} strokeWidth="2" className="transition-all duration-500" />
                                    <text x={outputX + 15} y={y + 4} textAnchor="start" fill="#94a3b8" fontSize="11" className="hidden md:block select-none">{out.label}</text>
                                </g>
                            );
                        })}

                        <text x={inputX} y={20} textAnchor="middle" fill="#64748b" fontSize="12" fontWeight="bold">INPUT LAYER</text>
                        <text x={hiddenX} y={20} textAnchor="middle" fill="#64748b" fontSize="12" fontWeight="bold">HIDDEN LAYER</text>
                        <text x={outputX} y={20} textAnchor="middle" fill="#64748b" fontSize="12" fontWeight="bold">OUTPUT LAYER</text>
                    </svg>
                </div>
            );
        }

        // --- Guide Tab (Replaces the wizard with full documentation) ---
        function GuideTab() {
            return (
                <div className="flex flex-col h-full grow p-4 md:p-8 bg-slate-800 rounded-xl border border-slate-700 overflow-y-auto custom-scrollbar">
                    <h2 className="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-6 text-center">
                        How the Neural Network Simulation Works
                    </h2>
                    
                    <div className="max-w-4xl mx-auto space-y-8">
                        <section>
                            <p className="text-slate-300 text-lg">
                                This guide explains the mechanics behind the <strong>Neural Network Subject Predictor</strong> simulation. It breaks down how a user's input travels through the "brain" to become a prediction.
                            </p>
                        </section>

                        <section>
                            <h2 className="text-2xl font-bold text-white mb-4 border-b border-slate-700 pb-2">1. The Architecture (The "Brain")</h2>
                            <p className="text-slate-400 mb-4">The simulation visualizes a <strong>Multi-Layer Perceptron (MLP)</strong> with three distinct sections:</p>
                            
                            <div className="grid md:grid-cols-3 gap-4">
                                <div className="bg-slate-900 p-4 rounded-lg border border-slate-700">
                                    <h3 className="text-xl font-semibold text-blue-300 mb-2">A. Input Layer</h3>
                                    <p className="text-slate-400 text-sm mb-2">The raw data about a student.</p>
                                    <ul className="list-disc pl-4 space-y-1 text-slate-500 text-sm">
                                        <li><strong>Grades:</strong> Sliders (0-9)</li>
                                        <li><strong>Interests:</strong> Checkboxes (On/Off)</li>
                                        <li><strong>Goals:</strong> Radio buttons</li>
                                    </ul>
                                    <div className="mt-3 p-2 bg-slate-800 rounded text-xs text-blue-200 border border-blue-900">
                                        <strong>Preprocessing:</strong><br/>
                                        Grade 9 → 1.0<br/>
                                        Grade 5 → 0.56
                                    </div>
                                </div>

                                <div className="bg-slate-900 p-4 rounded-lg border border-slate-700">
                                    <h3 className="text-xl font-semibold text-purple-300 mb-2">B. Hidden Layer</h3>
                                    <p className="text-slate-400 text-sm mb-2">The "Feature Extractors." These represent abstract patterns, not specific subjects.</p>
                                    <ul className="list-disc pl-4 space-y-1 text-slate-500 text-sm">
                                        <li><strong>Analytical:</strong> Maths, Science, Eng.</li>
                                        <li><strong>Creative:</strong> Art, Design.</li>
                                        <li><strong>Verbal:</strong> English, History.</li>
                                    </ul>
                                </div>

                                <div className="bg-slate-900 p-4 rounded-lg border border-slate-700">
                                    <h3 className="text-xl font-semibold text-green-300 mb-2">C. Output Layer</h3>
                                    <p className="text-slate-400 text-sm mb-2">The final recommendation for each subject.</p>
                                    <div className="mt-3 p-2 bg-slate-800 rounded text-xs text-green-200 border border-green-900">
                                        <strong>Value:</strong><br/>
                                        Probability % (0% - 100%)
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section>
                            <h2 className="text-2xl font-bold text-white mb-4 border-b border-slate-700 pb-2">2. The Math: From Input to Output</h2>
                            <p className="text-slate-400 mb-4">When you change a slider, the simulation performs a <strong>Forward Pass</strong> instantly.</p>

                            <div className="mb-6">
                                <h3 className="text-xl font-semibold text-blue-300 mb-2">Step 1: The Weighted Sum</h3>
                                <p className="text-slate-400 text-sm mb-2">Every line has a <strong>Weight</strong>. Blue lines increase the output; Red lines decrease it.</p>
                                
                                <div className="bg-slate-950 p-4 rounded border border-slate-800 text-center my-4 font-mono text-green-400 text-sm md:text-base">
                                    (Input₁ × Weight₁) + (Input₂ × Weight₂) + ... = Sum
                                </div>
                                
                                <div className="bg-yellow-900/20 p-3 rounded border border-yellow-700/50 text-yellow-200 text-sm flex items-center gap-2">
                                    <span className="text-xl">👉</span>
                                    <span><strong>Try it:</strong> Hover over any colored line in the simulation tabs to see this calculation live!</span>
                                </div>
                            </div>

                            <div>
                                <h3 className="text-xl font-semibold text-blue-300 mb-2">Step 2: The Activation Function</h3>
                                <p className="text-slate-400 text-sm mb-3">To act like a brain cell, we apply a mathematical function to the Sum.</p>
                                <div className="grid md:grid-cols-2 gap-4">
                                    <div className="bg-slate-800 p-3 rounded border border-slate-700">
                                        <div className="font-bold text-purple-300 mb-1">Hidden Layer: ReLU</div>
                                        <p className="text-xs text-slate-400">If Sum is negative, output <strong>0</strong>. Otherwise, output Sum.</p>
                                        <p className="text-xs text-slate-500 mt-1 italic">Simulates a neuron staying "silent".</p>
                                    </div>
                                    <div className="bg-slate-800 p-3 rounded border border-slate-700">
                                        <div className="font-bold text-green-300 mb-1">Output Layer: Sigmoid</div>
                                        <p className="text-xs text-slate-400">Squashes the Sum into a curve between <strong>0 and 1</strong>.</p>
                                        <p className="text-xs text-slate-500 mt-1 italic">Converts score to Percentage.</p>

                                        <span className="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400 border border-slate-700">{res.type}</span>
                                    </div>
                                    <div className="text-xs text-slate-500 font-bold mb-3 uppercase tracking-wider">{res.author}</div>
                                    <p className="text-sm text-slate-300 leading-relaxed">{res.desc}</p>
                                    <div className="mt-4 flex items-center text-xs font-bold text-blue-400">
                                        Open Resource <span className="ml-1">↗</span>
                                    </div>
                                </a>
                            ))}
                        </div>

                        <div className="bg-blue-900/20 p-6 rounded-xl border border-blue-500/30 text-center mt-8">
                            <h3 className="text-blue-300 font-bold mb-2">💡 Teacher Tip</h3>
                            <p className="text-sm text-slate-400">
                                Start with <strong>StatQuest</strong> for the concepts, use <strong>TensorFlow Playground</strong> to experiment, and watch <strong>3Blue1Brown</strong> if you are aiming for a Level 7 in Higher Level math.
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
